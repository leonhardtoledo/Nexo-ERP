                </>
              )}
            </Modal>
          )}
        </div>
      );
    }

    /* ─── APLICATIVO PRINCIPAL ─── */
    function MainApp({ userProfile, onLogout, showDialog }) {
      const[activeTab, setActiveTab] = useState('dashboard');
      const[printView, setPrintView] = useState('manifesto');
      const[modalConfig, setModalConfig] = useState(false);
      const[showNotificacoes, setShowNotificacoes] = useState(false);
      const[notificacoes, setNotificacoes] = useState([]);

      const hora = new Date().getHours();
      let saudacao = hora >= 5 && hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';

      const[viagens, setViagens] = useState([]);
      const[viagemSelecionadaId, setViagemSelecionadaId] = useState('');
      const[passageiros, setPassageiros] = useState([]);
      const[fornecedores, setFornecedores] = useState([]);
      const[caixa, setCaixa] = useState([]);
      const[reservas, setReservas] = useState({});
      const[reciboData, setReciboData] = useState(null);

      useEffect(() => {
        if(!userProfile) return;
        const { db, collection, doc, onSnapshot, updateDoc } = window.NexoFB;
        const empRef = doc(db, "empresas", userProfile.empresaId);
        const unsubs =[];
        
        const interval = setInterval(() => { updateDoc(empRef, { lastOnline: Date.now() }).catch(()=>{}); }, 60000);

        unsubs.push(onSnapshot(collection(empRef, "viagens"), snap => {
            const arr =[]; snap.forEach(d => arr.push({id: d.id, ...d.data()}));
            setViagens(arr);
            if(arr.length > 0) { setViagemSelecionadaId(prev => (prev && arr.find(x=>x.id===prev)) ? prev : arr[0].id); } else { setViagemSelecionadaId(''); }
        }));
        unsubs.push(onSnapshot(collection(empRef, "passageiros"), snap => {
            const arr =[]; snap.forEach(d => arr.push({id: d.id, ...d.data()}));
            setPassageiros(arr);
        }));
        unsubs.push(onSnapshot(collection(empRef, "caixa"), snap => {
            const arr =[]; snap.forEach(d => arr.push({id: d.id, ...d.data()}));
            setCaixa(arr.sort((a,b) => b.data.localeCompare(a.data)));
        }));
        unsubs.push(onSnapshot(collection(empRef, "fornecedores"), snap => {
            const arr =[]; snap.forEach(d => arr.push({id: d.id, ...d.data()}));
            setFornecedores(arr);
        }));
        unsubs.push(onSnapshot(doc(empRef, "config", "reservas"), snap => {
            if(snap.exists()) setReservas(snap.data().mapa || {}); else setReservas({});
        }));
        unsubs.push(onSnapshot(collection(empRef, "notificacoes"), snap => {
            const arr =[]; snap.forEach(d => arr.push({id: d.id, ...d.data()}));
            setNotificacoes(arr.sort((a,b) => {
                const getTime = (val) => { if (!val) return 0; if (val.toDate) return val.toDate().getTime(); return new Date(val).getTime() || 0; };
                return getTime(b.data) - getTime(a.data);
            }));
        }));

        return () => { unsubs.forEach(fn => fn()); clearInterval(interval); };
      },[userProfile]);

      const apagarNotificacao = async (id) => { await window.NexoFB.deleteDoc(window.NexoFB.doc(window.NexoFB.db, "empresas", userProfile.empresaId, "notificacoes", id)); };
      const marcarLida = async (id) => { await window.NexoFB.updateDoc(window.NexoFB.doc(window.NexoFB.db, "empresas", userProfile.empresaId, "notificacoes", id), { lida: true }); };

      const unreadCount = notificacoes.filter(n => !n.lida).length;

      /* CORREÇÃO APLICADA: Força sincronização do DOM no React antes da janela de print abrir */
      const exportarPDF = (tipo) => {
          if (typeof ReactDOM.flushSync === 'function') {
              try { ReactDOM.flushSync(() => setPrintView(tipo)); } catch(e) { setPrintView(tipo); }
          } else {
              setPrintView(tipo);
          }
          
          setTimeout(() => {
              try { window.print(); } 
              catch(err) { console.error("Erro na impressão: ", err); }
          }, 800);
      };

      return (
        <div className="flex flex-col h-full w-full relative" style={{background:'var(--bg)'}}>
          <div className="no-print header-gradient pt-safe shrink-0 px-5 relative z-10 overflow-hidden" style={{ paddingTop: 'max(1.5rem, env(safe-area-inset-top))', paddingBottom: '3.5rem' }}>
            <div className="absolute top-0 right-0 w-64 h-64 rounded-full opacity-10 bg-purple-600 blur-[50px] transform translate-x-1/4 -translate-y-1/4"></div>
            <div className="flex justify-between items-center relative z-10">
              <div className="flex items-center gap-3">
                <div className="w-14 h-14 relative z-10 flex items-center justify-center animate-float" style={{filter: 'drop-shadow(0 0 12px rgba(168, 85, 247, 0.6))'}}>
                    <svg viewBox="0 0 100 100" className="w-full h-full" style={{filter: 'drop-shadow(0px 2px 8px rgba(0, 0, 0, 0.9))'}} xmlns="http://www.w3.org/2000/svg">
                        <defs><linearGradient id="nexoGradHeader" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#e9d5ff" /><stop offset="50%" stopColor="#a855f7" /><stop offset="100%" stopColor="#581c87" /></linearGradient></defs>
                        <rect x="24" y="20" width="14" height="60" rx="7" fill="url(#nexoGradHeader)" /><rect x="62" y="20" width="14" height="60" rx="7" fill="url(#nexoGradHeader)" /><rect x="43" y="14" width="14" height="72" rx="7" fill="url(#nexoGradHeader)" transform="rotate(-35 50 50)" />
                    </svg>
                </div>
                <div>
                  <h1 className="text-2xl font-black text-white tracking-wide leading-tight">{userProfile.nome}</h1>
                  <p className="text-[10px] font-bold uppercase tracking-widest text-purple-400">{saudacao}</p>
                </div>
              </div>
              <div className="flex gap-3 items-center">
                  <button onClick={() => setShowNotificacoes(true)} className="relative w-10 h-10 rounded-full flex items-center justify-center text-white bg-white/5 border border-white/10 backdrop-blur-md transition-transform active:scale-90">
                      <i className="fa-solid fa-bell text-sm"></i>
                      {unreadCount > 0 && <span className="absolute top-1 right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-[#1c1b22] animate-pulse"></span>}
                  </button>
                  <button onClick={() => setModalConfig(true)} className="w-10 h-10 rounded-full flex items-center justify-center text-white bg-white/5 border border-white/10 backdrop-blur-md transition-transform active:scale-90"><i className="fa-solid fa-gear text-sm"></i></button>
              </div>
            </div>
          </div>

          <main className="no-print flex-1 overflow-y-auto w-full no-scrollbar px-4 -mt-8 relative z-20 pb-28">
            <div className="animate-fadeinup">
              {activeTab === 'dashboard'   && <Dashboard viagens={viagens} caixa={caixa} passageiros={passageiros} reservas={reservas} setActiveTab={setActiveTab} />}
              {activeTab === 'viagens'     && <Viagens viagens={viagens} userProfile={userProfile} showDialog={showDialog} />}
              {activeTab === 'passageiros' && <Passageiros passageiros={passageiros} viagens={viagens} viagemSelecionadaId={viagemSelecionadaId} setViagemSelecionadaId={setViagemSelecionadaId} exportarPDF={exportarPDF} caixa={caixa} reservas={reservas} userProfile={userProfile} showDialog={showDialog} />}
              {activeTab === 'reservas'    && <Onibus viagens={viagens} viagemSelecionadaId={viagemSelecionadaId} setViagemSelecionadaId={setViagemSelecionadaId} reservas={reservas} passageiros={passageiros} exportarPDF={exportarPDF} userProfile={userProfile} showDialog={showDialog} />}
              {activeTab === 'caixa'       && <Caixa viagens={viagens} viagemSelecionadaId={viagemSelecionadaId} setViagemSelecionadaId={setViagemSelecionadaId} caixa={caixa} passageiros={passageiros} fornecedores={fornecedores} exportarPDF={exportarPDF} setReciboData={setReciboData} userProfile={userProfile} showDialog={showDialog} />}
              {activeTab === 'fornecedores'&& <Fornecedores fornecedores={fornecedores} exportarPDF={exportarPDF} userProfile={userProfile} showDialog={showDialog} />}
            </div>
          </main>

          <nav className="no-print fixed bottom-0 w-full pb-safe z-50 bg-white/95 backdrop-blur-xl border-t border-slate-200 shadow-[0_-6px_30px_rgba(147,51,234,0.06)]">
            <div className="flex justify-around items-center h-16 px-2">
              <NavButton icon="fa-chart-pie"          label="Início"    isActive={activeTab==='dashboard'}    onClick={()=>setActiveTab('dashboard')} />
              <NavButton icon="fa-map-location-dot"   label="Viagens"   isActive={activeTab==='viagens'}      onClick={()=>setActiveTab('viagens')} />
              <NavButton icon="fa-users"              label="Pessoas"   isActive={activeTab==='passageiros'}  onClick={()=>setActiveTab('passageiros')} />
              <NavButton icon="fa-wallet"             label="Caixa"     isActive={activeTab==='caixa'}        onClick={()=>setActiveTab('caixa')} />
              <NavButton icon="fa-handshake"          label="Serviços"  isActive={activeTab==='fornecedores'} onClick={()=>setActiveTab('fornecedores')} />
              <NavButton icon="fa-bus"                label="Poltronas" isActive={activeTab==='reservas'}     onClick={()=>setActiveTab('reservas')} />
            </div>
          </nav>

          {modalConfig && <Configuracoes onLogout={onLogout} onClose={()=>setModalConfig(false)} userProfile={userProfile} showDialog={showDialog} />}
          
          {showNotificacoes && (
              <Modal onClose={()=>setShowNotificacoes(false)} title="Notificações Recebidas">
                  {notificacoes.length === 0 ? <div className="text-center text-slate-400 py-10 font-semibold"><i className="fa-solid fa-bell-slash text-3xl mb-3 block text-slate-300"></i>Nenhuma notificação na sua caixa.</div> : (
                      <div className="space-y-3 pb-4">
                          {notificacoes.map(n => (
                              <NotificacaoItem key={n.id} notif={n} onDelete={apagarNotificacao} onRead={marcarLida} />
                          ))}
                      </div>
                  )}
              </Modal>
          )}

          {/* ─── ÁREA DE IMPRESSÃO DOS RELATÓRIOS (PDFs LINDOS E COLORIDOS) ─── */}
          <div className="print-only p-6 text-black bg-white font-sans">
            {printView !== 'recibo' && (
              <div className="border-b-2 border-slate-300 pb-6 mb-8 flex justify-between items-center">
                <div className="flex items-center gap-4">
                  <div className="w-14 h-14 relative flex items-center justify-center drop-shadow-md">
                      <svg viewBox="0 0 100 100" className="w-full h-full" xmlns="http://www.w3.org/2000/svg">
                          <defs><linearGradient id="nexoGradPrint" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#9333ea" /><stop offset="100%" stopColor="#581c87" /></linearGradient></defs>
                          <rect x="24" y="20" width="14" height="60" rx="7" fill="url(#nexoGradPrint)" /><rect x="62" y="20" width="14" height="60" rx="7" fill="url(#nexoGradPrint)" /><rect x="43" y="14" width="14" height="72" rx="7" fill="url(#nexoGradPrint)" transform="rotate(-35 50 50)" />
                      </svg>
                  </div>
                  <div>
                      <h1 className="text-2xl font-black uppercase tracking-tighter text-slate-800" style={{lineHeight:'1'}}>Nexo FRP</h1>
                      <p className="text-xs font-bold text-slate-500 mt-1 uppercase tracking-widest">Relatório Oficial</p>
                  </div>
                </div>
                <div className="text-right">
                    <p className="font-bold text-sm text-slate-800">{userProfile.nome}</p>
                    <p className="text-xs text-slate-500 mt-0.5">Emitido em: {new Date().toLocaleDateString('pt-BR')}</p>
                </div>
              </div>
            )}
            
            {printView === 'caixa' && (() => {
              const vSelecionada = viagens.find(v => v.id === viagemSelecionadaId);
              const cxViagem = caixa.filter(c => c.viagemId === viagemSelecionadaId);
              const ent = cxViagem.filter(c=>c.tipo==='entrada').reduce((a,b)=>a+b.valor,0);
              const sai = cxViagem.filter(c=>c.tipo==='saida').reduce((a,b)=>a+b.valor,0);
              const lucro = ent - sai;

    function NexoFRP() {
      const[fbReady, setFbReady] = useState(!!window.NexoFB);
      const[userProfile, setUserProfile] = useState(null);
      const[loading, setLoading] = useState(true);
      const[dialogConfig, setDialogConfig] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });

      const showDialog = (type, title, message, onConfirm = null) => {
        SoundManager.init();
        if (title === 'Sucesso') { SoundManager.success(); } 
        else if (title === 'Atenção' || title.includes('Erro') || title.includes('Negado') || title.includes('Bloqueado')) { SoundManager.error(); } 
        else { SoundManager.click(); }
        setDialogConfig({ isOpen: true, type, title, message, onConfirm });
      };

      useEffect(() => {
        if(!fbReady) {
            const handleReady = () => setFbReady(true);
            window.addEventListener('firebase-ready', handleReady);
            return () => window.removeEventListener('firebase-ready', handleReady);
        }

        const { auth, db, onAuthStateChanged, getDoc, doc, signOut } = window.NexoFB;
        const unsub = onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                    if(userDoc.exists()) {
                        const data = userDoc.data();
                        const empDoc = await getDoc(doc(db, "empresas", data.empresaId));
                        if(empDoc.exists() && empDoc.data().status === 'Ativo') {
                            const empData = empDoc.data();
                            if (empData.plano !== 'Vitalício' && empData.vencimento) {
                                const hoje = new Date(); const vencimento = new Date(empData.vencimento + 'T00:00:00'); vencimento.setHours(vencimento.getHours() + 24);
                                if (hoje > vencimento) {
                                    showDialog('alert', 'Acesso Bloqueado', 'Sua assinatura expirou. O acesso ao sistema está restrito. Regularize para voltar a acessar.');
                                    await signOut(auth); setUserProfile(null); setLoading(false); return;
                                }
                                const diasRestantes = Math.ceil((vencimento - hoje) / (1000 * 60 * 60 * 24));
                                if (diasRestantes <= 5 && diasRestantes >= 0) {
                                    setTimeout(() => { showDialog('alert', 'Aviso de Vencimento', `Sua assinatura do Nexo FRP vence em ${diasRestantes} dias. Por favor, regularize para evitar o bloqueio automático.`); }, 2000);
                                }
                            }
                            setUserProfile({ uid: user.uid, email: user.email, empresaId: data.empresaId, nome: empData.nomeFantasia, assinatura: { plano: empData.plano, vencimento: empData.vencimento, valor: empData.valorMensalidade } });
                        } else {
                            showDialog('alert', 'Acesso Negado', 'Sua conta está inativa ou bloqueada. Contate o suporte Nexo.');
                            await signOut(auth); setUserProfile(null);
                        }
                    } else {
                        showDialog('alert', 'Erro de Perfil', 'Perfil não localizado no sistema.');
                        await signOut(auth);
                    }
                } catch(e) { await signOut(auth); }
            } else { setUserProfile(null); }
            setLoading(false);
        });
        return () => unsub();
      }, [fbReady]);

      if(!fbReady || loading) return (
        <div className="h-full w-full flex flex-col items-center justify-center bg-[#0f0e13]">
          <div className="w-32 h-32 relative flex items-center justify-center animate-pulse-glow">
              <svg viewBox="0 0 100 100" className="w-full h-full relative z-10" style={{filter: 'drop-shadow(0px 4px 15px rgba(0, 0, 0, 0.9))'}} xmlns="http://www.w3.org/2000/svg">
                  <defs><linearGradient id="nexoGradSplash" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#e9d5ff" /><stop offset="50%" stopColor="#a855f7" /><stop offset="100%" stopColor="#581c87" /></linearGradient></defs>
                  <rect x="24" y="20" width="14" height="60" rx="7" fill="url(#nexoGradSplash)" /><rect x="62" y="20" width="14" height="60" rx="7" fill="url(#nexoGradSplash)" /><rect x="43" y="14" width="14" height="72" rx="7" fill="url(#nexoGradSplash)" transform="rotate(-35 50 50)" />
              </svg>
          </div>
          <p className="mt-8 text-purple-400 font-bold tracking-widest text-[10px] uppercase animate-pulse">Conectando ao Nexo...</p>
        </div>
      );
      
      return (
        <>
            {!userProfile ? <Login showDialog={showDialog} /> : <MainApp userProfile={userProfile} onLogout={async () => { await window.NexoFB.signOut(window.NexoFB.auth); }} showDialog={showDialog} />}
            <CustomDialog config={dialogConfig} onClose={() => setDialogConfig(prev => ({ ...prev, isOpen: false }))} />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NexoFRP />);
  </script>
  <!-- ATIVADOR DO MODO APLICATIVO (PWA) -->
  <script>
    if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Nexo App Motor Registrado!'))
          .catch(err => console.log('Erro no motor do app', err));
      });
    }
  </script>
</body>
</html>
