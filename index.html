    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    :root { 
      --nexo-neon: #9333ea; 
      --nexo-dark: #0f0e13;
      --bg: #f4f5f9; 
    }
    
    * { box-sizing: border-box; }
    
    html, body {
      height: 100%;
      height: 100dvh; /* Altura Dinâmica Inteligente (Evita cortes no Navegador Mobile) */
      width: 100vw;
      margin: 0;
      padding: 0;
      overflow: hidden; /* Trava o scroll global */
      font-family: 'Inter', sans-serif; 
      background: var(--bg); 
      -webkit-tap-highlight-color: transparent; 
      overscroll-behavior: none;
    }

    #root {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-7px); } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    
    @keyframes pulse-glow {
        0% { filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.4)); transform: scale(0.98); }
        100% { filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.9)) drop-shadow(0 0 45px rgba(168, 85, 247, 0.5)); transform: scale(1.02); }
    }
    
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-slideup { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .animate-scalein { animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .animate-pulse-glow { animation: pulse-glow 2s infinite alternate ease-in-out; }

    .glass-card { background: rgba(255,255,255,0.98); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.85); box-shadow: 0 4px 20px rgba(0,0,0,0.04); }
    .glass-card-hover:active { transform: scale(0.98); transition: all 0.1s ease; }

    .header-gradient { background: linear-gradient(145deg, #0f0e13 0%, #1c1b22 100%); border-bottom: 1px solid #2a2931; }
    .neon-button { background: var(--nexo-neon); box-shadow: 0 4px 15px rgba(147,51,234,0.3); color: white; transition: all 0.2s; }
    .neon-button:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(147,51,234,0.2); }
    
    .seat-btn { position: relative; border-radius: 8px 8px 4px 4px; border-bottom-width: 4px; transition: all 0.15s ease; }
    .seat-btn:active { transform: scale(0.92); }
    .seat-free { background:#f3e8ff; color:#9333ea; border-color:#e9d5ff; }
    .seat-taken { background:#fee2e2; color:#b91c1c; border-color:#fca5a5; }
    .seat-sel { background:linear-gradient(160deg,#9333ea,#7e22ce); color:#fff; border-color:#581c87; box-shadow:0 4px 16px rgba(147,51,234,.45); transform:scale(1.1); z-index:10; }
    
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--nexo-neon) !important; box-shadow: 0 0 0 3px rgba(147,51,234,0.15); }
    .pb-safe { padding-bottom: max(0px, env(safe-area-inset-bottom)); }

    /* CORREÇÃO APLICADA: Permite overflow para múltiplas páginas em hospedagens externas */
    @media print { 
        html, body, #root { height: auto !important; width: auto !important; overflow: visible !important; display: block !important; background-color: white !important; color: black !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; position: static !important; } 
        .no-print { display: none !important; } 
        .print-only { display: block !important; position: static !important; } 
        @page { margin: 1cm; size: portrait; } 
    }
    .print-only { display: none; }

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    
    /* ─── BLINDAGEM DE DATAS E NÚMEROS ─── */
    const fmt = (iso) => {
        if (!iso) return '—';
        if (typeof iso === 'string') {
            try { return iso.split('T')[0].split('-').reverse().join('/'); } 
            catch(e) { return '—'; }
        }
        if (iso.toDate) { 
            return iso.toDate().toLocaleDateString('pt-BR');
        }
        return '—';
    };

    const diasAte = (iso) => {
      if (!iso || typeof iso !== 'string') return null;
      try {
          const hoje = new Date(); hoje.setHours(0,0,0,0);
          return Math.round((new Date(iso + 'T00:00:00') - hoje) / 86400000);
      } catch(e) { return null; }
    };
    
    const fmtMoeda = (v) => `R$ ${Number(v).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}`;

    /* ─── GERENCIADOR DE ÁUDIO ─── */
    const SoundManager = {
        ctx: null,
        init: function() {
            if (!this.ctx) {
                try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
            }
            if (this.ctx && this.ctx.state === 'suspended') {
                this.ctx.resume();
            }
        },
        playOscillator: function(freq, type, duration, vol) {
            if (!this.ctx || this.ctx.state === 'suspended') return;
            try {
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            } catch(e) {}
        },
        click: function() { this.playOscillator(600, 'sine', 0.1, 0.05); },
        type: function() { this.playOscillator(800, 'triangle', 0.03, 0.02); },
        success: function() { 
            this.playOscillator(400, 'sine', 0.1, 0.05); 
            setTimeout(() => this.playOscillator(600, 'sine', 0.2, 0.05), 100); 
        },
        error: function() { 
            this.playOscillator(250, 'square', 0.15, 0.05); 
            setTimeout(() => this.playOscillator(200, 'square', 0.2, 0.05), 150); 
        },
        login: function() {
            this.playOscillator(523.25, 'sine', 0.1, 0.05);
            setTimeout(() => this.playOscillator(659.25, 'sine', 0.1, 0.05), 100);
            setTimeout(() => this.playOscillator(783.99, 'sine', 0.3, 0.05), 200);
        }
    };

    window.addEventListener('pointerdown', (e) => {
        SoundManager.init();
        if(e.target.closest('button') || e.target.closest('.cursor-pointer') || e.target.closest('a') || e.target.closest('.seat-btn')) {
            SoundManager.click();
        }
    });
    window.addEventListener('input', (e) => {
        SoundManager.init();
        if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
            SoundManager.type();
        }
    });

    /* ─── ALGORITMOS DE VALIDAÇÃO E MÁSCARAS ─── */
    function isValidCPF(cpf) {
        cpf = cpf.replace(/[^\d]+/g,'');
        if(cpf == '' || cpf.length != 11 || /^(\d)\1{10}$/.test(cpf)) return false;
        let add = 0; for (let i=0; i < 9; i ++) add += parseInt(cpf.charAt(i)) * (10 - i);
        let rev = 11 - (add % 11); if (rev == 10 || rev == 11) rev = 0; if (rev != parseInt(cpf.charAt(9))) return false;
        add = 0; for (let i = 0; i < 10; i ++) add += parseInt(cpf.charAt(i)) * (11 - i);
        rev = 11 - (add % 11); if (rev == 10 || rev == 11) rev = 0; if (rev != parseInt(cpf.charAt(10))) return false; return true;
    }

    function isValidCNPJ(cnpj) {
        cnpj = cnpj.replace(/[^\d]+/g,'');
        if(cnpj == '' || cnpj.length != 14 || /^(\d)\1{13}$/.test(cnpj)) return false;
        let tamanho = cnpj.length - 2; let numeros = cnpj.substring(0,tamanho); let digitos = cnpj.substring(tamanho);
        let soma = 0; let pos = tamanho - 7;
        for (let i = tamanho; i >= 1; i--) { soma += numeros.charAt(tamanho - i) * pos--; if (pos < 2) pos = 9; }
        let resultado = soma % 11 < 2 ? 0 : 11 - soma % 11; if (resultado != digitos.charAt(0)) return false;
        tamanho = tamanho + 1; numeros = cnpj.substring(0,tamanho); soma = 0; pos = tamanho - 7;
        for (let i = tamanho; i >= 1; i--) { soma += numeros.charAt(tamanho - i) * pos--; if (pos < 2) pos = 9; }
        resultado = soma % 11 < 2 ? 0 : 11 - soma % 11; if (resultado != digitos.charAt(1)) return false; return true;
    }

    const applyMask = (v, type) => {
        if(!v) return ''; let unmasked = v.replace(/\D/g, '');
        if (type === 'cpf') {
            unmasked = unmasked.slice(0, 11);
            return unmasked.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2');
        }
        if (type === 'cpfcnpj') {
            if (unmasked.length <= 11) { return unmasked.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2'); } 
            else { return unmasked.slice(0,14).replace(/^(\d{2})(\d)/, '$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3').replace(/\.(\d{3})(\d)/, '.$1/$2').replace(/(\d{4})(\d)/, '$1-$2'); }
        }
        if (type === 'phone') {
            unmasked = unmasked.slice(0, 11);
            if (unmasked.length > 10) return unmasked.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3');
            if (unmasked.length > 6) return unmasked.replace(/^(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
            if (unmasked.length > 2) return unmasked.replace(/^(\d{2})(\d{0,5})/, '($1) $2');
            return unmasked.replace(/^(\d*)/, '($1');
        }
        return v;
    };

    /* ─── COMPONENTES GLOBAIS DE INTERFACE (UI) ─── */
    function MaskedInp({ label, name, defaultValue = '', maskType, required, placeholder }) {
        const[val, setVal] = useState('');
        useEffect(() => { setVal(applyMask(defaultValue || '', maskType)); },[defaultValue, maskType]);
        return (
            <div>
                {label && <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">{label}</label>}
                <input type="text" name={name} value={val} onChange={e => setVal(applyMask(e.target.value, maskType))} required={required} placeholder={placeholder} className="w-full p-3.5 rounded-xl text-sm font-medium bg-slate-50 border border-slate-200 focus:bg-white" />
            </div>
        );
    }

    function CurrencyInp({ label, name, defaultValue = 0, required, placeholder }) {
        const[disp, setDisp] = useState('');
        const formatMoney = (val) => {
            let num = val.toString().replace(/\D/g, '');
            if(!num) num = '0';
            num = (parseInt(num, 10) / 100).toFixed(2);
            return num.replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };
        useEffect(() => { setDisp(formatMoney((parseFloat(defaultValue) || 0).toFixed(2))); },[defaultValue]);
        const rawValue = disp.replace(/\./g, '').replace(',', '.');
        return (
            <div>
                {label && <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">{label}</label>}
                <div className="relative">
                    <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-bold text-sm">R$</span>
                    <input type="text" value={disp} onChange={e => setDisp(formatMoney(e.target.value))} required={required} placeholder={placeholder || "0,00"} className="w-full pl-10 p-3.5 rounded-xl text-sm font-medium bg-slate-50 border border-slate-200 focus:bg-white" />
                </div>
                <input type="hidden" name={name} value={rawValue} />
            </div>
        );
    }

    function CustomDialog({ config, onClose }) {
        if (!config.isOpen) return null;
        return ReactDOM.createPortal(
            <div className="fixed inset-0 z-[10000] flex items-center justify-center p-5 animate-scalein" style={{background:'rgba(15,23,42,0.85)', backdropFilter:'blur(8px)'}}>
                <div className="bg-[#1c1b22] border border-[#2a2931] w-full max-w-sm rounded-[2rem] shadow-2xl p-6 text-center relative">
                    <div className={`mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 border ${config.type === 'confirm' ? 'bg-amber-500/10 border-amber-500/30 text-amber-500' : (config.title==='Erro'||config.title==='Acesso Negado'||config.title==='Acesso Bloqueado'||config.title.includes('Inválido')||config.title==='Atenção' ? 'bg-red-500/10 border-red-500/30 text-red-500' : 'bg-purple-500/10 border-purple-500/30 text-purple-400')}`}>
                        <i className={`fa-solid ${config.type === 'confirm' ? 'fa-triangle-exclamation' : (config.title==='Sucesso' ? 'fa-check' : 'fa-bell')} text-2xl`}></i>
                    </div>
                    <h3 className="text-xl font-black text-white mb-2">{config.title}</h3>
                    <p className="text-sm text-gray-400 mb-8">{config.message}</p>
                    <div className="flex gap-3">
                        {config.type === 'confirm' && ( <button onClick={onClose} className="flex-1 py-3.5 rounded-xl font-bold text-slate-300 bg-[#2a2931] active:scale-95 transition-transform">Cancelar</button> )}
                        <button onClick={() => { if(config.onConfirm) config.onConfirm(); onClose(); }} className={`flex-1 py-3.5 rounded-xl font-bold text-white active:scale-95 transition-transform ${config.type === 'confirm' ? 'bg-red-600 shadow-[0_0_15px_rgba(220,38,38,0.4)]' : 'bg-purple-600 shadow-[0_0_15px_rgba(147,51,234,0.4)]'}`}>
                            {config.type === 'confirm' ? 'Confirmar' : 'Entendi'}
                        </button>
                    </div>
                </div>
            </div>,
            document.body
        );
    }

    function Modal({ onClose, children, title }) { 
      return ReactDOM.createPortal(
        <div className="fixed inset-0 z-[9900] flex items-end sm:items-center justify-center p-0 sm:p-4 no-print" style={{background:'rgba(15,23,42,0.6)', backdropFilter:'blur(4px)'}}>
          <div className="bg-white w-full sm:max-w-sm rounded-t-[2rem] sm:rounded-[2rem] shadow-2xl relative animate-slideup flex flex-col max-h-[90vh]">
            <div className="flex justify-between items-center px-6 py-5 border-b border-slate-100">
                <h3 className="font-black text-lg text-slate-800">{title || "Detalhes"}</h3>
                <button onClick={onClose} className="w-8 h-8 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center font-bold active:scale-95"><i className="fa-solid fa-xmark"></i></button>
            </div>
            <div className="p-6 overflow-y-auto no-scrollbar pb-safe">
              {children}
            </div>
          </div>
        </div>, 
        document.body
      ); 
    }

    function CustomSelect({ name, label, value, defaultValue, onChange, options, placeholder = "Selecione..." }) {
        const isControlled = value !== undefined;
        const[isOpen, setIsOpen] = useState(false);
        const[internalVal, setInternalVal] = useState(defaultValue || '');
        const currentVal = isControlled ? value : internalVal;
        const selectedOption = options.find(o => o.value === currentVal);

        const handleSelect = (val) => {
            if (!isControlled) setInternalVal(val);
            if(onChange) onChange(val);
            setIsOpen(false);
        };

        return (
            <div className="relative w-full">
                {label && <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">{label}</label>}
                <div onClick={() => setIsOpen(true)} className="w-full p-3.5 rounded-xl text-sm font-semibold bg-slate-50 border border-slate-200 text-slate-700 flex justify-between items-center cursor-pointer active:bg-slate-100 transition-colors">
                    <span className={selectedOption ? 'text-slate-800' : 'text-slate-400'}>{selectedOption ? selectedOption.label : placeholder}</span>
                    <i className="fa-solid fa-chevron-down text-slate-400"></i>
                </div>
                <input type="hidden" name={name} value={currentVal} />
                {isOpen && (
                    <Modal onClose={() => setIsOpen(false)} title={label || "Selecione uma opção"}>
                        <div className="space-y-2">
                            {options.map(opt => (
                                <button key={opt.value} type="button" onClick={() => handleSelect(opt.value)} className={`w-full text-left p-4 rounded-xl font-bold transition-all flex justify-between items-center ${currentVal === opt.value ? 'bg-purple-100 text-purple-700 border-2 border-purple-500' : 'bg-slate-50 text-slate-700 border border-slate-200 active:bg-slate-100'}`}>
                                    {opt.label}
                                    {currentVal === opt.value && <i className="fa-solid fa-circle-check text-purple-600 text-lg"></i>}
                                </button>
                            ))}
                            {options.length === 0 && <p className="text-center text-sm text-slate-400 py-6">Nenhuma opção disponível.</p>}
                        </div>
                    </Modal>
                )}
            </div>
        );
    }

    function NotificacaoItem({ notif, onDelete, onRead }) {
        const[offsetX, setOffsetX] = useState(0);
        const [startX, setStartX] = useState(0);

        const handleTouchStart = (e) => setStartX(e.touches[0].clientX);
        const handleTouchMove = (e) => { const diff = e.touches[0].clientX - startX; if (diff < 0) setOffsetX(diff); };
        const handleTouchEnd = () => {
            if (offsetX < -80) { setOffsetX(-1000); setTimeout(() => onDelete(notif.id), 200); } 
            else { setOffsetX(0); }
        };

        return (
            <div 
                onTouchStart={handleTouchStart} 
                onTouchMove={handleTouchMove} 
                onTouchEnd={handleTouchEnd}
                onClick={() => !notif.lida && onRead(notif.id)}
                style={{ transform: `translateX(${offsetX}px)`, transition: offsetX === 0 || offsetX === -1000 ? 'transform 0.2s' : 'none' }}
                className={`p-4 rounded-xl border relative overflow-hidden ${notif.lida ? 'bg-slate-50 border-slate-200 opacity-70' : 'bg-purple-50 border-purple-200 shadow-sm'}`}
            >
                {!notif.lida && <div className="absolute top-0 left-0 w-1 h-full bg-purple-500"></div>}
                <div className="flex justify-between items-start mb-1">
                    <h4 className={`font-black text-sm ${notif.lida ? 'text-slate-700' : 'text-purple-800'}`}>{notif.titulo}</h4>
                    <span className="text-[9px] font-bold text-slate-400">{fmt(notif.data)}</span>
                </div>
                <p className="text-xs text-slate-600 leading-relaxed">{notif.mensagem}</p>
                <div className="text-[9px] text-slate-400 mt-2 text-right opacity-50"><i className="fa-solid fa-arrow-left"></i> Arraste para apagar</div>
            </div>
        );
    }

    function NavButton({ icon, label, isActive, onClick }) { return (<button onClick={onClick} className="flex flex-col items-center justify-center relative px-2 py-1 rounded-xl transition-all" style={{ color: isActive ? '#9333ea' : '#94a3b8', minWidth: 44 }}><div className="relative"><i className={`fa-solid ${icon} text-[18px] transition-all ${isActive ? 'scale-110' : ''}`}></i>{isActive && <span className="absolute -bottom-2 left-1/2 transform -translate-x-1/2 w-1.5 h-1.5 bg-purple-600 rounded-full"></span>}</div><span className="text-[9px] font-bold mt-1">{label}</span></button>); }
    function SectionHeader({ title, action }) { return <div className="glass-card rounded-2xl px-4 py-3.5 flex justify-between items-center mb-4"><h3 className="text-base font-black text-slate-800">{title}</h3>{action}</div>; }
    function AddBtn({ onClick, active }) { return <button onClick={onClick} className="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg neon-button" style={{ background: active ? '#ef4444' : '' }}>{active ? <i className="fa-solid fa-xmark text-sm"></i> : '+'}</button>; }
    function Inp({ label, ...props }) { return <div className={props.className || ''}>{label && <label className="block text-[10px] font-bold text-slate-500 uppercase mb-1 ml-1">{label}</label>}<input {...props} className="w-full p-3.5 rounded-xl text-sm font-medium bg-slate-50 border border-slate-200 focus:bg-white" /></div>; }
    function FormCard({ children, onSubmit }) { return <form onSubmit={onSubmit} className="glass-card rounded-2xl p-4 animate-fadeinup border border-purple-200"><div className="grid grid-cols-2 gap-4">{children}</div></form>; }
    function InfoRow({ icon, label, value, color='#9333ea' }) { return (<div className="flex items-start gap-3 py-2.5 border-b border-slate-100 last:border-0"><div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{background:`${color}15`}}><i className={`fa-solid ${icon} text-sm`} style={{color}}></i></div><div className="flex-1 min-w-0"><p className="text-[10px] font-bold uppercase text-slate-400">{label}</p><p className="font-semibold text-sm text-slate-800 truncate">{value}</p></div></div>); }
    function StatCard({ icon, label, value, bgClass }) { 
      return (
        <div className={`rounded-2xl p-4 text-center shadow-lg relative overflow-hidden ${bgClass}`}>
          <i className={`fa-solid ${icon} text-white/20 text-5xl absolute -right-2 -bottom-2 transform rotate-[-15deg]`}></i>
          <div className="relative z-10">
            <i className={`fa-solid ${icon} text-white mb-2 text-xl`}></i>
            <p className="text-2xl font-black text-white">{value}</p>
            <p className="text-[9px] font-bold text-white/90 uppercase tracking-widest mt-0.5">{label}</p>
          </div>
        </div>
      ); 
    }

    /* ─── TELA DE LOGIN ─── */
    function Login({ showDialog }) {
      const[email, setEmail] = useState('');
      const[senha, setSenha] = useState('');
      const[loading, setLoading] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setLoading(true);
        try {
            await window.NexoFB.signInWithEmailAndPassword(window.NexoFB.auth, email, senha);
            SoundManager.login();
        } catch(error) {
            showDialog('alert', 'Acesso Negado', 'Verifique o e-mail corporativo e a senha fornecida pelo administrador.');
            setLoading(false);
        }
      };

      return (
        <div className="flex flex-col items-center justify-center h-full w-full bg-[#0f0e13] px-5 relative overflow-hidden z-50">
          <div className="absolute top-0 right-0 w-80 h-80 rounded-full opacity-20 bg-purple-600 blur-[80px] transform translate-x-1/3 -translate-y-1/3"></div>
          <div className="absolute bottom-0 left-0 w-80 h-80 rounded-full opacity-20 bg-purple-900 blur-[80px] transform -translate-x-1/3 translate-y-1/3"></div>

          <div className="w-full max-w-sm z-10 animate-fadeinup">
            <div className="text-center mb-8">
              <div className="w-24 h-24 mb-4 relative flex items-center justify-center animate-pulse-glow mx-auto">
                  <div className="absolute inset-0 bg-purple-600 blur-[25px] opacity-40 rounded-full"></div>
                  <svg viewBox="0 0 100 100" className="w-full h-full relative z-10" style={{filter: 'drop-shadow(0px 4px 15px rgba(0, 0, 0, 0.9))'}} xmlns="http://www.w3.org/2000/svg">
                      <defs>
                          <linearGradient id="nexoGradLogin" x1="0%" y1="0%" x2="100%" y2="100%">
                              <stop offset="0%" stopColor="#e9d5ff" />
                              <stop offset="50%" stopColor="#a855f7" />
                              <stop offset="100%" stopColor="#581c87" />
                          </linearGradient>
                      </defs>
                      <rect x="24" y="20" width="14" height="60" rx="7" fill="url(#nexoGradLogin)" />
                      <rect x="62" y="20" width="14" height="60" rx="7" fill="url(#nexoGradLogin)" />
                      <rect x="43" y="14" width="14" height="72" rx="7" fill="url(#nexoGradLogin)" transform="rotate(-35 50 50)" />
                  </svg>
              </div>
              
              <h1 className="text-4xl font-black text-white tracking-wide">Nexo FRP</h1>
              <p className="text-xs font-bold text-purple-400 mt-2 uppercase tracking-widest">Acesso do Cliente</p>
            </div>

            <div className="bg-[#1c1b22] rounded-[2rem] p-6 shadow-2xl border border-[#2a2931]">
              <form onSubmit={handleLogin} className="space-y-4">
                <div>
                  <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">E-mail Corporativo</label>
                  <input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-3.5 rounded-xl text-sm font-medium bg-[#2a2931] border border-[#3f3e46] text-white focus:border-purple-500 transition-all outline-none" placeholder="empresa@email.com" />
                </div>
                <div>
                  <label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Senha</label>
                  <input type="password" required value={senha} onChange={e=>setSenha(e.target.value)} className="w-full p-3.5 rounded-xl text-sm font-medium bg-[#2a2931] border border-[#3f3e46] text-white focus:border-purple-500 transition-all outline-none" placeholder="••••••••" />
                </div>
                <button type="submit" disabled={loading} className="w-full text-white font-bold py-3.5 rounded-xl mt-4 transition-all flex items-center justify-center gap-2 disabled:opacity-75 disabled:scale-100 active:scale-95 bg-purple-600 shadow-[0_0_15px_rgba(147,51,234,0.4)]">
                  {loading ? <i className="fa-solid fa-circle-notch fa-spin text-lg"></i> : 'Entrar no Sistema'}
                </button>
              </form>
            </div>
            <p className="text-center text-[10px] text-white/40 mt-6 font-semibold uppercase tracking-wider">&copy; 2026 NEXO BRASIL TECNOLOGIA</p>
          </div>
        </div>
      );
    }

    /* ─── CONFIGURAÇÕES DE CONTA ─── */
    function Configuracoes({ userProfile, onClose, onLogout, showDialog }) {
      const [view, setView] = useState('menu'); 
      const[senhaAtual, setSenhaAtual] = useState('');
      const[novoDado, setNovoDado] = useState('');
      const[loading, setLoading] = useState(false);

      const reautenticar = async () => {
        const { auth, EmailAuthProvider, reauthenticateWithCredential } = window.NexoFB;
        const cred = EmailAuthProvider.credential(auth.currentUser.email, senhaAtual);
        await reauthenticateWithCredential(auth.currentUser, cred);
      };

      const salvarAlteracao = async (e) => {
        e.preventDefault(); setLoading(true);
        try {
            await reautenticar();
            if(view === 'email') {
                await window.NexoFB.updateEmail(window.NexoFB.auth.currentUser, novoDado);
                showDialog('alert', 'Sucesso', "E-mail atualizado com sucesso!");
            } else if (view === 'senha') {
                await window.NexoFB.updatePassword(window.NexoFB.auth.currentUser, novoDado);
                showDialog('alert', 'Sucesso', "Senha atualizada com sucesso!");
            }
            setView('menu');
        } catch(err) {
            showDialog('alert', 'Erro de Autenticação', "A senha atual informada está incorreta.");
        }
        setLoading(false);
      };

      return (
        <Modal onClose={onClose} title={view === 'menu' ? "Configurações" : view === 'assinatura' ? "Detalhes da Assinatura" : `Alterar ${view==='email'?'E-mail':'Senha'}`}>
          {view === 'menu' ? (
            <>
              <div className="rounded-2xl p-5 mb-5 text-center" style={{background:'linear-gradient(135deg,#f3e8ff,#e9d5ff)', border:'1px solid #d8b4fe'}}>
                <div className="w-16 h-16 rounded-full mx-auto flex items-center justify-center text-white text-2xl font-black mb-3" style={{background:'linear-gradient(135deg,#9333ea,#6b21a8)'}}>{userProfile.nome.charAt(0)}</div>
                <p className="font-bold text-slate-800">{userProfile.nome}</p>
                <p className="text-xs text-slate-500 mt-1">{userProfile.email}</p>
              </div>
              <div className="space-y-2 mb-6">
                <button onClick={()=>setView('assinatura')} className="w-full flex justify-between items-center p-4 rounded-xl font-semibold text-sm text-slate-700 bg-slate-50 border border-slate-200 active:bg-slate-100 transition-colors"><span className="flex items-center gap-3"><i className="fa-solid fa-file-contract text-purple-500"></i> Minha Assinatura</span><i className="fa-solid fa-chevron-right text-slate-300 text-xs"></i></button>
                <button onClick={()=>setView('email')} className="w-full flex justify-between items-center p-4 rounded-xl font-semibold text-sm text-slate-700 bg-slate-50 border border-slate-200 active:bg-slate-100 transition-colors"><span className="flex items-center gap-3"><i className="fa-solid fa-envelope text-purple-500"></i> Trocar E-mail</span><i className="fa-solid fa-chevron-right text-slate-300 text-xs"></i></button>
                <button onClick={()=>setView('senha')} className="w-full flex justify-between items-center p-4 rounded-xl font-semibold text-sm text-slate-700 bg-slate-50 border border-slate-200 active:bg-slate-100 transition-colors"><span className="flex items-center gap-3"><i className="fa-solid fa-lock text-purple-500"></i> Alterar Senha</span><i className="fa-solid fa-chevron-right text-slate-300 text-xs"></i></button>
              </div>
              <button onClick={()=>{ onClose(); onLogout(); }} className="w-full py-3.5 rounded-xl font-bold text-red-600 bg-red-50 border border-red-200 active:scale-95 transition-transform"><i className="fa-solid fa-arrow-right-from-bracket mr-2"></i> Sair do Sistema</button>
            </>
          ) : view === 'assinatura' ? (
             <div className="animate-scalein space-y-4">
                <div className="bg-purple-50 border border-purple-200 p-5 rounded-2xl text-center">
                    <i className="fa-solid fa-crown text-3xl text-purple-500 mb-2"></i>
                    <h3 className="font-black text-xl text-purple-800">{userProfile.assinatura?.plano || 'Não informado'}</h3>
                    <p className="text-xs text-purple-600 font-bold uppercase mt-1">Plano Atual</p>
                </div>
                <div className="bg-slate-50 border border-slate-100 p-4 rounded-2xl">
                    <InfoRow icon="fa-calendar-check" label="Vencimento" value={fmt(userProfile.assinatura?.vencimento) || '—'} />
                    <InfoRow icon="fa-money-bill" label="Valor Contratado" value={userProfile.assinatura?.valor ? fmtMoeda(userProfile.assinatura.valor) : '—'} color="#10b981" />
                </div>
                <button onClick={()=>setView('menu')} className="w-full py-3.5 mt-2 rounded-xl font-bold text-slate-600 bg-slate-100 active:scale-95 transition-transform">Voltar</button>
            </div>
          ) : (
            <div className="animate-scalein">
              <form onSubmit={salvarAlteracao} className="space-y-4">
                <Inp type="password" required value={senhaAtual} onChange={e=>setSenhaAtual(e.target.value)} label="Senha Atual (Confirmação)" placeholder="••••••••" />
                <Inp type={view==='email'?'email':'text'} required value={novoDado} onChange={e=>setNovoDado(e.target.value)} label={`Novo ${view==='email'?'E-mail':'Senha'}`} placeholder={view==='email'?'novo@email.com':'Nova senha (mín. 6)'} minLength={view==='senha'?6:0} />
                <div className="flex gap-2 mt-4">
                    <button type="button" onClick={()=>setView('menu')} className="w-14 py-3.5 rounded-xl font-bold text-slate-600 bg-slate-100 active:scale-95 transition-transform"><i className="fa-solid fa-arrow-left"></i></button>
                    <button type="submit" disabled={loading} className="flex-1 py-3.5 rounded-xl font-bold text-white neon-button">{loading?'Salvando...':'Confirmar'}</button>
                </div>
              </form>
            </div>
          )}
        </Modal>
      );
    }

    /* ─── TELAS E LÓGICAS CRUD ─── */
    function Dashboard({ viagens, caixa, passageiros, reservas, setActiveTab }) {
      const saldo = caixa.filter(c=>c.tipo==='entrada').reduce((a,b)=>a+b.valor,0) - caixa.filter(c=>c.tipo==='saida').reduce((a,b)=>a+b.valor,0);
      const entradas = caixa.filter(c=>c.tipo==='entrada').reduce((a,b)=>a+b.valor,0);
      const saidas = caixa.filter(c=>c.tipo==='saida').reduce((a,b)=>a+b.valor,0);
      const proximas = viagens.map(v => ({ ...v, diasAte: diasAte(v.dataSaida) })).filter(v => v.diasAte !== null && v.diasAte >= 0).sort((a,b) => a.diasAte - b.diasAte);
      const totalPoltronas = Object.values(reservas).reduce((acc, r) => acc + Object.keys(r).length, 0);

      return (
        <div className="space-y-4">
          <div className="rounded-2xl p-5 relative overflow-hidden" style={{background:'linear-gradient(135deg,#9333ea 0%,#6b21a8 100%)', boxShadow:'0 8px 32px rgba(147,51,234,0.35)'}}>
            <div className="absolute top-0 right-0 opacity-10 text-[120px] leading-none translate-x-5 -translate-y-4"><i className="fa-solid fa-sack-dollar"></i></div>
            <p className="text-[11px] font-bold uppercase tracking-widest text-white/80 mb-1">Caixa Geral</p>
            <h3 className="text-3xl font-black text-white">{fmtMoeda(saldo)}</h3>
            <div className="flex gap-4 mt-3">
              <span className="text-[11px] text-white/90 font-semibold flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_#34d399]"></div>Entradas: {fmtMoeda(entradas)}</span>
              <span className="text-[11px] text-white/90 font-semibold flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-rose-400 shadow-[0_0_8px_#fb7185]"></div>Saídas: {fmtMoeda(saidas)}</span>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <StatCard icon="fa-map-location-dot" label="Viagens" value={viagens.length} bgClass="bg-gradient-to-br from-blue-600 to-cyan-500" />
            <StatCard icon="fa-users" label="Pessoas" value={passageiros.length} bgClass="bg-gradient-to-br from-emerald-500 to-teal-400" />
            <StatCard icon="fa-bus" label="Poltronas" value={`${totalPoltronas}`} bgClass="bg-gradient-to-br from-amber-500 to-orange-400" />
          </div>
          <div className="glass-card rounded-2xl overflow-hidden">
            <div className="flex justify-between items-center px-4 pt-4 pb-2"><h4 className="font-black text-sm text-slate-800"><i className="fa-solid fa-calendar-check mr-2 text-purple-600"></i>Próximas Viagens</h4><button onClick={()=>setActiveTab('viagens')} className="text-[10px] font-bold px-2 py-1 rounded-lg bg-purple-50 text-purple-600">Ver todas</button></div>
            <div className="divider mx-4 border-b border-slate-100"></div>
            {proximas.length === 0 ? <div className="px-4 py-6 text-center text-sm text-slate-400 font-semibold"><i className="fa-solid fa-calendar-xmark text-2xl mb-2 block text-slate-300"></i>Nenhuma viagem agendada</div> : proximas.map(v => {
              const ocupados = Object.keys(reservas[v.id]||{}).length; const pct = Math.round((ocupados/46)*100); const pax = passageiros.filter(p=>p.viagemId===v.id).length;
              return (
                <div key={v.id} className="px-4 pb-4 mt-2">
                  <div className="rounded-xl p-3.5 bg-slate-50 border border-slate-200">
                    <div className="flex items-start justify-between mb-2"><div className="flex-1 pr-2"><p className="font-black text-slate-800 text-sm truncate">{v.destino}</p><p className="text-[10px] text-slate-500 mt-0.5"><i className="fa-solid fa-location-dot mr-1"></i>{v.localEmbarque}</p></div><div className="text-[10px] font-black px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700 shrink-0">{v.diasAte === 0 ? 'Hoje!' : v.diasAte === 1 ? 'Amanhã' : `${v.diasAte} dias`}</div></div>
                    <div className="flex gap-3 text-[10px] text-slate-600 font-semibold mb-3"><span><i className="fa-solid fa-calendar-day mr-1 text-purple-500"></i>{fmt(v.dataSaida)} · {v.horaSaida}</span><span><i className="fa-solid fa-users mr-1 text-green-500"></i>{pax} pax</span></div>
                    <div className="flex items-center gap-2"><div className="flex-1 h-2 rounded-full bg-slate-200"><div className="h-full rounded-full bg-purple-600" style={{width:`${pct}%`}}></div></div><span className="text-[10px] font-bold text-slate-500">{ocupados}/46</span></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function Viagens({ viagens, userProfile, showDialog }) {
      const[showForm, setShowForm] = useState(false);
      const[vSelecionada, setVSel] = useState(null);
      const[isEditing, setIsEditing] = useState(false);

      const salvar = async (e) => {
        e.preventDefault(); const t = e.target;
        const d = { destino: t.destino.value, dataSaida: t.dataSaida.value, horaSaida: t.horaSaida.value, dataRetorno: t.dataRetorno.value, horaRetorno: t.horaRetorno.value, localEmbarque: t.localEmbarque.value, valor: parseFloat(t.valor.value || 0) };
        const { db, collection, addDoc, doc, updateDoc } = window.NexoFB;
        const colRef = collection(db, "empresas", userProfile.empresaId, "viagens");
        
        if (isEditing && vSelecionada) { 
            await updateDoc(doc(colRef, vSelecionada.id), d); 
            setVSel(null); setIsEditing(false); 
        } else { 
            await addDoc(colRef, d); setShowForm(false); 
        }
      };

      const excluir = () => {
        showDialog('confirm', 'Excluir Viagem', 'Tem certeza que deseja excluir esta viagem definitivamente?', async () => {
            const { db, doc, deleteDoc } = window.NexoFB;
            await deleteDoc(doc(db, "empresas", userProfile.empresaId, "viagens", vSelecionada.id));
            setVSel(null);
        });
      };

      return (
        <div className="space-y-4">
          <SectionHeader title="Roteiros / Viagens" action={<AddBtn onClick={()=>setShowForm(!showForm)} active={showForm} />} />
          {showForm && (
            <FormCard onSubmit={salvar}>
              <div className="col-span-2"><Inp name="destino" required placeholder="Destino" label="Destino" /></div>
              <Inp type="date" name="dataSaida" required label="Data Saída" /><Inp type="time" name="horaSaida" required label="Hora Saída" />
              <Inp type="date" name="dataRetorno" required label="Data Retorno" /><Inp type="time" name="horaRetorno" required label="Hora Retorno" />
              <div className="col-span-2"><Inp name="localEmbarque" required placeholder="Local de Embarque" label="Local Embarque" /></div>
              <div className="col-span-2"><CurrencyInp name="valor" required label="Valor do Pacote por Pessoa" /></div>
              <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-2">Salvar Viagem</button>
            </FormCard>
          )}
          <div className="space-y-3">
            {viagens.map(v => (
              <div key={v.id} onClick={()=>{setVSel(v);setIsEditing(false);}} className="glass-card glass-card-hover rounded-xl p-4 flex justify-between items-center cursor-pointer border-l-4 border-purple-500">
                <div className="flex-1 pr-2"><h4 className="font-black text-slate-800 text-base">{v.destino}</h4><div className="flex gap-4 mt-1.5 text-[11px] text-slate-500 font-semibold"><span><i className="fa-solid fa-plane-departure mr-1 text-green-500"></i>{fmt(v.dataSaida)}</span></div><p className="text-[11px] text-slate-400 mt-1"><i className="fa-solid fa-location-dot mr-1"></i>{v.localEmbarque}</p></div>
                <div className="text-right shrink-0"><span className="bg-purple-100 text-purple-800 px-2.5 py-1 rounded-md text-xs font-bold border border-purple-200">{fmtMoeda(v.valor||0)}</span></div>
              </div>
            ))}
            {viagens.length===0 && !showForm && <div className="text-center py-6 text-slate-400 text-sm font-semibold">Nenhuma viagem cadastrada.</div>}
          </div>

          {vSelecionada && (
            <Modal onClose={()=>{setVSel(null);setIsEditing(false);}} title={isEditing ? "Editar Viagem" : "Detalhes da Viagem"}>
              {isEditing ? (
                <form onSubmit={salvar} className="grid grid-cols-2 gap-4 pb-2">
                    <div className="col-span-2"><Inp name="destino" defaultValue={vSelecionada.destino} required label="Destino" /></div>
                    <Inp type="date" name="dataSaida" defaultValue={vSelecionada.dataSaida} required label="Data Saída" /><Inp type="time" name="horaSaida" defaultValue={vSelecionada.horaSaida} required label="Hora Saída" />
                    <Inp type="date" name="dataRetorno" defaultValue={vSelecionada.dataRetorno} required label="Data Retorno" /><Inp type="time" name="horaRetorno" defaultValue={vSelecionada.horaRetorno} required label="Hora Retorno" />
                    <div className="col-span-2"><Inp name="localEmbarque" defaultValue={vSelecionada.localEmbarque} required label="Local de Embarque" /></div>
                    <div className="col-span-2"><CurrencyInp name="valor" defaultValue={vSelecionada.valor} required label="Valor da Viagem por Pessoa" /></div>
                    <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-2">Salvar Alterações</button>
                    <button type="button" onClick={()=>setIsEditing(false)} className="col-span-2 py-3.5 rounded-xl font-bold text-slate-600 bg-slate-100">Cancelar</button>
                </form>
              ) : (
                <>
                  <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-6">
                    <h4 className="font-black text-lg text-slate-800 mb-2">{vSelecionada.destino}</h4>
                    <span className="bg-purple-100 text-purple-800 px-3 py-1.5 rounded-lg text-xs font-bold mb-4 inline-block border border-purple-200">Valor do Pacote: {fmtMoeda(vSelecionada.valor||0)}</span>
                    <InfoRow icon="fa-plane-departure" label="Saída"    value={`${fmt(vSelecionada.dataSaida)} às ${vSelecionada.horaSaida}`} color="#10b981" />
                    <InfoRow icon="fa-plane-arrival"   label="Retorno"  value={`${fmt(vSelecionada.dataRetorno)} às ${vSelecionada.horaRetorno}`} color="#ef4444" />
                    <InfoRow icon="fa-location-dot"    label="Embarque" value={vSelecionada.localEmbarque} color="#f59e0b" />
                  </div>
                  <div className="flex gap-2">
                    <button onClick={excluir} className="w-14 h-12 rounded-xl flex items-center justify-center font-bold bg-red-50 text-red-600 active:scale-95"><i className="fa-solid fa-trash"></i></button>
                    <button onClick={()=>setIsEditing(true)} className="flex-1 h-12 rounded-xl font-bold text-white neon-button flex items-center justify-center"><i className="fa-solid fa-pen mr-2"></i> Editar Informações</button>
                  </div>
                </>
              )}
            </Modal>
          )}
        </div>
      );
    }

    function Passageiros({ passageiros, viagens, viagemSelecionadaId, setViagemSelecionadaId, exportarPDF, caixa, reservas, userProfile, showDialog }) {
      const[showForm, setShowForm] = useState(false);
      const[passSel, setPassSel] = useState(null);
      const[isEditing, setIsEditing] = useState(false);
      const[formViagemId, setFormViagemId] = useState(viagemSelecionadaId);

      const salvar = async (e) => {
        e.preventDefault(); const t = e.target;
        const cpfRaw = t.cpf.value.replace(/\D/g, '');
        if(!isValidCPF(cpfRaw)) return showDialog('alert', 'Atenção', 'O CPF informado é inválido ou não existe.');
        if(t.rg.value.trim().length < 4) return showDialog('alert', 'Atenção', 'O RG informado é muito curto para ser válido.');
        const phoneRaw = t.tel.value.replace(/\D/g, '');
        if(phoneRaw.length < 10) return showDialog('alert', 'Atenção', 'O número de telefone deve conter o DDD.');
        if(t.emerg.value.trim().length < 5) return showDialog('alert', 'Atenção', 'Preencha o contato de emergência corretamente (Ex: Mãe 1199999).');

        const vSelecionadaNoForm = t.viagemIdInput ? t.viagemIdInput.value : formViagemId;
        const d = { nome:t.nome.value, cpf:t.cpf.value, rg:t.rg.value, nascimento:t.nasc.value, telefone:t.tel.value, emergencial:t.emerg.value, viagemId: vSelecionadaNoForm };
        const { db, collection, addDoc, doc, updateDoc } = window.NexoFB;
        const colRef = collection(db, "empresas", userProfile.empresaId, "passageiros");
        
        if (isEditing && passSel) { 
            await updateDoc(doc(colRef, passSel.id), d); 
            setPassSel(null); setIsEditing(false); 
        } else { 
            if(!d.viagemId) return showDialog('alert', 'Atenção', 'Selecione ou crie uma viagem primeiro.');
            await addDoc(colRef, d); setShowForm(false); 
        }
      };

      const excluir = () => {
        showDialog('confirm', 'Excluir Cliente', 'Deseja excluir este cliente? Seus pagamentos e poltrona serão desvinculados.', async () => {
            const { db, doc, deleteDoc, setDoc } = window.NexoFB;
            await deleteDoc(doc(db, "empresas", userProfile.empresaId, "passageiros", passSel.id));
            let r = {...reservas}; let mudou = false;
            for(let v in r) { for(let p in r[v]) { if(r[v][p] === passSel.id) { delete r[v][p]; mudou = true; } } }
            if(mudou) await setDoc(doc(db, "empresas", userProfile.empresaId, "config", "reservas"), { mapa: r });
            setPassSel(null);
        });
      };

      const paxViagem = passageiros.filter(p=>p.viagemId===viagemSelecionadaId);
      const vAtiva = viagens.find(v=>v.id===viagemSelecionadaId);
      const vValor = vAtiva ? (vAtiva.valor || 0) : 0;

      return (
        <div className="space-y-4">
          <div className="glass-card p-4 rounded-2xl">
             <CustomSelect name="filtroV" label="Filtrar por Viagem" value={viagemSelecionadaId} onChange={val=>setViagemSelecionadaId(val)} options={viagens.map(v=>({label: v.destino, value: v.id}))} placeholder="Selecione uma viagem..." />
          </div>
          <SectionHeader title={`Passageiros (${paxViagem.length})`} action={<div className="flex gap-2"><button onClick={()=>exportarPDF('roomingList')} className="w-9 h-9 rounded-full bg-slate-100 text-slate-600 border border-slate-200 shadow-sm active:scale-95 transition-transform"><i className="fa-solid fa-file-pdf"></i></button><AddBtn onClick={()=>{setShowForm(!showForm); setFormViagemId(viagemSelecionadaId);}} active={showForm} /></div>} />
          
          {showForm && (
            <FormCard onSubmit={salvar}>
              <div className="col-span-2"><Inp name="nome" required placeholder="Nome Completo" label="Nome" /></div>
              <MaskedInp name="cpf" maskType="cpf" required placeholder="000.000.000-00" label="CPF" />
              <Inp name="rg" required placeholder="Ex: MG-12.345" label="RG" />
              <Inp type="date" name="nasc" required label="Nascimento" />
              <MaskedInp name="tel" maskType="phone" required placeholder="(00) 00000-0000" label="Telefone" />
              <div className="col-span-2"><Inp name="emerg" required placeholder="Contato (Nome/Tel)" label="Emergência" /></div>
              <div className="col-span-2"><CustomSelect name="viagemIdInput" label="Vincular a Viagem" value={formViagemId} onChange={setFormViagemId} options={viagens.map(v=>({label:v.destino, value:v.id}))} required /></div>
              <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-2">Salvar Passageiro</button>
            </FormCard>
          )}

          <div className="space-y-2">
            {paxViagem.map(p => {
              const pago = caixa.filter(c=>c.tipo==='entrada'&&c.passageiroId===p.id).reduce((a,b)=>a+b.valor,0);
              let badgeCls = "bg-red-50 text-red-600 border-red-200"; let badgeTxt = "Pendente";
              if(vValor > 0 && pago >= vValor) { badgeCls = "bg-emerald-50 text-emerald-600 border-emerald-200"; badgeTxt = "Pago"; }
              else if (pago > 0) { badgeCls = "bg-amber-50 text-amber-600 border-amber-200"; badgeTxt = "Parcial"; }

              return (
                <div key={p.id} onClick={()=>{setPassSel(p);setIsEditing(false);}} className="glass-card glass-card-hover rounded-xl p-3.5 flex items-center gap-3 cursor-pointer border-l-4 border-purple-400">
                  <div className="w-11 h-11 rounded-xl flex items-center justify-center text-purple-600 font-black bg-purple-100 shrink-0">{p.nome.charAt(0)}</div>
                  <div className="flex-1 min-w-0"><p className="font-bold text-sm text-slate-800 truncate">{p.nome}</p><p className="text-[10px] text-slate-400"><i className="fa-brands fa-whatsapp text-green-500 mr-1"></i>{p.telefone}</p></div>
                  <div className="text-right flex flex-col items-end gap-1">
                     <span className={`text-[9px] font-bold px-2 py-0.5 rounded-md border ${badgeCls}`}>{badgeTxt}</span>
                     <span className="text-[10px] text-slate-500 font-bold">{fmtMoeda(pago)}</span>
                  </div>
                </div>
              );
            })}
            {paxViagem.length===0 && !showForm && <div className="text-center py-6 text-slate-400 text-sm font-semibold">Nenhum passageiro nesta viagem.</div>}
          </div>

          {passSel && (
            <Modal onClose={()=>{setPassSel(null);setIsEditing(false);}} title={isEditing ? "Editar Cliente" : "Ficha do Cliente"}>
              {isEditing ? (
                  <form onSubmit={salvar} className="grid grid-cols-2 gap-4 pb-2">
                    <div className="col-span-2"><Inp name="nome" defaultValue={passSel.nome} required label="Nome Completo" /></div>
                    <MaskedInp name="cpf" defaultValue={passSel.cpf} maskType="cpf" required label="CPF" />
                    <Inp name="rg" defaultValue={passSel.rg} required label="RG" />
                    <Inp type="date" name="nasc" defaultValue={passSel.nascimento} required label="Nascimento" />
                    <MaskedInp name="tel" defaultValue={passSel.telefone} maskType="phone" required label="Telefone" />
                    <div className="col-span-2"><Inp name="emerg" defaultValue={passSel.emergencial} required label="Emergência" /></div>
                    <div className="col-span-2"><CustomSelect name="viagemIdInput" label="Mudar Viagem" defaultValue={passSel.viagemId} options={viagens.map(v=>({label:v.destino, value:v.id}))} /></div>
                    <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-2">Salvar Alterações</button>
                    <button type="button" onClick={()=>setIsEditing(false)} className="col-span-2 py-3.5 rounded-xl font-bold text-slate-600 bg-slate-100">Cancelar</button>
                  </form>
              ) : (
                <>
                  <div className="text-center mb-6">
                    <div className="w-20 h-20 rounded-full flex items-center justify-center text-purple-600 font-black text-3xl mx-auto mb-3 bg-purple-100">{passSel.nome.charAt(0)}</div>
                    <h3 className="font-black text-2xl text-slate-800 leading-tight">{passSel.nome}</h3>
                  </div>
                  <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-6">
                    <InfoRow icon="fa-id-card" label="CPF" value={passSel.cpf} />
                    <InfoRow icon="fa-fingerprint" label="RG" value={passSel.rg} />
                    <InfoRow icon="fa-cake-candles" label="Nascimento" value={fmt(passSel.nascimento)} />
                    <InfoRow icon="fa-phone" label="Telefone" value={passSel.telefone} color="#10b981" />
                    <InfoRow icon="fa-heart-pulse" label="Emergência" value={passSel.emergencial} color="#ef4444" />
                  </div>
                  <div className="flex gap-2">
                    <button onClick={excluir} className="w-14 h-12 rounded-xl flex items-center justify-center bg-red-50 text-red-600 active:scale-95"><i className="fa-solid fa-trash"></i></button>
                    <button onClick={()=>setIsEditing(true)} className="flex-1 h-12 rounded-xl font-bold text-white neon-button flex items-center justify-center"><i className="fa-solid fa-pen mr-2"></i> Editar Cliente</button>
                  </div>
                </>
              )}
            </Modal>
          )}
        </div>
      );
    }

    function Caixa({ viagens, viagemSelecionadaId, setViagemSelecionadaId, caixa, passageiros, fornecedores, exportarPDF, setReciboData, userProfile, showDialog }) {
      const [showForm, setShowForm] = useState(false);
      const[tipo, setTipo] = useState('entrada');
      const[transSel, setTransSel] = useState(null);
      const[formViagemId, setFormViagemId] = useState(viagemSelecionadaId);

      const transViagem = caixa.filter(c=>c.viagemId===viagemSelecionadaId);
      const entradas = transViagem.filter(c=>c.tipo==='entrada').reduce((a,b)=>a+b.valor,0);
      const saidas = transViagem.filter(c=>c.tipo==='saida').reduce((a,b)=>a+b.valor,0);

      const salvar = async (e) => {
        e.preventDefault(); const t=e.target; 
        const dataVal = (t.dataManual && t.dataManual.value) ? t.dataManual.value : new Date().toISOString().split('T')[0]; 
        const horaVal = (t.horaManual && t.horaManual.value) ? t.horaManual.value : new Date().toTimeString().split(' ')[0].substring(0,5);
        const vSelecionadaNoForm = t.viagemIdInput ? t.viagemIdInput.value : formViagemId;

        const d = { 
            viagemId: vSelecionadaNoForm, 
            tipo, valor:parseFloat(t.valor.value), desc:t.desc.value, 
            passageiroId: tipo === 'entrada' && t.passId ? t.passId.value : '', 
            fornecedorId: tipo === 'saida' && t.fornId ? t.fornId.value : '',
            data: dataVal, hora: horaVal, forma:t.forma.value 
        };
        
        if(!d.viagemId) return showDialog('alert','Atenção','Selecione uma viagem para o lançamento.');

        const { db, collection, addDoc } = window.NexoFB;
        await addDoc(collection(db, "empresas", userProfile.empresaId, "caixa"), d);
        setShowForm(false); e.target.reset();
      };

      const excluir = () => {
        showDialog('confirm', 'Excluir Lançamento', 'Atenção: Este lançamento será apagado do sistema.', async () => {
            const { db, doc, deleteDoc } = window.NexoFB;
            await deleteDoc(doc(db, "empresas", userProfile.empresaId, "caixa", transSel.id));
            setTransSel(null);
        });
      };

      return (
        <div className="space-y-4">
          <div className="glass-card p-4 rounded-2xl flex gap-3 items-center">
             <CustomSelect name="filtroC" label="Caixa da Viagem" value={viagemSelecionadaId} onChange={val=>setViagemSelecionadaId(val)} options={viagens.map(v=>({label: v.destino, value: v.id}))} placeholder="Nenhuma selecionada" />
             <button onClick={()=>exportarPDF('caixa')} className="w-12 h-12 rounded-xl bg-slate-100 border border-slate-200 text-slate-600 flex items-center justify-center shadow-sm shrink-0 mt-3 active:scale-95 transition-transform"><i className="fa-solid fa-file-pdf"></i></button>
          </div>

          <div className="rounded-2xl p-5 bg-[#1c1b22] text-white shadow-[0_4px_20px_rgba(0,0,0,0.1)] relative overflow-hidden">
             <div className="absolute top-0 right-0 w-32 h-32 bg-purple-600 rounded-full blur-[40px] opacity-20 translate-x-1/2 -translate-y-1/4"></div>
             <p className="text-[10px] font-bold uppercase text-purple-400 mb-1 relative z-10">Resumo da Viagem</p>
             <h3 className="text-3xl font-black relative z-10 mb-4">{fmtMoeda(entradas-saidas)} <span className="text-[10px] font-medium text-slate-400 uppercase tracking-widest ml-1">Lucro</span></h3>
             <div className="flex gap-6 relative z-10 border-t border-[#2a2931] pt-3">
                 <div><p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Entradas</p><p className="text-sm font-bold text-emerald-400">{fmtMoeda(entradas)}</p></div>
                 <div><p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Saídas</p><p className="text-sm font-bold text-red-400">{fmtMoeda(saidas)}</p></div>
             </div>
          </div>
          
          <button onClick={()=>{setShowForm(!showForm); setFormViagemId(viagemSelecionadaId);}} className={`w-full text-white font-bold py-3.5 rounded-xl shadow-lg ${showForm?'bg-red-500':'neon-button'}`}>{showForm ? 'Cancelar Lançamento' : '+ Novo Lançamento'}</button>
          
          {showForm && (
            <FormCard onSubmit={salvar}>
              <div className="col-span-2 flex gap-2"><button type="button" onClick={()=>setTipo('entrada')} className={`flex-1 py-3 rounded-xl font-bold text-sm ${tipo==='entrada'?'bg-emerald-500 text-white shadow-md':'bg-slate-100 text-slate-500 border border-slate-200'}`}>Entrada (+)</button><button type="button" onClick={()=>setTipo('saida')} className={`flex-1 py-3 rounded-xl font-bold text-sm ${tipo==='saida'?'bg-red-500 text-white shadow-md':'bg-slate-100 text-slate-500 border border-slate-200'}`}>Saída (-)</button></div>
              <div className="col-span-2"><CustomSelect name="viagemIdInput" label="Vincular a Viagem" value={formViagemId} onChange={setFormViagemId} options={viagens.map(v=>({label:v.destino, value:v.id}))} required /></div>
              <CurrencyInp name="valor" required label="Valor (R$)" />
              <Inp name="desc" required label="Descrição" placeholder={tipo==='entrada'?"Ex: Sinal Pacote":"Ex: Adiantamento Guia"} />
              <div className="col-span-2">
                  {tipo==='entrada' ? 
                      <CustomSelect name="passId" label="Vincular Cliente Pagante" options={[{label:'Nenhum (Avulso)', value:''}, ...passageiros.filter(p=>p.viagemId===formViagemId).map(p=>({label:p.nome, value:p.id}))]} /> 
                      : 
                      <CustomSelect name="fornId" label="Vincular Fornecedor (Destinatário)" options={[{label:'Nenhum (Avulso)', value:''}, ...fornecedores.map(f=>({label:f.nome, value:f.id}))]} />
                  }
              </div>
              <div className="col-span-2"><CustomSelect name="forma" label="Forma de Pgto" options={[{label:'Pix',value:'Pix'},{label:'Dinheiro',value:'Dinheiro'},{label:'Cartão',value:'Cartão'},{label:'Transferência',value:'Transferência'}]} /></div>
              
              <Inp type="date" name="dataManual" label="Data (Opcional)" />
              <Inp type="time" name="horaManual" label="Hora (Opcional)" />
              
              <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-2">Registrar Transação</button>
            </FormCard>
          )}

          <div className="space-y-2">
            {transViagem.map(c => {
              const vinculou = c.tipo === 'entrada' ? passageiros.find(p=>p.id===c.passageiroId)?.nome : fornecedores.find(f=>f.id===c.fornecedorId)?.nome;
              return (
              <div key={c.id} onClick={()=>setTransSel(c)} className={`glass-card glass-card-hover rounded-xl p-3.5 flex justify-between items-center cursor-pointer border-l-4 ${c.tipo==='entrada'?'border-emerald-500':'border-red-500'}`}>
                <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${c.tipo==='entrada'?'bg-emerald-50 text-emerald-600 border border-emerald-100':'bg-red-50 text-red-600 border border-red-100'}`}><i className={`fa-solid ${c.tipo==='entrada'?'fa-arrow-down':'fa-arrow-up'}`}></i></div>
                    <div><p className="font-bold text-sm text-slate-800">{c.desc}</p><p className="text-[9px] text-slate-400 font-bold uppercase tracking-wide">{fmt(c.data)} {vinculou ? `• ${vinculou}` : ''}</p></div>
                </div>
                <p className={`font-black ${c.tipo==='entrada'?'text-emerald-600':'text-red-500'}`}>{c.tipo==='entrada'?'+':'-'} {fmtMoeda(c.valor)}</p>
              </div>
            )})}
            {transViagem.length===0 && !showForm && <div className="text-center py-6 text-slate-400 text-sm font-semibold">Nenhuma transação nesta viagem.</div>}
          </div>

          {transSel && (
            <Modal onClose={()=>setTransSel(null)} title="Detalhes da Transação">
              <div className="text-center mb-6">
                <div className={`w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-3 border ${transSel.tipo==='entrada'?'bg-emerald-50 text-emerald-600 border-emerald-100':'bg-red-50 text-red-600 border-red-100'}`}><i className={`fa-solid ${transSel.tipo==='entrada'?'fa-arrow-down':'fa-arrow-up'} text-3xl`}></i></div>
                <p className="text-xs font-bold text-slate-500 uppercase tracking-widest">{transSel.tipo}</p>
                <h3 className={`font-black text-3xl mt-1 ${transSel.tipo==='entrada'?'text-emerald-600':'text-red-600'}`}>{transSel.tipo==='entrada'?'+':'-'} {fmtMoeda(transSel.valor)}</h3>
              </div>
              <div className="bg-slate-50 p-4 rounded-2xl border border-slate-100 mb-6">
                <InfoRow icon="fa-tag" label="Descrição" value={transSel.desc} />
                <InfoRow icon="fa-credit-card" label="Forma" value={transSel.forma} />
                <InfoRow icon="fa-calendar" label="Data/Hora" value={`${fmt(transSel.data)} às ${transSel.hora}`} />
                {transSel.tipo==='entrada' && transSel.passageiroId && <InfoRow icon="fa-user" label="Cliente Pagante" value={passageiros.find(p=>p.id===transSel.passageiroId)?.nome} />}
                {transSel.tipo==='saida' && transSel.fornecedorId && <InfoRow icon="fa-handshake" label="Fornecedor (Recebedor)" value={fornecedores.find(f=>f.id===transSel.fornecedorId)?.nome} color="#ef4444" />}
              </div>
              <div className="flex gap-2">
                <button onClick={excluir} className="w-14 h-12 rounded-xl flex items-center justify-center bg-red-50 text-red-600 active:scale-95"><i className="fa-solid fa-trash"></i></button>
                {transSel.tipo==='entrada' && transSel.passageiroId ? <button onClick={()=>{const pass=passageiros.find(p=>p.id===transSel.passageiroId); setReciboData({valor:transSel.valor,desc:transSel.desc,clienteNome:pass.nome,clienteCpf:pass.cpf,data:transSel.data,hora:transSel.hora,forma:transSel.forma}); setTransSel(null); exportarPDF('recibo');}} className="flex-1 h-12 rounded-xl font-bold text-white neon-button flex items-center justify-center"><i className="fa-solid fa-file-invoice mr-2"></i> Emitir Recibo</button> : <button disabled className="flex-1 h-12 rounded-xl font-bold bg-slate-100 text-slate-400">Recibo Indisponível</button>}
              </div>
            </Modal>
          )}
        </div>
      );
    }

    function Onibus({ viagens, viagemSelecionadaId, setViagemSelecionadaId, reservas, passageiros, exportarPDF, userProfile, showDialog }) {
      const assentos = Array.from({length:46},(_,i)=>i+1);
      const[assentoSel, setAssentoSel] = useState(null);
      const reservasViagem = reservas[viagemSelecionadaId] || {};

      const setReservaFirebase = async (r) => {
        const { db, doc, setDoc } = window.NexoFB;
        await setDoc(doc(db, "empresas", userProfile.empresaId, "config", "reservas"), { mapa: r });
      };

      return (
        <div className="space-y-4">
          <div className="glass-card p-4 rounded-2xl"><CustomSelect name="mapaV" label="Mapa da Viagem" value={viagemSelecionadaId} onChange={val=>setViagemSelecionadaId(val)} options={viagens.map(v=>({label: v.destino, value: v.id}))} placeholder="Selecione uma viagem..." /></div>
          
          {viagemSelecionadaId && (
            <div className="glass-card p-5 rounded-[2rem]">
              <div className="flex justify-between items-center mb-6"><h3 className="text-base font-black text-slate-800">Layout do Ônibus</h3><button onClick={()=>exportarPDF('manifesto')} className="px-3 py-1.5 rounded-lg text-xs font-bold text-white bg-slate-800 active:scale-95 transition-transform"><i className="fa-solid fa-file-pdf"></i> PDF</button></div>
              <div className="mx-auto rounded-[2.5rem] overflow-hidden bg-[#1c1b22] border-[6px] border-[#2a2931] shadow-2xl relative" style={{width:280}}>
                <div className="h-14 flex items-center justify-center bg-purple-500/10 border-b-[3px] border-[#2a2931] relative">
                    <i className="fa-solid fa-steering-wheel text-purple-400 text-2xl absolute left-6 opacity-50"></i>
                    <span className="text-[10px] font-bold tracking-widest text-purple-400 uppercase">Frente</span>
                </div>
                <div className="grid grid-cols-5 gap-1.5 p-4 pb-6">
                  {assentos.map(num => {
                    const isOcupado = !!reservasViagem[num]; const isSel = assentoSel === num;
                    let cls = isSel ? 'seat-sel' : isOcupado ? 'bg-slate-700 text-slate-400 border-[#3f3e46]' : 'bg-[#2a2931] text-white border-[#3f3e46]';
                    return (<React.Fragment key={num}><button onClick={()=>setAssentoSel(num===assentoSel?null:num)} className={`seat-btn w-full aspect-[3/4] flex flex-col items-center justify-center text-[11px] font-black rounded-lg border-b-4 transition-all active:scale-90 ${cls}`}>{num}</button>{num%2===0 && num%4!==0 && <div className="w-2"></div>}</React.Fragment>);
                  })}
                </div>
              </div>
            </div>
          )}

          {assentoSel && (
            <div className="glass-card rounded-[2rem] p-5 border-2 border-purple-200 animate-slideup">
              <div className="flex items-center gap-3 mb-4">
                  <div className="w-10 h-10 bg-purple-100 rounded-xl flex items-center justify-center text-purple-600 font-black border border-purple-200">{assentoSel}</div>
                  <div><p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Poltrona</p><p className="font-black text-slate-800">Ação Necessária</p></div>
              </div>
              
              {reservasViagem[assentoSel] ? (
                <>
                  <div className="bg-slate-50 p-3.5 rounded-xl mb-3 font-bold text-sm border border-slate-200 text-slate-700"><i className="fa-solid fa-user text-purple-400 mr-2"></i> {passageiros.find(p=>p.id===reservasViagem[assentoSel])?.nome||'Desconhecido'}</div>
                  <button onClick={()=>{const r={...reservas};delete r[viagemSelecionadaId][assentoSel]; setReservaFirebase(r); setAssentoSel(null);}} className="w-full py-3.5 rounded-xl font-bold bg-red-50 text-red-600 border border-red-200 active:scale-95 transition-transform">Liberar Poltrona</button>
                </>
              ) : (
                <CustomSelect 
                    name="atribuirP" 
                    label="Passageiros Disponíveis (Apenas sem poltrona)" 
                    value="" 
                    options={passageiros.filter(p=>p.viagemId===viagemSelecionadaId && !Object.values(reservasViagem).includes(p.id)).map(p=>({label:p.nome, value:p.id}))} 
                    placeholder="Selecione para ocupar..." 
                    onChange={val => {
                        if(!val) return; 
                        const r={...reservas}; 
                        if(!r[viagemSelecionadaId]) r[viagemSelecionadaId]={}; 
                        r[viagemSelecionadaId][assentoSel]=val; 
                        setReservaFirebase(r); 
                        setAssentoSel(null); 
                    }} 
                />
              )}
            </div>
          )}
        </div>
      );
    }

    function Fornecedores({ fornecedores, exportarPDF, userProfile, showDialog }) {
      const[showForm, setShowForm] = useState(false);
      const[fSel, setFSel] = useState(null);
      const[isEditing, setIsEditing] = useState(false);

      const salvar = async (e) => {
        e.preventDefault(); const t = e.target;
        const docRaw = t.doc.value.replace(/\D/g, '');
        if(docRaw.length === 11) { if(!isValidCPF(docRaw)) return showDialog('alert', 'Atenção', 'O CPF do fornecedor é inválido.'); } 
        else if(docRaw.length === 14) { if(!isValidCNPJ(docRaw)) return showDialog('alert', 'Atenção', 'O CNPJ do fornecedor é inválido.'); } 
        else { return showDialog('alert', 'Atenção', 'Informe um CPF (11 números) ou CNPJ (14 números) válido.'); }
        const phoneRaw = t.tel.value.replace(/\D/g, '');
        if(phoneRaw.length < 10) return showDialog('alert', 'Atenção', 'O telefone deve conter o DDD.');
        if(t.email.value) { const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; if(!emailRegex.test(t.email.value)) return showDialog('alert', 'Atenção', 'O e-mail preenchido tem formato inválido.'); }

        const d = { 
          servico:t.serv.value, nome:t.nome.value, documento:t.doc.value, 
          contatoNome:t.cNome.value, telefone:t.tel.value, email:t.email.value,
          valorTotal: parseFloat(t.valorTotal.value||0), valorPago: parseFloat(t.valorPago.value||0), 
          dataLimite: t.dataLimite.value, qtdReservas: parseInt(t.qtdReservas.value||0)
        };
        const { db, collection, addDoc, doc, updateDoc } = window.NexoFB;
        const colRef = collection(db, "empresas", userProfile.empresaId, "fornecedores");
        
        if (isEditing && fSel) { 
            await updateDoc(doc(colRef, fSel.id), d); 
            setFSel(null); setIsEditing(false); 
        } else { 
            await addDoc(colRef, d); setShowForm(false); 
        }
      };

      const excluir = () => {
        showDialog('confirm', 'Excluir Parceiro', 'Este fornecedor será removido permanentemente.', async () => {
            const { db, doc, deleteDoc } = window.NexoFB;
            await deleteDoc(doc(db, "empresas", userProfile.empresaId, "fornecedores", fSel.id));
            setFSel(null);
        });
      };

      return (
        <div className="space-y-4">
          <SectionHeader title="Serviços / Parceiros" action={<div className="flex gap-2"><button onClick={()=>exportarPDF('fornecedores')} className="w-9 h-9 rounded-full bg-slate-800 text-white shadow-sm active:scale-95 transition-transform"><i className="fa-solid fa-file-pdf"></i></button><AddBtn onClick={()=>setShowForm(!showForm)} active={showForm} /></div>} />
          
          {showForm && (
            <FormCard onSubmit={salvar}>
              <div className="col-span-2"><Inp name="serv" required placeholder="Ex: Hotel Copacabana" label="Serviço" /></div>
              <div className="col-span-2"><Inp name="nome" required placeholder="Empresa/Razão" label="Empresa" /></div>
              <MaskedInp name="doc" maskType="cpfcnpj" required placeholder="CNPJ/CPF" label="Documento" />
              <Inp name="cNome" required placeholder="Nome Contato" label="Contato" />
              <MaskedInp name="tel" maskType="phone" required placeholder="Telefone" label="Telefone" />
              <Inp name="email" type="email" placeholder="E-mail" label="E-mail" />
              
              <div className="col-span-2 border-t border-slate-200 pt-3 mt-1"><p className="text-[10px] font-bold text-purple-600 uppercase mb-2"><i className="fa-solid fa-coins mr-1"></i> Controle Financeiro & Reservas</p></div>
              <CurrencyInp name="valorTotal" label="Valor Total (R$)" />
              <CurrencyInp name="valorPago" label="Valor Já Pago (R$)" />
              <Inp name="dataLimite" type="date" label="Data Limite Pgto" /><Inp name="qtdReservas" type="number" placeholder="Ex: 20 quartos" label="Qtd. Reservas" />
              
              <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-3">Salvar Parceiro</button>
            </FormCard>
          )}

          <div className="space-y-3">
            {fornecedores.map(f => {
              const vTot = f.valorTotal || 0; const vPag = f.valorPago || 0; const rest = vTot - vPag;
              let bgSt = "bg-slate-50 border-slate-200 text-slate-500"; let txtSt = "Não def.";
              if (vTot > 0 && rest <= 0) { bgSt = "bg-emerald-50 text-emerald-600 border-emerald-200"; txtSt = "Quitado"; }
              else if (vPag > 0 && rest > 0) { bgSt = "bg-amber-50 text-amber-600 border-amber-200"; txtSt = "Parcial"; }
              else if (vTot > 0 && vPag === 0) { bgSt = "bg-red-50 text-red-600 border-red-200"; txtSt = "Pendente"; }
              
              return (
              <div key={f.id} onClick={()=>{setFSel(f);setIsEditing(false);}} className="glass-card glass-card-hover rounded-xl p-4 flex items-center gap-3 cursor-pointer border-l-4 border-purple-500">
                <div className="w-11 h-11 rounded-xl flex items-center justify-center bg-purple-100 text-purple-600"><i className="fa-solid fa-handshake"></i></div>
                <div className="flex-1 min-w-0"><h4 className="font-black text-sm text-slate-800 truncate">{f.servico}</h4><p className="text-[10px] text-slate-400 truncate font-medium">{f.nome}</p></div>
                {vTot > 0 && <div className="text-right flex flex-col items-end gap-1"><span className={`text-[9px] font-bold px-2 py-0.5 rounded-md border ${bgSt}`}>{txtSt}</span><span className="text-[10px] font-bold text-slate-500">Fal. {fmtMoeda(rest)}</span></div>}
              </div>
            )})}
            {fornecedores.length===0 && !showForm && <div className="text-center py-6 text-slate-400 text-sm font-semibold">Nenhum parceiro cadastrado.</div>}
          </div>

          {fSel && (
            <Modal onClose={()=>{setFSel(null);setIsEditing(false);}} title={isEditing ? "Editar Parceiro" : "Dados do Parceiro"}>
              {isEditing ? (
                  <form onSubmit={salvar} className="grid grid-cols-2 gap-4 pb-2">
                    <div className="col-span-2"><Inp name="serv" defaultValue={fSel.servico} required label="Serviço" /></div>
                    <div className="col-span-2"><Inp name="nome" defaultValue={fSel.nome} required label="Empresa" /></div>
                    <MaskedInp name="doc" defaultValue={fSel.documento} maskType="cpfcnpj" required label="CNPJ / CPF" />
                    <Inp name="cNome" defaultValue={fSel.contatoNome} required label="Contato" />
                    <MaskedInp name="tel" defaultValue={fSel.telefone} maskType="phone" required label="Telefone" />
                    <Inp name="email" type="email" defaultValue={fSel.email} label="E-mail" />
                    <div className="col-span-2 border-t border-slate-200 pt-3 mt-1"><p className="text-[10px] font-bold text-purple-600 uppercase mb-2">Controle Financeiro</p></div>
                    <CurrencyInp name="valorTotal" defaultValue={fSel.valorTotal} label="Valor Total (R$)" />
                    <CurrencyInp name="valorPago" defaultValue={fSel.valorPago} label="Valor Já Pago (R$)" />
                    <Inp name="dataLimite" type="date" defaultValue={fSel.dataLimite} label="Data Limite Pgto" /><Inp name="qtdReservas" type="number" defaultValue={fSel.qtdReservas} label="Qtd. Reservas" />
                    
                    <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-3">Salvar Alterações</button>
                    <button type="button" onClick={()=>setIsEditing(false)} className="col-span-2 py-3.5 rounded-xl font-bold text-slate-600 bg-slate-100">Cancelar</button>
                  </form>
              ) : (
                <>
                  <div className="text-center mb-6">
                    <div className="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-3 border border-purple-200 bg-purple-50 text-purple-600"><i className="fa-solid fa-building text-3xl"></i></div>
                    <span className="text-[10px] font-bold px-3 py-1 rounded-full bg-slate-100 text-slate-600 border border-slate-200 mb-2 inline-block">{fSel.nome}</span>
                    <h3 className="font-black text-2xl text-slate-800 mt-1 leading-tight px-4">{fSel.servico}</h3>
                  </div>
                  <div className="space-y-1 mb-6 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <InfoRow icon="fa-id-card" label="CNPJ / CPF" value={fSel.documento} />
                    <InfoRow icon="fa-user-tie" label="Pessoa" value={fSel.contatoNome} />
                    <InfoRow icon="fa-phone" label="Telefone" value={fSel.telefone} color="#10b981" />
                    {(fSel.valorTotal > 0 || fSel.qtdReservas > 0) && (
                      <div className="mt-5 pt-5 border-t border-slate-200">
                        <p className="text-[10px] font-bold text-purple-600 uppercase mb-3 tracking-widest"><i className="fa-solid fa-chart-line mr-1"></i> Resumo Financeiro</p>
                        <div className="grid grid-cols-2 gap-3 text-sm font-semibold">
                          <div className="bg-white p-3 border border-slate-200 rounded-xl text-slate-600 shadow-sm"><p className="text-[9px] uppercase font-bold text-slate-400 mb-1">Custo Total</p>{fmtMoeda(fSel.valorTotal||0)}</div>
                          <div className="bg-white p-3 border border-emerald-100 rounded-xl text-emerald-600 shadow-sm"><p className="text-[9px] uppercase font-bold text-emerald-400 mb-1">Pago</p>{fmtMoeda(fSel.valorPago||0)}</div>
                          <div className="bg-white p-3 border border-red-100 rounded-xl text-red-500 shadow-sm"><p className="text-[9px] uppercase font-bold text-red-400 mb-1">Pendente</p>{fmtMoeda((fSel.valorTotal||0)-(fSel.valorPago||0))}</div>
                          <div className="bg-white p-3 border border-amber-100 rounded-xl text-amber-600 shadow-sm"><p className="text-[9px] uppercase font-bold text-amber-400 mb-1">Vencimento</p>{fmt(fSel.dataLimite)}</div>
                        </div>
                        {fSel.qtdReservas > 0 && <div className="mt-3 bg-purple-600 text-white p-3 rounded-xl text-sm font-bold text-center shadow-lg"><i className="fa-solid fa-bed mr-2"></i> {fSel.qtdReservas} Reservas Contratadas</div>}
                      </div>
                    )}
                  </div>
                  <div className="flex gap-2">
                    <button onClick={excluir} className="w-14 h-12 rounded-xl flex items-center justify-center bg-red-50 text-red-600 active:scale-95"><i className="fa-solid fa-trash"></i></button>
                    <button onClick={()=>setIsEditing(true)} className="flex-1 h-12 rounded-xl font-bold text-white neon-button flex justify-center items-center"><i className="fa-solid fa-pen mr-2"></i> Editar Parceiro</button>
                  </div>
