                  <div className="text-right flex flex-col items-end gap-1"><span className={`text-[9px] font-bold px-2 py-0.5 rounded-md border ${badgeCls}`}>{badgeTxt}</span><span className="text-[10px] text-slate-500 dark:text-slate-400 font-bold">{fmtMoeda(pago)}</span></div>
                </div>
              );
            })}
            {paxFiltered.length===0 && !showForm && <div className="text-center py-6 text-slate-400 dark:text-slate-500 text-sm font-semibold">Nenhum passageiro encontrado.</div>}
          </div>

          {passSel && (
            <Modal onClose={()=>{setPassSel(null);setIsEditing(false);}} title={isEditing ? "Editar Cliente" : "Ficha do Cliente"}>
              {isEditing ? (
                  <form onSubmit={salvar} className="grid grid-cols-2 gap-4 pb-2">
                    <div className="col-span-2"><Inp name="nome" defaultValue={passSel.nome} required label="Nome Completo" /></div>
                    <MaskedInp name="cpf" defaultValue={passSel.cpf} maskType="cpf" required label="CPF" />
                    <Inp name="rg" defaultValue={passSel.rg} required label="RG" />
                    <Inp type="date" name="nasc" defaultValue={passSel.nascimento} required label="Nascimento" />
                    <MaskedInp name="tel" defaultValue={passSel.telefone} maskType="phone" required label="Telefone" />
                    <div className="col-span-2"><Inp name="emerg" defaultValue={passSel.emergencial} required label="Emergência" /></div>
                    <div className="col-span-2"><CustomSelect name="viagemIdInput" label="Mudar Viagem" defaultValue={passSel.viagemId} options={viagens.map(v=>({label:v.destino, value:v.id}))} /></div>
                    <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-2">Salvar Alterações</button>
                    <button type="button" onClick={()=>setIsEditing(false)} className="col-span-2 py-3.5 rounded-xl font-bold text-slate-600 bg-slate-100 dark:bg-nDarkCard dark:text-slate-300 border dark:border-nDarkBorder">Cancelar</button>
                  </form>
              ) : (
                <>
                  <div className="text-center mb-6">
                    <div className="w-20 h-20 rounded-full flex items-center justify-center text-purple-600 font-black text-3xl mx-auto mb-3 bg-purple-100 dark:bg-purple-500/20 dark:text-purple-400">{passSel.nome.charAt(0)}</div>
                    <h3 className="font-black text-2xl text-slate-800 dark:text-white leading-tight">{passSel.nome}</h3>
                  </div>
                  <div className="bg-slate-50 dark:bg-nDarkCard p-4 rounded-2xl border border-slate-100 dark:border-nDarkBorder mb-6 transition-colors">
                    <InfoRow icon="fa-id-card" label="CPF" value={passSel.cpf} />
                    <InfoRow icon="fa-fingerprint" label="RG" value={passSel.rg} />
                    <InfoRow icon="fa-cake-candles" label="Nascimento" value={fmt(passSel.nascimento)} />
                    <InfoRow icon="fa-phone" label="Telefone" value={passSel.telefone} color="#10b981" />
                    <InfoRow icon="fa-heart-pulse" label="Emergência" value={passSel.emergencial} color="#ef4444" />
                  </div>
                  <div className="flex gap-2">
                    <button onClick={excluir} className="w-14 h-12 rounded-xl flex items-center justify-center bg-red-50 text-red-600 active:scale-95 dark:bg-red-500/10 dark:text-red-500"><i className="fa-solid fa-trash"></i></button>
                    <button onClick={()=>setIsEditing(true)} className="flex-1 h-12 rounded-xl font-bold text-white neon-button flex items-center justify-center"><i className="fa-solid fa-pen mr-2"></i> Editar Cliente</button>
                  </div>
                </>
              )}
            </Modal>
          )}
        </div>
      );
    }

    function Caixa({ cxFiltered, viagens, viagemSelecionadaId, setViagemSelecionadaId, passageiros, fornecedores, exportarPDF, setReciboData, userProfile, showDialog, searchParams }) {
      const [showForm, setShowForm] = useState(false);
      const[tipo, setTipo] = useState('entrada');
      const[transSel, setTransSel] = useState(null);
      const[formViagemId, setFormViagemId] = useState(viagemSelecionadaId);

      const entradas = cxFiltered.filter(c=>c.tipo==='entrada').reduce((a,b)=>a+b.valor,0);
      const saidas = cxFiltered.filter(c=>c.tipo==='saida').reduce((a,b)=>a+b.valor,0);

      const salvar = async (e) => {
        e.preventDefault(); const t=e.target; 
        const dataVal = (t.dataManual && t.dataManual.value) ? t.dataManual.value : new Date().toISOString().split('T')[0]; const horaVal = (t.horaManual && t.horaManual.value) ? t.horaManual.value : new Date().toTimeString().split(' ')[0].substring(0,5);
        const vSelecionadaNoForm = t.viagemIdInput ? t.viagemIdInput.value : formViagemId;
        const d = { viagemId: vSelecionadaNoForm, tipo, valor:parseFloat(t.valor.value), desc:t.desc.value, passageiroId: tipo === 'entrada' && t.passId ? t.passId.value : '', fornecedorId: tipo === 'saida' && t.fornId ? t.fornId.value : '', data: dataVal, hora: horaVal, forma:t.forma.value };
        if(!d.viagemId) return showDialog('alert','Atenção','Selecione uma viagem para o lançamento.');
        const { db, collection, addDoc } = window.NexoFB; await addDoc(collection(db, "empresas", userProfile.empresaId, "caixa"), d); setShowForm(false); e.target.reset();
      };

      const excluir = () => { showDialog('confirm', 'Excluir Lançamento', 'Atenção: Este lançamento será apagado do sistema.', async () => { const { db, doc, deleteDoc } = window.NexoFB; await deleteDoc(doc(db, "empresas", userProfile.empresaId, "caixa", transSel.id)); setTransSel(null); }); };

      return (
        <div className="space-y-4">
          <div className="glass-card p-4 rounded-2xl flex gap-3 items-center">
             <CustomSelect name="filtroC" label="Caixa da Viagem" value={viagemSelecionadaId} onChange={val=>setViagemSelecionadaId(val)} options={viagens.map(v=>({label: v.destino, value: v.id}))} placeholder="Geral / Todas" />
             <button onClick={()=>exportarPDF('caixa')} className="w-12 h-12 rounded-xl bg-slate-100 border border-slate-200 text-slate-600 dark:bg-nDarkCard dark:border-nDarkBorder dark:text-slate-300 flex items-center justify-center shadow-sm shrink-0 mt-3 active:scale-95 transition-transform"><i className="fa-solid fa-file-pdf"></i></button>
          </div>

          <SearchBar value={searchParams.searchCaixa} onChange={searchParams.setSearchCaixa} placeholder="Pesquisar por descrição, cliente ou parceiro..." showDates={true} startDate={searchParams.dateCaixaStart} setStartDate={searchParams.setDateCaixaStart} endDate={searchParams.dateCaixaEnd} setEndDate={searchParams.setDateCaixaEnd} />

          <div className="rounded-2xl p-5 bg-[#1c1b22] text-white shadow-[0_4px_20px_rgba(0,0,0,0.1)] relative overflow-hidden">
             <div className="absolute top-0 right-0 w-32 h-32 bg-purple-600 rounded-full blur-[40px] opacity-20 translate-x-1/2 -translate-y-1/4"></div>
             <p className="text-[10px] font-bold uppercase text-purple-400 mb-1 relative z-10">Resumo do Período</p>
             <h3 className="text-3xl font-black relative z-10 mb-4">{fmtMoeda(entradas-saidas)} <span className="text-[10px] font-medium text-slate-400 uppercase tracking-widest ml-1">Lucro</span></h3>
             <div className="flex gap-6 relative z-10 border-t border-[#2a2931] pt-3">
                 <div><p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Entradas</p><p className="text-sm font-bold text-emerald-400">{fmtMoeda(entradas)}</p></div>
                 <div><p className="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-0.5">Saídas</p><p className="text-sm font-bold text-red-400">{fmtMoeda(saidas)}</p></div>
             </div>
          </div>
          
          <button onClick={()=>{setShowForm(!showForm); setFormViagemId(viagemSelecionadaId);}} className={`w-full text-white font-bold py-3.5 rounded-xl shadow-lg transition-colors ${showForm?'bg-red-500':'neon-button'}`}>{showForm ? 'Cancelar Lançamento' : '+ Novo Lançamento'}</button>
          
          {showForm && (
            <FormCard onSubmit={salvar}>
              <div className="col-span-2 flex gap-2"><button type="button" onClick={()=>setTipo('entrada')} className={`flex-1 py-3 rounded-xl font-bold text-sm ${tipo==='entrada'?'bg-emerald-500 text-white shadow-md':'bg-slate-100 text-slate-500 border border-slate-200 dark:bg-nDarkCard dark:border-nDarkBorder dark:text-slate-300'}`}>Entrada (+)</button><button type="button" onClick={()=>setTipo('saida')} className={`flex-1 py-3 rounded-xl font-bold text-sm ${tipo==='saida'?'bg-red-500 text-white shadow-md':'bg-slate-100 text-slate-500 border border-slate-200 dark:bg-nDarkCard dark:border-nDarkBorder dark:text-slate-300'}`}>Saída (-)</button></div>
              <div className="col-span-2"><CustomSelect name="viagemIdInput" label="Vincular a Viagem" value={formViagemId} onChange={setFormViagemId} options={viagens.map(v=>({label:v.destino, value:v.id}))} required /></div>
              <CurrencyInp name="valor" required label="Valor (R$)" />
              <Inp name="desc" required label="Descrição" placeholder={tipo==='entrada'?"Ex: Sinal Pacote":"Ex: Adiantamento Guia"} />
              <div className="col-span-2">
                  {tipo==='entrada' ? <CustomSelect name="passId" label="Vincular Cliente Pagante" options={[{label:'Nenhum (Avulso)', value:''}, ...passageiros.filter(p=>p.viagemId===formViagemId).map(p=>({label:p.nome, value:p.id}))]} /> : <CustomSelect name="fornId" label="Vincular Fornecedor (Destinatário)" options={[{label:'Nenhum (Avulso)', value:''}, ...fornecedores.map(f=>({label:f.nome, value:f.id}))]} /> }
              </div>
              <div className="col-span-2"><CustomSelect name="forma" label="Forma de Pgto" options={[{label:'Pix',value:'Pix'},{label:'Dinheiro',value:'Dinheiro'},{label:'Cartão',value:'Cartão'},{label:'Transferência',value:'Transferência'}]} /></div>
              <Inp type="date" name="dataManual" label="Data (Opcional)" /><Inp type="time" name="horaManual" label="Hora (Opcional)" />
              <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-2">Registrar Transação</button>
            </FormCard>
          )}

          <div className="space-y-2">
            {cxFiltered.map(c => {
              const vinculou = c.tipo === 'entrada' ? passageiros.find(p=>p.id===c.passageiroId)?.nome : fornecedores.find(f=>f.id===c.fornecedorId)?.nome;
              return (
              <div key={c.id} onClick={()=>setTransSel(c)} className={`glass-card glass-card-hover rounded-xl p-3.5 flex justify-between items-center cursor-pointer border-l-4 ${c.tipo==='entrada'?'border-l-emerald-500':'border-l-red-500'}`}>
                <div className="flex items-center gap-3">
                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${c.tipo==='entrada'?'bg-emerald-50 text-emerald-600 border border-emerald-100 dark:bg-emerald-500/10 dark:text-emerald-400 dark:border-emerald-500/20':'bg-red-50 text-red-600 border border-red-100 dark:bg-red-500/10 dark:text-red-400 dark:border-red-500/20'}`}><i className={`fa-solid ${c.tipo==='entrada'?'fa-arrow-down':'fa-arrow-up'}`}></i></div>
                    <div><p className="font-bold text-sm text-slate-800 dark:text-slate-100">{c.desc}</p><p className="text-[9px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-wide">{fmt(c.data)} {vinculou ? `• ${vinculou}` : ''}</p></div>
                </div>
                <p className={`font-black ${c.tipo==='entrada'?'text-emerald-600 dark:text-emerald-400':'text-red-500 dark:text-red-400'}`}>{c.tipo==='entrada'?'+':'-'} {fmtMoeda(c.valor)}</p>
              </div>
            )})}
            {cxFiltered.length===0 && !showForm && <div className="text-center py-6 text-slate-400 dark:text-slate-500 text-sm font-semibold">Nenhuma transação encontrada no período.</div>}
          </div>

          {transSel && (
            <Modal onClose={()=>setTransSel(null)} title="Detalhes da Transação">
              <div className="text-center mb-6">
                <div className={`w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-3 border ${transSel.tipo==='entrada'?'bg-emerald-50 text-emerald-600 border-emerald-100 dark:bg-emerald-500/10 dark:text-emerald-400 dark:border-emerald-500/20':'bg-red-50 text-red-600 border-red-100 dark:bg-red-500/10 dark:text-red-400 dark:border-red-500/20'}`}><i className={`fa-solid ${transSel.tipo==='entrada'?'fa-arrow-down':'fa-arrow-up'} text-3xl`}></i></div>
                <p className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">{transSel.tipo}</p>
                <h3 className={`font-black text-3xl mt-1 ${transSel.tipo==='entrada'?'text-emerald-600 dark:text-emerald-400':'text-red-600 dark:text-red-400'}`}>{transSel.tipo==='entrada'?'+':'-'} {fmtMoeda(transSel.valor)}</h3>
              </div>
              <div className="bg-slate-50 dark:bg-nDarkCard p-4 rounded-2xl border border-slate-100 dark:border-nDarkBorder mb-6 transition-colors">
                <InfoRow icon="fa-tag" label="Descrição" value={transSel.desc} />
                <InfoRow icon="fa-credit-card" label="Forma" value={transSel.forma} />
                <InfoRow icon="fa-calendar" label="Data/Hora" value={`${fmt(transSel.data)} às ${transSel.hora}`} />
                {transSel.tipo==='entrada' && transSel.passageiroId && <InfoRow icon="fa-user" label="Cliente Pagante" value={passageiros.find(p=>p.id===transSel.passageiroId)?.nome} />}
                {transSel.tipo==='saida' && transSel.fornecedorId && <InfoRow icon="fa-handshake" label="Fornecedor (Recebedor)" value={fornecedores.find(f=>f.id===transSel.fornecedorId)?.nome} color="#ef4444" />}
              </div>
              <div className="flex gap-2">
                <button onClick={excluir} className="w-14 h-12 rounded-xl flex items-center justify-center bg-red-50 text-red-600 active:scale-95 dark:bg-red-500/10 dark:text-red-500"><i className="fa-solid fa-trash"></i></button>
                {transSel.tipo==='entrada' && transSel.passageiroId ? <button onClick={()=>{const pass=passageiros.find(p=>p.id===transSel.passageiroId); setReciboData({valor:transSel.valor,desc:transSel.desc,clienteNome:pass.nome,clienteCpf:pass.cpf,data:transSel.data,hora:transSel.hora,forma:transSel.forma}); setTransSel(null); exportarPDF('recibo');}} className="flex-1 h-12 rounded-xl font-bold text-white neon-button flex items-center justify-center"><i className="fa-solid fa-file-invoice mr-2"></i> Emitir Recibo</button> : <button disabled className="flex-1 h-12 rounded-xl font-bold bg-slate-100 text-slate-400 dark:bg-nDarkCard dark:text-slate-500">Recibo Indisponível</button>}
              </div>
            </Modal>
          )}
        </div>
      );
    }

    function Onibus({ viagens, viagemSelecionadaId, setViagemSelecionadaId, reservas, passageiros, exportarPDF, userProfile, showDialog }) {
      const assentos = Array.from({length:46},(_,i)=>i+1);
      const[assentoSel, setAssentoSel] = useState(null);
      const reservasViagem = reservas[viagemSelecionadaId] || {};

      const setReservaFirebase = async (r) => { const { db, doc, setDoc } = window.NexoFB; await setDoc(doc(db, "empresas", userProfile.empresaId, "config", "reservas"), { mapa: r }); };

      return (
        <div className="space-y-4">
          <div className="glass-card p-4 rounded-2xl"><CustomSelect name="mapaV" label="Mapa da Viagem" value={viagemSelecionadaId} onChange={val=>setViagemSelecionadaId(val)} options={viagens.map(v=>({label: v.destino, value: v.id}))} placeholder="Selecione uma viagem..." /></div>
          
          {viagemSelecionadaId && (
            <div className="glass-card p-5 rounded-[2rem]">
              <div className="flex justify-between items-center mb-6"><h3 className="text-base font-black text-slate-800 dark:text-white">Layout do Ônibus</h3><button onClick={()=>exportarPDF('manifesto')} className="px-3 py-1.5 rounded-lg text-xs font-bold text-white bg-slate-800 dark:bg-slate-700 active:scale-95 transition-transform"><i className="fa-solid fa-file-pdf"></i> PDF</button></div>
              <div className="mx-auto rounded-[2.5rem] overflow-hidden bg-[#1c1b22] border-[6px] border-[#2a2931] shadow-2xl relative" style={{width:280}}>
                <div className="h-14 flex items-center justify-center bg-purple-500/10 border-b-[3px] border-[#2a2931] relative">
                    <i className="fa-solid fa-steering-wheel text-purple-400 text-2xl absolute left-6 opacity-50"></i>
                    <span className="text-[10px] font-bold tracking-widest text-purple-400 uppercase">Frente</span>
                </div>
                <div className="grid grid-cols-5 gap-1.5 p-4 pb-6">
                  {assentos.map(num => {
                    const isOcupado = !!reservasViagem[num]; const isSel = assentoSel === num;
                    let cls = isSel ? 'seat-sel' : isOcupado ? 'bg-slate-700 text-slate-400 border-[#3f3e46]' : 'bg-[#2a2931] text-white border-[#3f3e46] hover:bg-[#3f3e46]';
                    return (<React.Fragment key={num}><button onClick={()=>setAssentoSel(num===assentoSel?null:num)} className={`seat-btn w-full aspect-[3/4] flex flex-col items-center justify-center text-[11px] font-black rounded-lg border-b-4 transition-all active:scale-90 ${cls}`}>{num}</button>{num%2===0 && num%4!==0 && <div className="w-2"></div>}</React.Fragment>);
                  })}
                </div>
              </div>
            </div>
          )}

          {assentoSel && (
            <div className="glass-card rounded-[2rem] p-5 border-2 border-purple-200 dark:border-purple-500/30 animate-slideup">
              <div className="flex items-center gap-3 mb-4">
                  <div className="w-10 h-10 bg-purple-100 dark:bg-purple-500/20 rounded-xl flex items-center justify-center text-purple-600 dark:text-purple-400 font-black border border-purple-200 dark:border-purple-500/30">{assentoSel}</div>
                  <div><p className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Poltrona</p><p className="font-black text-slate-800 dark:text-white">Ação Necessária</p></div>
              </div>
              
              {reservasViagem[assentoSel] ? (
                <>
                  <div className="bg-slate-50 dark:bg-nDarkCard p-3.5 rounded-xl mb-3 font-bold text-sm border border-slate-200 dark:border-nDarkBorder text-slate-700 dark:text-slate-300"><i className="fa-solid fa-user text-purple-400 mr-2"></i> {passageiros.find(p=>p.id===reservasViagem[assentoSel])?.nome||'Desconhecido'}</div>
                  <button onClick={()=>{const r={...reservas};delete r[viagemSelecionadaId][assentoSel]; setReservaFirebase(r); setAssentoSel(null);}} className="w-full py-3.5 rounded-xl font-bold bg-red-50 text-red-600 border border-red-200 dark:bg-red-500/10 dark:border-red-500/30 dark:text-red-500 active:scale-95 transition-transform">Liberar Poltrona</button>
                </>
              ) : (
                <CustomSelect name="atribuirP" label="Passageiros Disponíveis (Apenas sem poltrona)" value="" options={passageiros.filter(p=>p.viagemId===viagemSelecionadaId && !Object.values(reservasViagem).includes(p.id)).map(p=>({label:p.nome, value:p.id}))} placeholder="Selecione para ocupar..." onChange={val => { if(!val) return; const r={...reservas}; if(!r[viagemSelecionadaId]) r[viagemSelecionadaId]={}; r[viagemSelecionadaId][assentoSel]=val; setReservaFirebase(r); setAssentoSel(null); }} />
              )}
            </div>
          )}
        </div>
      );
    }

    function Fornecedores({ fornFiltered, exportarPDF, userProfile, showDialog, searchParams }) {
      const[showForm, setShowForm] = useState(false);
      const[fSel, setFSel] = useState(null);
      const[isEditing, setIsEditing] = useState(false);

      const salvar = async (e) => {
        e.preventDefault(); const t = e.target;
        const docRaw = t.doc.value.replace(/\D/g, ''); if(docRaw.length === 11) { if(!isValidCPF(docRaw)) return showDialog('alert', 'Atenção', 'O CPF do fornecedor é inválido.'); } else if(docRaw.length === 14) { if(!isValidCNPJ(docRaw)) return showDialog('alert', 'Atenção', 'O CNPJ do fornecedor é inválido.'); } else { return showDialog('alert', 'Atenção', 'Informe um CPF (11 números) ou CNPJ (14 números) válido.'); }
        const phoneRaw = t.tel.value.replace(/\D/g, ''); if(phoneRaw.length < 10) return showDialog('alert', 'Atenção', 'O telefone deve conter o DDD.');
        if(t.email.value) { const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; if(!emailRegex.test(t.email.value)) return showDialog('alert', 'Atenção', 'O e-mail preenchido tem formato inválido.'); }

        const d = { servico:t.serv.value, nome:t.nome.value, documento:t.doc.value, contatoNome:t.cNome.value, telefone:t.tel.value, email:t.email.value, valorTotal: parseFloat(t.valorTotal.value||0), valorPago: parseFloat(t.valorPago.value||0), dataLimite: t.dataLimite.value, qtdReservas: parseInt(t.qtdReservas.value||0) };
        const { db, collection, addDoc, doc, updateDoc } = window.NexoFB; const colRef = collection(db, "empresas", userProfile.empresaId, "fornecedores");
        if (isEditing && fSel) { await updateDoc(doc(colRef, fSel.id), d); setFSel(null); setIsEditing(false); } else { await addDoc(colRef, d); setShowForm(false); }
      };

      const excluir = () => { showDialog('confirm', 'Excluir Parceiro', 'Este fornecedor será removido permanentemente.', async () => { const { db, doc, deleteDoc } = window.NexoFB; await deleteDoc(doc(db, "empresas", userProfile.empresaId, "fornecedores", fSel.id)); setFSel(null); }); };

      return (
        <div className="space-y-4">
          <SectionHeader title="Serviços / Parceiros" action={<div className="flex gap-2"><button onClick={()=>exportarPDF('fornecedores')} className="w-9 h-9 rounded-full bg-slate-800 text-white shadow-sm active:scale-95 transition-transform"><i className="fa-solid fa-file-pdf"></i></button><AddBtn onClick={()=>setShowForm(!showForm)} active={showForm} /></div>} />
          
          <SearchBar value={searchParams.searchForn} onChange={searchParams.setSearchForn} placeholder="Pesquisar por serviço ou empresa..." />

          {showForm && (
            <FormCard onSubmit={salvar}>
              <div className="col-span-2"><Inp name="serv" required placeholder="Ex: Hotel Copacabana" label="Serviço" /></div>
              <div className="col-span-2"><Inp name="nome" required placeholder="Empresa/Razão" label="Empresa" /></div>
              <MaskedInp name="doc" maskType="cpfcnpj" required placeholder="CNPJ/CPF" label="Documento" />
              <Inp name="cNome" required placeholder="Nome Contato" label="Contato" />
              <MaskedInp name="tel" maskType="phone" required placeholder="Telefone" label="Telefone" />
              <Inp name="email" type="email" placeholder="E-mail" label="E-mail" />
              
              <div className="col-span-2 border-t border-slate-200 dark:border-nDarkBorder pt-3 mt-1"><p className="text-[10px] font-bold text-purple-600 dark:text-purple-400 uppercase mb-2"><i className="fa-solid fa-coins mr-1"></i> Controle Financeiro & Reservas</p></div>
              <CurrencyInp name="valorTotal" label="Valor Total (R$)" />
              <CurrencyInp name="valorPago" label="Valor Já Pago (R$)" />
              <Inp name="dataLimite" type="date" label="Data Limite Pgto" /><Inp name="qtdReservas" type="number" placeholder="Ex: 20 quartos" label="Qtd. Reservas" />
              
              <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-3">Salvar Parceiro</button>
            </FormCard>
          )}

          <div className="space-y-3">
            {fornFiltered.map(f => {
              const vTot = f.valorTotal || 0; const vPag = f.valorPago || 0; const rest = vTot - vPag;
              let bgSt = "bg-slate-50 border-slate-200 text-slate-500 dark:bg-nDarkCard dark:border-nDarkBorder dark:text-slate-400"; let txtSt = "Não def.";
              if (vTot > 0 && rest <= 0) { bgSt = "bg-emerald-50 text-emerald-600 border-emerald-200 dark:bg-emerald-500/10 dark:text-emerald-400 dark:border-emerald-500/20"; txtSt = "Quitado"; } else if (vPag > 0 && rest > 0) { bgSt = "bg-amber-50 text-amber-600 border-amber-200 dark:bg-amber-500/10 dark:text-amber-400 dark:border-amber-500/20"; txtSt = "Parcial"; } else if (vTot > 0 && vPag === 0) { bgSt = "bg-red-50 text-red-600 border-red-200 dark:bg-red-500/10 dark:text-red-400 dark:border-red-500/20"; txtSt = "Pendente"; }
              
              return (
              <div key={f.id} onClick={()=>{setFSel(f);setIsEditing(false);}} className="glass-card glass-card-hover rounded-xl p-4 flex items-center gap-3 cursor-pointer border-l-4 border-l-purple-500">
                <div className="w-11 h-11 rounded-xl flex items-center justify-center bg-purple-100 text-purple-600 dark:bg-purple-500/20 dark:text-purple-400"><i className="fa-solid fa-handshake"></i></div>
                <div className="flex-1 min-w-0"><h4 className="font-black text-sm text-slate-800 dark:text-slate-100 truncate">{f.servico}</h4><p className="text-[10px] text-slate-400 dark:text-slate-500 truncate font-medium">{f.nome}</p></div>
                {vTot > 0 && <div className="text-right flex flex-col items-end gap-1"><span className={`text-[9px] font-bold px-2 py-0.5 rounded-md border ${bgSt}`}>{txtSt}</span><span className="text-[10px] font-bold text-slate-500 dark:text-slate-400">Fal. {fmtMoeda(rest)}</span></div>}
              </div>
            )})}
            {fornFiltered.length===0 && !showForm && <div className="text-center py-6 text-slate-400 dark:text-slate-500 text-sm font-semibold">Nenhum parceiro encontrado.</div>}
          </div>

          {fSel && (
            <Modal onClose={()=>{setFSel(null);setIsEditing(false);}} title={isEditing ? "Editar Parceiro" : "Dados do Parceiro"}>
              {isEditing ? (
                  <form onSubmit={salvar} className="grid grid-cols-2 gap-4 pb-2">
                    <div className="col-span-2"><Inp name="serv" defaultValue={fSel.servico} required label="Serviço" /></div>
                    <div className="col-span-2"><Inp name="nome" defaultValue={fSel.nome} required label="Empresa" /></div>
                    <MaskedInp name="doc" defaultValue={fSel.documento} maskType="cpfcnpj" required label="CNPJ / CPF" />
                    <Inp name="cNome" defaultValue={fSel.contatoNome} required label="Contato" />
                    <MaskedInp name="tel" defaultValue={fSel.telefone} maskType="phone" required label="Telefone" />
                    <Inp name="email" type="email" defaultValue={fSel.email} label="E-mail" />
                    <div className="col-span-2 border-t border-slate-200 dark:border-nDarkBorder pt-3 mt-1"><p className="text-[10px] font-bold text-purple-600 dark:text-purple-400 uppercase mb-2">Controle Financeiro</p></div>
                    <CurrencyInp name="valorTotal" defaultValue={fSel.valorTotal} label="Valor Total (R$)" />
                    <CurrencyInp name="valorPago" defaultValue={fSel.valorPago} label="Valor Já Pago (R$)" />
                    <Inp name="dataLimite" type="date" defaultValue={fSel.dataLimite} label="Data Limite Pgto" /><Inp name="qtdReservas" type="number" defaultValue={fSel.qtdReservas} label="Qtd. Reservas" />
                    <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-3">Salvar Alterações</button>
                    <button type="button" onClick={()=>setIsEditing(false)} className="col-span-2 py-3.5 rounded-xl font-bold text-slate-600 bg-slate-100 dark:bg-nDarkCard dark:text-slate-300 border dark:border-nDarkBorder">Cancelar</button>
                  </form>
              ) : (
                <>
                  <div className="text-center mb-6">
                    <div className="w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-3 border border-purple-200 dark:border-purple-500/30 bg-purple-50 dark:bg-purple-500/10 text-purple-600 dark:text-purple-400"><i className="fa-solid fa-building text-3xl"></i></div>
                    <span className="text-[10px] font-bold px-3 py-1 rounded-full bg-slate-100 dark:bg-nDarkCard text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-nDarkBorder mb-2 inline-block">{fSel.nome}</span>
                    <h3 className="font-black text-2xl text-slate-800 dark:text-white mt-1 leading-tight px-4">{fSel.servico}</h3>
                  </div>
                  <div className="space-y-1 mb-6 bg-slate-50 dark:bg-nDarkCard p-4 rounded-2xl border border-slate-100 dark:border-nDarkBorder transition-colors">
                    <InfoRow icon="fa-id-card" label="CNPJ / CPF" value={fSel.documento} />
                    <InfoRow icon="fa-user-tie" label="Pessoa" value={fSel.contatoNome} />
                    <InfoRow icon="fa-phone" label="Telefone" value={fSel.telefone} color="#10b981" />
                    {(fSel.valorTotal > 0 || fSel.qtdReservas > 0) && (
                      <div className="mt-5 pt-5 border-t border-slate-200 dark:border-nDarkBorder">
                        <p className="text-[10px] font-bold text-purple-600 dark:text-purple-400 uppercase mb-3 tracking-widest"><i className="fa-solid fa-chart-line mr-1"></i> Resumo Financeiro</p>
                        <div className="grid grid-cols-2 gap-3 text-sm font-semibold">
                          <div className="bg-white dark:bg-[#151419] p-3 border border-slate-200 dark:border-[#2a2931] rounded-xl text-slate-600 dark:text-slate-300 shadow-sm"><p className="text-[9px] uppercase font-bold text-slate-400 dark:text-slate-500 mb-1">Custo Total</p>{fmtMoeda(fSel.valorTotal||0)}</div>
                          <div className="bg-white dark:bg-[#151419] p-3 border border-emerald-100 dark:border-emerald-500/20 rounded-xl text-emerald-600 dark:text-emerald-400 shadow-sm"><p className="text-[9px] uppercase font-bold text-emerald-400 dark:text-emerald-500 mb-1">Pago</p>{fmtMoeda(fSel.valorPago||0)}</div>
                          <div className="bg-white dark:bg-[#151419] p-3 border border-red-100 dark:border-red-500/20 rounded-xl text-red-500 dark:text-red-400 shadow-sm"><p className="text-[9px] uppercase font-bold text-red-400 dark:text-red-500 mb-1">Pendente</p>{fmtMoeda((fSel.valorTotal||0)-(fSel.valorPago||0))}</div>
                          <div className="bg-white dark:bg-[#151419] p-3 border border-amber-100 dark:border-amber-500/20 rounded-xl text-amber-600 dark:text-amber-400 shadow-sm"><p className="text-[9px] uppercase font-bold text-amber-400 dark:text-amber-500 mb-1">Vencimento</p>{fmt(fSel.dataLimite)}</div>
                        </div>
                        {fSel.qtdReservas > 0 && <div className="mt-3 bg-purple-600 text-white p-3 rounded-xl text-sm font-bold text-center shadow-lg"><i className="fa-solid fa-bed mr-2"></i> {fSel.qtdReservas} Reservas Contratadas</div>}
                      </div>
                    )}
                  </div>
                  <div className="flex gap-2">
                    <button onClick={excluir} className="w-14 h-12 rounded-xl flex items-center justify-center bg-red-50 text-red-600 active:scale-95 dark:bg-red-500/10 dark:text-red-500"><i className="fa-solid fa-trash"></i></button>
                    <button onClick={()=>setIsEditing(true)} className="flex-1 h-12 rounded-xl font-bold text-white neon-button flex justify-center items-center"><i className="fa-solid fa-pen mr-2"></i> Editar Parceiro</button>
                  </div>
                </>
              )}
            </Modal>
          )}
        </div>
      );
    }

    /* ─── APLICATIVO PRINCIPAL ─── */
    function MainApp({ userProfile, onLogout, showDialog, theme, toggleTheme }) {
      const[activeTab, setActiveTab] = useState('dashboard');
      const[printView, setPrintView] = useState('manifesto');
      const[modalConfig, setModalConfig] = useState(false);
      const[showNotificacoes, setShowNotificacoes] = useState(false);
      const[notificacoes, setNotificacoes] = useState([]);
      const[meusChamados, setMeusChamados] = useState([]);

      const hora = new Date().getHours();
      let saudacao = hora >= 5 && hora < 12 ? 'Bom dia' : hora < 18 ? 'Boa tarde' : 'Boa noite';

      const[viagens, setViagens] = useState([]);
      const[viagemSelecionadaId, setViagemSelecionadaId] = useState('');
      const[passageiros, setPassageiros] = useState([]);
      const[fornecedores, setFornecedores] = useState([]);
      const[caixa, setCaixa] = useState([]);
      const[reservas, setReservas] = useState({});
      const[reciboData, setReciboData] = useState(null);

      // Filtros
      const [searchViagens, setSearchViagens] = useState(''); const [dateViagensStart, setDateViagensStart] = useState(''); const [dateViagensEnd, setDateViagensEnd] = useState('');
      const [searchPax, setSearchPax] = useState('');
      const [searchCaixa, setSearchCaixa] = useState(''); const [dateCaixaStart, setDateCaixaStart] = useState(''); const [dateCaixaEnd, setDateCaixaEnd] = useState('');
      const [searchForn, setSearchForn] = useState('');

      useEffect(() => {
        if(!userProfile) return;
        const { db, collection, doc, onSnapshot, updateDoc, query, where } = window.NexoFB;
        const empRef = doc(db, "empresas", userProfile.empresaId);
        const unsubs =[];
        
        const interval = setInterval(() => { updateDoc(empRef, { lastOnline: Date.now() }).catch(()=>{}); }, 60000);

        unsubs.push(onSnapshot(collection(empRef, "viagens"), snap => {
            const arr =[]; snap.forEach(d => arr.push({id: d.id, ...d.data()})); setViagens(arr);
            if(arr.length > 0) { setViagemSelecionadaId(prev => (prev && arr.find(x=>x.id===prev)) ? prev : arr[0].id); } else { setViagemSelecionadaId(''); }
        }));
        unsubs.push(onSnapshot(collection(empRef, "passageiros"), snap => { const arr =[]; snap.forEach(d => arr.push({id: d.id, ...d.data()})); setPassageiros(arr); }));
        unsubs.push(onSnapshot(collection(empRef, "caixa"), snap => { const arr =[]; snap.forEach(d => arr.push({id: d.id, ...d.data()})); setCaixa(arr.sort((a,b) => b.data.localeCompare(a.data))); }));
        unsubs.push(onSnapshot(collection(empRef, "fornecedores"), snap => { const arr =[]; snap.forEach(d => arr.push({id: d.id, ...d.data()})); setFornecedores(arr); }));
        unsubs.push(onSnapshot(doc(empRef, "config", "reservas"), snap => { if(snap.exists()) setReservas(snap.data().mapa || {}); else setReservas({}); }));
        unsubs.push(onSnapshot(collection(empRef, "notificacoes"), snap => { const arr =[]; snap.forEach(d => arr.push({id: d.id, ...d.data()})); setNotificacoes(arr.sort((a,b) => { const getTime = (val) => { if (!val) return 0; if (val.toDate) return val.toDate().getTime(); return new Date(val).getTime() || 0; }; return getTime(b.data) - getTime(a.data); })); }));
        
        const qChamados = query(collection(db, "chamados_suporte"), where("empresaId", "==", userProfile.empresaId));
        unsubs.push(onSnapshot(qChamados, snap => {
            const arr =[]; snap.forEach(d => arr.push({id: d.id, ...d.data()}));
            setMeusChamados(arr.sort((a,b) => new Date(b.data).getTime() - new Date(a.data).getTime()));
        }));

        return () => { unsubs.forEach(fn => fn()); clearInterval(interval); };
      },[userProfile]);

      const apagarNotificacao = async (id) => { await window.NexoFB.deleteDoc(window.NexoFB.doc(window.NexoFB.db, "empresas", userProfile.empresaId, "notificacoes", id)); };
      const marcarLida = async (id) => { await window.NexoFB.updateDoc(window.NexoFB.doc(window.NexoFB.db, "empresas", userProfile.empresaId, "notificacoes", id), { lida: true }); };

      const filteredViagens = viagens.filter(v => {
          let matchText = true; let matchStart = true; let matchEnd = true;
          if(searchViagens) matchText = v.destino.toLowerCase().includes(searchViagens.toLowerCase()) || v.localEmbarque.toLowerCase().includes(searchViagens.toLowerCase());
          if(dateViagensStart) matchStart = v.dataSaida >= dateViagensStart;
          if(dateViagensEnd) matchEnd = v.dataSaida <= dateViagensEnd;
          return matchText && matchStart && matchEnd;
      });

      const filteredPax = passageiros.filter(p => p.viagemId === viagemSelecionadaId).filter(p => {
          if(!searchPax) return true;
          const term = searchPax.toLowerCase(); return p.nome.toLowerCase().includes(term) || p.cpf.includes(term);
      });

      const cxViagem = viagemSelecionadaId ? caixa.filter(c => c.viagemId === viagemSelecionadaId) : caixa;
      const filteredCaixa = cxViagem.filter(c => {
          let matchText = true; let matchStart = true; let matchEnd = true;
          if(searchCaixa) {
              const term = searchCaixa.toLowerCase(); const pName = (passageiros.find(x => x.id === c.passageiroId)?.nome || '').toLowerCase(); const fName = (fornecedores.find(x => x.id === c.fornecedorId)?.nome || '').toLowerCase();
              matchText = c.desc.toLowerCase().includes(term) || pName.includes(term) || fName.includes(term);
          }
          if(dateCaixaStart) matchStart = c.data >= dateCaixaStart;
          if(dateCaixaEnd) matchEnd = c.data <= dateCaixaEnd;
          return matchText && matchStart && matchEnd;
      });

      const filteredForn = fornecedores.filter(f => {
          if(!searchForn) return true;
          const term = searchForn.toLowerCase(); return f.nome.toLowerCase().includes(term) || f.servico.toLowerCase().includes(term) || f.documento.includes(term);
      });

      const unreadCount = notificacoes.filter(n => !n.lida).length;

      const exportarPDF = (tipo) => {
          if (typeof ReactDOM.flushSync === 'function') { try { ReactDOM.flushSync(() => setPrintView(tipo)); } catch(e) { setPrintView(tipo); } } else { setPrintView(tipo); }
          setTimeout(() => { try { window.print(); } catch(err) { console.error("Erro na impressão: ", err); } }, 800);
      };

      return (
        <div className="flex flex-col h-full w-full relative">
          <div className="no-print header-gradient pt-safe shrink-0 px-5 relative z-10 overflow-hidden" style={{ paddingTop: 'max(1.5rem, env(safe-area-inset-top))', paddingBottom: '3.5rem' }}>
            <div className="absolute top-0 right-0 w-64 h-64 rounded-full opacity-10 bg-purple-600 blur-[50px] transform translate-x-1/4 -translate-y-1/4"></div>
            <div className="flex justify-between items-center relative z-10">
              <div className="flex items-center gap-3">
                <div className="w-12 h-12 relative z-10 flex items-center justify-center animate-float" style={{filter: 'drop-shadow(0 0 12px rgba(168, 85, 247, 0.6))'}}>
                    <svg viewBox="0 0 100 100" className="w-full h-full" style={{filter: 'drop-shadow(0px 2px 8px rgba(0, 0, 0, 0.9))'}} xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="nGradHeader" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#c084fc" /><stop offset="50%" stopColor="#a855f7" /><stop offset="100%" stopColor="#6b21a8" /></linearGradient></defs><path d="M 25 15 C 32 15 35 20 35 25 L 35 50 L 62 18 C 68 12 75 15 75 25 L 75 85 C 68 85 65 80 65 75 L 65 50 L 38 82 C 32 88 25 85 25 75 Z" fill="url(#nGradHeader)"/></svg>
                </div>
                <div>
                  <h1 className="text-xl font-black text-white tracking-wide leading-tight truncate max-w-[180px] sm:max-w-[250px]">{userProfile.nome}</h1>
                  <p className="text-[9px] font-bold uppercase tracking-widest text-purple-400 mt-0.5">NEXO ERP • {saudacao}</p>
                </div>
              </div>
              <div className="flex gap-3 items-center">
                  <button onClick={() => setShowNotificacoes(true)} className="relative w-10 h-10 rounded-full flex items-center justify-center text-white bg-white/5 border border-white/10 backdrop-blur-md transition-transform active:scale-90"><i className="fa-solid fa-bell text-sm"></i>{unreadCount > 0 && <span className="absolute top-1 right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-[#1c1b22] animate-pulse"></span>}</button>
                  <button onClick={() => setModalConfig(true)} className="w-10 h-10 rounded-full flex items-center justify-center text-white bg-white/5 border border-white/10 backdrop-blur-md transition-transform active:scale-90"><i className="fa-solid fa-gear text-sm"></i></button>
              </div>
            </div>
          </div>

          <main className="no-print flex-1 overflow-y-auto w-full no-scrollbar px-4 -mt-8 relative z-20 pb-28">
            <div className="animate-fadeinup">
              {activeTab === 'dashboard'   && <Dashboard viagens={viagens} caixa={caixa} passageiros={passageiros} reservas={reservas} setActiveTab={setActiveTab} />}
              {activeTab === 'viagens'     && <Viagens viagensFiltered={filteredViagens} userProfile={userProfile} showDialog={showDialog} searchParams={{searchViagens, setSearchViagens, dateViagensStart, setDateViagensStart, dateViagensEnd, setDateViagensEnd}} />}
              {activeTab === 'passageiros' && <Passageiros paxFiltered={filteredPax} viagens={viagens} viagemSelecionadaId={viagemSelecionadaId} setViagemSelecionadaId={setViagemSelecionadaId} exportarPDF={exportarPDF} caixa={caixa} reservas={reservas} userProfile={userProfile} showDialog={showDialog} searchParams={{searchPax, setSearchPax}} />}
              {activeTab === 'reservas'    && <Onibus viagens={viagens} viagemSelecionadaId={viagemSelecionadaId} setViagemSelecionadaId={setViagemSelecionadaId} reservas={reservas} passageiros={passageiros} exportarPDF={exportarPDF} userProfile={userProfile} showDialog={showDialog} />}
              {activeTab === 'caixa'       && <Caixa cxFiltered={filteredCaixa} viagens={viagens} viagemSelecionadaId={viagemSelecionadaId} setViagemSelecionadaId={setViagemSelecionadaId} passageiros={passageiros} fornecedores={fornecedores} exportarPDF={exportarPDF} setReciboData={setReciboData} userProfile={userProfile} showDialog={showDialog} searchParams={{searchCaixa, setSearchCaixa, dateCaixaStart, setDateCaixaStart, dateCaixaEnd, setDateCaixaEnd}} />}
              {activeTab === 'fornecedores'&& <Fornecedores fornFiltered={filteredForn} exportarPDF={exportarPDF} userProfile={userProfile} showDialog={showDialog} searchParams={{searchForn, setSearchForn}} />}
            </div>
          </main>

          <nav className="no-print fixed bottom-0 w-full pb-safe z-50 bg-white/95 dark:bg-[#0f0e13]/95 backdrop-blur-xl border-t border-slate-200 dark:border-[#2a2931] shadow-[0_-6px_30px_rgba(147,51,234,0.06)] transition-colors">
            <div className="flex justify-around items-center h-16 px-2">
              <NavButton icon="fa-chart-pie"          label="Início"    isActive={activeTab==='dashboard'}    onClick={()=>setActiveTab('dashboard')} />
              <NavButton icon="fa-map-location-dot"   label="Viagens"   isActive={activeTab==='viagens'}      onClick={()=>setActiveTab('viagens')} />
              <NavButton icon="fa-users"              label="Pessoas"   isActive={activeTab==='passageiros'}  onClick={()=>setActiveTab('passageiros')} />
              <NavButton icon="fa-wallet"             label="Caixa"     isActive={activeTab==='caixa'}        onClick={()=>setActiveTab('caixa')} />
              <NavButton icon="fa-handshake"          label="Serviços"  isActive={activeTab==='fornecedores'} onClick={()=>setActiveTab('fornecedores')} />
              <NavButton icon="fa-bus"                label="Poltronas" isActive={activeTab==='reservas'}     onClick={()=>setActiveTab('reservas')} />
            </div>
          </nav>

          {modalConfig && <Configuracoes chamados={meusChamados} onLogout={onLogout} onClose={()=>setModalConfig(false)} userProfile={userProfile} showDialog={showDialog} theme={theme} toggleTheme={toggleTheme} />}
          
          {showNotificacoes && (
              <Modal onClose={()=>setShowNotificacoes(false)} title="Notificações Recebidas">
                  {notificacoes.length === 0 ? <div className="text-center text-slate-400 dark:text-slate-500 py-10 font-semibold"><i className="fa-solid fa-bell-slash text-3xl mb-3 block text-slate-300 dark:text-slate-600"></i>Nenhuma notificação na sua caixa.</div> : (
                      <div className="space-y-3 pb-4"> {notificacoes.map(n => ( <NotificacaoItem key={n.id} notif={n} onDelete={apagarNotificacao} onRead={marcarLida} /> ))} </div>
                  )}
              </Modal>
          )}

          {/* ─── ÁREA DE IMPRESSÃO DOS RELATÓRIOS (Sempre Light Mode para Impressora) ─── */}
          <div className="hidden print:block p-6 text-black bg-white font-sans w-full">
            {printView !== 'recibo' && (
              <div className="border-b-2 border-slate-300 pb-6 mb-8 flex justify-between items-center">
                <div className="flex items-center gap-4">
                  <div className="w-12 h-12 relative flex items-center justify-center drop-shadow-md">
                      <svg viewBox="0 0 100 100" className="w-full h-full" xmlns="http://www.w3.org/2000/svg"><path d="M 25 15 C 32 15 35 20 35 25 L 35 50 L 62 18 C 68 12 75 15 75 25 L 75 85 C 68 85 65 80 65 75 L 65 50 L 38 82 C 32 88 25 85 25 75 Z" fill="#9333ea"/></svg>
                  </div>
                  <div>
                      <h1 className="text-2xl font-black uppercase tracking-tighter text-slate-800 flex items-baseline gap-1" style={{lineHeight:'1'}}>NEXO <span className="font-light text-purple-600 text-xl">ERP</span></h1>
                      <p className="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-widest">Simplificando sua Agência</p>
                  </div>
                </div>
                <div className="text-right"><p className="font-bold text-sm text-slate-800">{userProfile.nome}</p><p className="text-xs text-slate-500 mt-0.5">Emitido em: {new Date().toLocaleDateString('pt-BR')}</p></div>
              </div>
            )}
            
            {printView === 'caixa' && (() => {
              const vSelecionada = viagens.find(v => v.id === viagemSelecionadaId);
              const ent = filteredCaixa.filter(c=>c.tipo==='entrada').reduce((a,b)=>a+b.valor,0);
              const sai = filteredCaixa.filter(c=>c.tipo==='saida').reduce((a,b)=>a+b.valor,0);
              const lucro = ent - sai;

              let infoPeriodo = '';
              if(dateCaixaStart && dateCaixaEnd) infoPeriodo = ` (De ${fmt(dateCaixaStart)} a ${fmt(dateCaixaEnd)})`;
              else if(dateCaixaStart) infoPeriodo = ` (A partir de ${fmt(dateCaixaStart)})`;
              else if(dateCaixaEnd) infoPeriodo = ` (Até ${fmt(dateCaixaEnd)})`;

              return (
                <div>
                  <h2 className="text-xl font-black bg-slate-100 p-3 mb-6 uppercase border-l-4 border-l-purple-600 text-slate-800 rounded-r-lg">Financeiro: {vSelecionada ? vSelecionada.destino : 'Geral'}{infoPeriodo}</h2>
                  <div className="grid grid-cols-3 gap-4 mb-8">
                      <div className="p-4 border border-slate-200 rounded-xl bg-slate-50"><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Total Arrecadado</p><p className="text-2xl font-black text-emerald-600 mt-1">{fmtMoeda(ent)}</p></div>
                      <div className="p-4 border border-slate-200 rounded-xl bg-slate-50"><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Total Gasto</p><p className="text-2xl font-black text-red-600 mt-1">{fmtMoeda(sai)}</p></div>
                      <div className="p-4 border-2 border-slate-800 rounded-xl bg-slate-800 text-white"><p className="text-[10px] font-bold text-purple-300 uppercase tracking-widest">Lucro do Período</p><p className="text-2xl font-black mt-1">{fmtMoeda(lucro)}</p></div>
                  </div>
                  <table className="w-full text-left border-collapse text-sm">
                    <thead><tr className="bg-slate-100 border-b-2 border-slate-300"><th className="p-2.5 font-bold text-slate-700">Data</th><th className="p-2.5 font-bold text-slate-700">Descrição</th><th className="p-2.5 font-bold text-slate-700">Vínculo</th><th className="p-2.5 font-bold text-slate-700 text-right">Valor (R$)</th></tr></thead>
                    <tbody>
                      {filteredCaixa.map(c => {
                        const p = passageiros.find(x => x.id === c.passageiroId); const f = fornecedores.find(x => x.id === c.fornecedorId); const vinculo = c.tipo === 'entrada' ? (p ? p.nome : '—') : (f ? f.nome : '—');
                        return (<tr key={c.id} className="border-b border-slate-200"><td className="p-2.5 text-slate-600">{fmt(c.data)}</td><td className="p-2.5 font-bold text-slate-800">{c.desc} <span className="text-[10px] font-normal text-slate-400 ml-1">({c.tipo})</span></td><td className="p-2.5 text-slate-600">{vinculo}</td><td className={`p-2.5 text-right font-black ${c.tipo==='entrada'?'text-emerald-600':'text-red-600'}`}>{c.tipo==='entrada'?'+':'-'} {fmtMoeda(c.valor)}</td></tr>);
                      })}
                    </tbody>
                  </table>
                </div>
              );
            })()}

            {printView === 'roomingList' && (() => {
              const vSelecionada = viagens.find(v => v.id === viagemSelecionadaId);
              return (
                <div>
                  <h2 className="text-xl font-black bg-slate-100 p-3 mb-6 uppercase border-l-4 border-l-purple-600 text-slate-800 rounded-r-lg">Rooming List: {vSelecionada ? vSelecionada.destino : ''}</h2>
                  <table className="w-full text-left border-collapse text-sm">
                    <thead><tr className="bg-slate-100 border-b-2 border-slate-300"><th className="p-2.5 font-bold text-slate-700">Nome Completo</th><th className="p-2.5 font-bold text-slate-700">CPF</th><th className="p-2.5 font-bold text-slate-700">RG</th><th className="p-2.5 font-bold text-slate-700">Nascimento</th><th className="p-2.5 font-bold text-slate-700">Telefone</th></tr></thead>
                    <tbody>
                      {filteredPax.map(p=>(
                        <tr key={p.id} className="border-b border-slate-200"><td className="p-2.5 font-bold text-slate-800">{p.nome}</td><td className="p-2.5 text-slate-600">{p.cpf}</td><td className="p-2.5 text-slate-600">{p.rg}</td><td className="p-2.5 text-slate-600">{fmt(p.nascimento)}</td><td className="p-2.5 text-slate-600">{p.telefone}</td></tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              );
            })()}
            
            {printView === 'manifesto' && (() => {
              const vSelecionada = viagens.find(v => v.id === viagemSelecionadaId);
              return (
                <div>
                  <h2 className="text-xl font-black bg-slate-100 p-3 mb-6 uppercase border-l-4 border-l-purple-600 text-slate-800 rounded-r-lg">Manifesto de Viagem (Ônibus): {vSelecionada ? vSelecionada.destino : ''}</h2>
                  <table className="w-full text-left border-collapse text-sm">
                    <thead><tr className="bg-slate-100 border-b-2 border-slate-300"><th className="p-2.5 font-bold text-slate-700 text-center w-24">Poltrona</th><th className="p-2.5 font-bold text-slate-700">Passageiro</th><th className="p-2.5 font-bold text-slate-700">Contato</th><th className="p-2.5 font-bold text-slate-700">Contato de Emergência</th></tr></thead>
                    <tbody>
                      {Array.from({length:46},(_,i)=>i+1).map(num=>{ 
                        const p = passageiros.find(x=>x.id===reservas[viagemSelecionadaId]?.[num]); 
                        return (<tr key={num} className="border-b border-slate-200"><td className="p-2.5 text-center font-black text-lg text-purple-600">{num}</td><td className={`p-2.5 ${p?'font-bold text-slate-800':'text-slate-400 italic'}`}>{p?p.nome:'Livre'}</td><td className="p-2.5 text-slate-600">{p?p.telefone:'—'}</td><td className="p-2.5 text-slate-600 text-xs">{p?p.emergencial:'—'}</td></tr>);
                      })}
                    </tbody>
                  </table>
                </div>
              );
            })()}
            
            {printView === 'recibo' && reciboData && (
              <div className="border-2 border-slate-300 p-8 rounded-2xl max-w-3xl mx-auto mt-10 relative">
                  <div className="absolute top-0 right-0 bg-purple-600 text-white font-black px-6 py-2 rounded-bl-2xl rounded-tr-xl uppercase tracking-widest">Recibo Oficial</div>
                  <div className="flex justify-between items-end border-b-2 border-slate-200 pb-6 mb-8 mt-4">
                      <div>
                          <div className="flex items-center gap-3 mb-2">
                              <div className="w-10 h-10 relative flex items-center justify-center drop-shadow-sm">
                                  <svg viewBox="0 0 100 100" className="w-full h-full" xmlns="http://www.w3.org/2000/svg"><path d="M 25 15 C 32 15 35 20 35 25 L 35 50 L 62 18 C 68 12 75 15 75 25 L 75 85 C 68 85 65 80 65 75 L 65 50 L 38 82 C 32 88 25 85 25 75 Z" fill="#9333ea"/></svg>
                              </div>
                              <h2 className="text-3xl font-black text-slate-800">{userProfile.nome}</h2>
                          </div>
                      </div>
                      <div className="text-right bg-slate-100 px-6 py-3 rounded-xl border border-slate-200"><p className="text-xs font-bold text-slate-500 uppercase tracking-widest mb-1">Valor</p><h3 className="text-3xl font-black text-purple-600">R$ {reciboData.valor.toFixed(2)}</h3></div>
                  </div>
                  <div className="space-y-6 text-lg leading-relaxed text-slate-700">
                      <p>Recebemos de <strong className="text-black uppercase">{reciboData.clienteNome}</strong> (CPF: {reciboData.clienteCpf}),</p><p>A importância de <strong className="text-black">R$ {reciboData.valor.toFixed(2)}</strong> referente a <strong className="text-black">{reciboData.desc}</strong>.</p>
                      <div className="grid grid-cols-2 gap-4 mt-6 bg-slate-50 p-4 rounded-xl border border-slate-200"><div><p className="text-xs font-bold text-slate-400 uppercase mb-1">Forma de Pagamento</p><p className="font-bold">{reciboData.forma}</p></div><div><p className="text-xs font-bold text-slate-400 uppercase mb-1">Data / Hora</p><p className="font-bold">{fmt(reciboData.data)} às {reciboData.hora}</p></div></div>
                  </div>
                  <div className="mt-20 pt-8 border-t-2 border-dashed border-slate-300 text-center w-2/3 mx-auto"><p className="font-black text-xl text-slate-800">{userProfile.nome}</p><p className="text-sm text-slate-500 mt-1">Gerado eletronicamente via Nexo ERP</p></div>
              </div>
            )}
            
            {printView === 'fornecedores' && (
              <div>
                <h2 className="text-xl font-black bg-slate-100 p-3 mb-6 uppercase border-l-4 border-l-purple-600 text-slate-800 rounded-r-lg">Relação de Fornecedores & Serviços</h2>
                <table className="w-full text-left border-collapse text-sm">
                  <thead><tr className="bg-slate-100 border-b-2 border-slate-300"><th className="p-2.5 font-bold text-slate-700">Serviço & Empresa</th><th className="p-2.5 font-bold text-slate-700">Contato</th><th className="p-2.5 font-bold text-slate-700 text-right">Financeiro (R$)</th><th className="p-2.5 font-bold text-slate-700 text-center">Vencimento</th></tr></thead>
                  <tbody>
                    {filteredForn.map(f=>(
                      <tr key={f.id} className="border-b border-slate-200"><td className="p-2.5"><p className="font-bold text-slate-800">{f.servico}</p><p className="text-xs text-slate-500 mt-0.5">{f.nome}</p></td><td className="p-2.5 text-slate-600"><p className="font-medium text-slate-800">{f.telefone}</p><p className="text-xs">{f.contatoNome}</p></td><td className="p-2.5 text-right"><p className="font-bold text-slate-800">Total: {fmtMoeda(f.valorTotal||0)}</p><p className="text-xs text-emerald-600 font-bold mt-0.5">Pago: {fmtMoeda(f.valorPago||0)}</p></td><td className="p-2.5 text-center font-medium text-slate-700">{fmt(f.dataLimite)}</td></tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        </div>
      );
    }

    function NexoFRP() {
      const[fbReady, setFbReady] = useState(!!window.NexoFB);
      const[userProfile, setUserProfile] = useState(null);
      const[loading, setLoading] = useState(true);
      const[dialogConfig, setDialogConfig] = useState({ isOpen: false, type: 'alert', title: '', message: '', onConfirm: null });
      
      const [theme, setTheme] = useState(() => localStorage.getItem('nexo-theme') || 'light');
      useEffect(() => {
          if (theme === 'dark') {
              document.documentElement.classList.add('dark');
          } else {
              document.documentElement.classList.remove('dark');
          }
          localStorage.setItem('nexo-theme', theme);
      }, [theme]);
      const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');

      const showDialog = (type, title, message, onConfirm = null) => { SoundManager.init(); if (title === 'Sucesso' || title.includes('Recebemos')) { SoundManager.success(); } else if (title === 'Atenção' || title.includes('Erro') || title.includes('Negado') || title.includes('Bloqueado')) { SoundManager.error(); } else { SoundManager.click(); } setDialogConfig({ isOpen: true, type, title, message, onConfirm }); };

      useEffect(() => {
        if(!fbReady) { const handleReady = () => setFbReady(true); window.addEventListener('firebase-ready', handleReady); return () => window.removeEventListener('firebase-ready', handleReady); }
        const { auth, db, onAuthStateChanged, getDoc, doc, signOut } = window.NexoFB;
        const unsub = onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                    if(userDoc.exists()) {
                        const data = userDoc.data(); const empDoc = await getDoc(doc(db, "empresas", data.empresaId));
                        if(empDoc.exists() && empDoc.data().status === 'Ativo') {
                            const empData = empDoc.data();
                            if (empData.plano !== 'Vitalício' && empData.vencimento) {
                                const hoje = new Date(); const vencimento = new Date(empData.vencimento + 'T00:00:00'); vencimento.setHours(vencimento.getHours() + 24);
                                if (hoje > vencimento) { showDialog('alert', 'Acesso Bloqueado', 'Sua assinatura expirou. O acesso ao sistema está restrito. Regularize para voltar a acessar.'); await signOut(auth); setUserProfile(null); setLoading(false); return; }
                                const diasRestantes = Math.ceil((vencimento - hoje) / (1000 * 60 * 60 * 24));
                                if (diasRestantes <= 5 && diasRestantes >= 0) { setTimeout(() => { showDialog('alert', 'Aviso de Vencimento', `Sua assinatura do Nexo ERP vence em ${diasRestantes} dias. Por favor, regularize para evitar o bloqueio automático.`); }, 2000); }
                            }
                            setUserProfile({ uid: user.uid, email: user.email, empresaId: data.empresaId, nome: empData.nomeFantasia, assinatura: { plano: empData.plano, vencimento: empData.vencimento, valor: empData.valorMensalidade } });
                        } else { showDialog('alert', 'Acesso Negado', 'Sua conta está inativa ou bloqueada. Contate o suporte Nexo.'); await signOut(auth); setUserProfile(null); }
                    } else { showDialog('alert', 'Erro de Perfil', 'Perfil não localizado no sistema.'); await signOut(auth); }
                } catch(e) { await signOut(auth); }
            } else { setUserProfile(null); }
            setLoading(false);
        });
        return () => unsub();
      }, [fbReady]);

      if(!fbReady || loading) return (
        <div className="h-full w-full flex flex-col items-center justify-center bg-[#0f0e13]">
          <div className="w-24 h-24 relative flex items-center justify-center animate-pulse-glow">
              <svg viewBox="0 0 100 100" className="w-full h-full relative z-10" style={{filter: 'drop-shadow(0px 4px 15px rgba(0, 0, 0, 0.9))'}} xmlns="http://www.w3.org/2000/svg">
                  <defs><linearGradient id="nexoGradSplash" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#c084fc" /><stop offset="50%" stopColor="#a855f7" /><stop offset="100%" stopColor="#6b21a8" /></linearGradient></defs>
                  <path d="M 25 15 C 32 15 35 20 35 25 L 35 50 L 62 18 C 68 12 75 15 75 25 L 75 85 C 68 85 65 80 65 75 L 65 50 L 38 82 C 32 88 25 85 25 75 Z" fill="url(#nexoGradSplash)" />
              </svg>
          </div>
          <p className="mt-8 text-purple-400 font-bold tracking-widest text-[10px] uppercase animate-pulse">Conectando ao Nexo...</p>
        </div>
      );
      
      return (
        <>
            {!userProfile ? <Login showDialog={showDialog} /> : <MainApp userProfile={userProfile} onLogout={async () => { await window.NexoFB.signOut(window.NexoFB.auth); }} showDialog={showDialog} theme={theme} toggleTheme={toggleTheme} />}
            <CustomDialog config={dialogConfig} onClose={() => setDialogConfig(prev => ({ ...prev, isOpen: false }))} />
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<NexoFRP />);
  </script>
  <script>
    if ('serviceWorker' in navigator && window.location.protocol !== 'file:') {
      window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').then(reg => console.log('Nexo App Motor Registrado!')).catch(err => console.log('Erro no motor do app', err)); });
    }
  </script>
</body>
</html>
