  <!-- Configuração do Tailwind para Modo Escuro via Classe -->

  <script>
    tailwind.config = {

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

    :root { 
      --nexo-neon: #9333ea; 
      --bg-light: #f4f5f9; 
    }
    
    * { box-sizing: border-box; }
    html, body { 
      height: 100%; height: 100dvh; width: 100vw; margin: 0; padding: 0; overflow: hidden; 
      font-family: 'Inter', sans-serif; 
      background: var(--bg-light); 
      -webkit-tap-highlight-color: transparent; overscroll-behavior: none; 
      transition: background-color 0.3s ease, color 0.3s ease;
    }
    
    html.dark body { background: #0f0e13; color: #f8fafc; }
    
    #root { height: 100%; width: 100%; display: flex; flex-direction: column; }
    .no-scrollbar::-webkit-scrollbar { display: none; } .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    
    @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-7px); } }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    @keyframes pulse-glow { 0% { filter: drop-shadow(0 0 10px rgba(168, 85, 247, 0.4)); transform: scale(0.98); } 100% { filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.9)) drop-shadow(0 0 45px rgba(168, 85, 247, 0.5)); transform: scale(1.02); } }
    
    .animate-float { animation: float 4s ease-in-out infinite; }
    .animate-slideup { animation: slideUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .animate-scalein { animation: scaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1) both; }
    .animate-pulse-glow { animation: pulse-glow 2s infinite alternate ease-in-out; }

    /* Glass Card adaptativo */
    .glass-card { background: rgba(255,255,255,0.95); backdrop-filter: blur(14px); border: 1px solid rgba(226, 232, 240, 0.8); box-shadow: 0 4px 20px rgba(0,0,0,0.04); transition: background 0.3s, border 0.3s; }
    html.dark .glass-card { background: rgba(28, 27, 34, 0.95); border-color: rgba(42, 41, 49, 0.8); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    
    .glass-card-hover:active { transform: scale(0.98); transition: all 0.1s ease; }
    .header-gradient { background: linear-gradient(145deg, #0f0e13 0%, #1c1b22 100%); border-bottom: 1px solid #2a2931; }
    .neon-button { background: var(--nexo-neon); box-shadow: 0 4px 15px rgba(147,51,234,0.3); color: white; transition: all 0.2s; border: none; }
    .neon-button:active { transform: scale(0.95); box-shadow: 0 2px 8px rgba(147,51,234,0.2); }
    
    .seat-btn { position: relative; border-radius: 8px 8px 4px 4px; border-bottom-width: 4px; transition: all 0.15s ease; }
    .seat-btn:active { transform: scale(0.92); }
    .seat-sel { background:linear-gradient(160deg,#9333ea,#7e22ce); color:#fff; border-color:#581c87; box-shadow:0 4px 16px rgba(147,51,234,.45); transform:scale(1.1); z-index:10; }
    
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--nexo-neon) !important; box-shadow: 0 0 0 3px rgba(147,51,234,0.15); }
    .pb-safe { padding-bottom: max(0px, env(safe-area-inset-bottom)); }

    @media print { 
        html, body, #root { height: auto !important; width: auto !important; overflow: visible !important; display: block !important; background-color: white !important; color: black !important; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; position: static !important; } 
        .no-print { display: none !important; } 
        @page { margin: 1cm; size: portrait; } 
    }

<body class="text-slate-800 dark:text-slate-100 transition-colors duration-300">
  
  <script type="module">

    const firebaseConfig = { apiKey: "AIzaSyAxyVFfsSBS1dNtBfiJoNHqkE5LyxUTRFI", authDomain: "nexo-crm-5325f.firebaseapp.com", projectId: "nexo-crm-5325f", storageBucket: "nexo-crm-5325f.firebasestorage.app", messagingSenderId: "145983577119", appId: "1:145983577119:web:003e53b89437cfb1b4092a" };

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    const fmt = (iso) => { if (!iso) return '—'; if (typeof iso === 'string') { try { return iso.split('T')[0].split('-').reverse().join('/'); } catch(e) { return '—'; } } if (iso.toDate) { return iso.toDate().toLocaleDateString('pt-BR'); } return '—'; };
    const fmtHora = (iso) => { if (!iso) return ''; try { const d = typeof iso === 'string' ? new Date(iso) : (iso.toDate ? iso.toDate() : new Date()); return d.toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'}); } catch(e){return '';} };
    const diasAte = (iso) => { if (!iso || typeof iso !== 'string') return null; try { const hoje = new Date(); hoje.setHours(0,0,0,0); return Math.round((new Date(iso + 'T00:00:00') - hoje) / 86400000); } catch(e) { return null; } };
    const fmtMoeda = (v) => `R$ ${Number(v).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g,'.')}`;

    const SoundManager = {
        ctx: null,
        init: function() { if (!this.ctx) { try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} } if (this.ctx && this.ctx.state === 'suspended') { this.ctx.resume(); } },
        playOscillator: function(freq, type, duration, vol) { if (!this.ctx || this.ctx.state === 'suspended') return; try { const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain(); osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime); gain.gain.setValueAtTime(vol, this.ctx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration); osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + duration); } catch(e) {} },
        click: function() { this.playOscillator(600, 'sine', 0.1, 0.05); },
        type: function() { this.playOscillator(800, 'triangle', 0.03, 0.02); },
        success: function() { this.playOscillator(400, 'sine', 0.1, 0.05); setTimeout(() => this.playOscillator(600, 'sine', 0.2, 0.05), 100); },
        error: function() { this.playOscillator(250, 'square', 0.15, 0.05); setTimeout(() => this.playOscillator(200, 'square', 0.2, 0.05), 150); },
        login: function() { this.playOscillator(523.25, 'sine', 0.1, 0.05); setTimeout(() => this.playOscillator(659.25, 'sine', 0.1, 0.05), 100); setTimeout(() => this.playOscillator(783.99, 'sine', 0.3, 0.05), 200); }
    };

    window.addEventListener('pointerdown', (e) => { SoundManager.init(); if(e.target.closest('button') || e.target.closest('.cursor-pointer') || e.target.closest('a') || e.target.closest('.seat-btn')) { SoundManager.click(); } });
    window.addEventListener('input', (e) => { SoundManager.init(); if(e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') { SoundManager.type(); } });

    function isValidCPF(cpf) { cpf = cpf.replace(/[^\d]+/g,''); if(cpf == '' || cpf.length != 11 || /^(\d)\1{10}$/.test(cpf)) return false; let add = 0; for (let i=0; i < 9; i ++) add += parseInt(cpf.charAt(i)) * (10 - i); let rev = 11 - (add % 11); if (rev == 10 || rev == 11) rev = 0; if (rev != parseInt(cpf.charAt(9))) return false; add = 0; for (let i = 0; i < 10; i ++) add += parseInt(cpf.charAt(i)) * (11 - i); rev = 11 - (add % 11); if (rev == 10 || rev == 11) rev = 0; if (rev != parseInt(cpf.charAt(10))) return false; return true; }
    function isValidCNPJ(cnpj) { cnpj = cnpj.replace(/[^\d]+/g,''); if(cnpj == '' || cnpj.length != 14 || /^(\d)\1{13}$/.test(cnpj)) return false; let tamanho = cnpj.length - 2; let numeros = cnpj.substring(0,tamanho); let digitos = cnpj.substring(tamanho); let soma = 0; let pos = tamanho - 7; for (let i = tamanho; i >= 1; i--) { soma += numeros.charAt(tamanho - i) * pos--; if (pos < 2) pos = 9; } let resultado = soma % 11 < 2 ? 0 : 11 - soma % 11; if (resultado != digitos.charAt(0)) return false; tamanho = tamanho + 1; numeros = cnpj.substring(0,tamanho); soma = 0; pos = tamanho - 7; for (let i = tamanho; i >= 1; i--) { soma += numeros.charAt(tamanho - i) * pos--; if (pos < 2) pos = 9; } resultado = soma % 11 < 2 ? 0 : 11 - soma % 11; if (resultado != digitos.charAt(1)) return false; return true; }

    const applyMask = (v, type) => {
        if(!v) return ''; let unmasked = v.replace(/\D/g, '');
        if (type === 'cpf') { unmasked = unmasked.slice(0, 11); return unmasked.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2'); }
        if (type === 'cpfcnpj') { if (unmasked.length <= 11) { return unmasked.replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d)/, '$1.$2').replace(/(\d{3})(\d{1,2})$/, '$1-$2'); } else { return unmasked.slice(0,14).replace(/^(\d{2})(\d)/, '$1.$2').replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3').replace(/\.(\d{3})(\d)/, '.$1/$2').replace(/(\d{4})(\d)/, '$1-$2'); } }
        if (type === 'phone') { unmasked = unmasked.slice(0, 11); if (unmasked.length > 10) return unmasked.replace(/^(\d{2})(\d{5})(\d{4})/, '($1) $2-$3'); if (unmasked.length > 6) return unmasked.replace(/^(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3'); if (unmasked.length > 2) return unmasked.replace(/^(\d{2})(\d{0,5})/, '($1) $2'); return unmasked.replace(/^(\d*)/, '($1'); }
        return v;
    };

    // Estilos base de input centralizados para facilitar tema Dark/Light
    const baseInpCls = "w-full p-3.5 rounded-xl text-sm font-medium bg-slate-50 border border-slate-200 text-slate-800 focus:bg-white transition-all outline-none dark:bg-nDarkCard dark:border-nDarkBorder dark:text-white dark:focus:bg-nDarkHover";

    function MaskedInp({ label, name, defaultValue = '', maskType, required, placeholder }) {
        const[val, setVal] = useState(''); useEffect(() => { setVal(applyMask(defaultValue || '', maskType)); },[defaultValue, maskType]);
        return ( <div> {label && <label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 ml-1">{label}</label>} <input type="text" name={name} value={val} onChange={e => setVal(applyMask(e.target.value, maskType))} required={required} placeholder={placeholder} className={baseInpCls} /> </div> );
    }

    function CurrencyInp({ label, name, defaultValue = 0, required, placeholder }) {
        const[disp, setDisp] = useState('');
        const formatMoney = (val) => { let num = val.toString().replace(/\D/g, ''); if(!num) num = '0'; num = (parseInt(num, 10) / 100).toFixed(2); return num.replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, "."); };
        useEffect(() => { setDisp(formatMoney((parseFloat(defaultValue) || 0).toFixed(2))); },[defaultValue]);
        const rawValue = disp.replace(/\./g, '').replace(',', '.');
        return ( <div> {label && <label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 ml-1">{label}</label>} <div className="relative"> <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500 font-bold text-sm">R$</span> <input type="text" value={disp} onChange={e => setDisp(formatMoney(e.target.value))} required={required} placeholder={placeholder || "0,00"} className={`${baseInpCls} pl-10`} /> </div> <input type="hidden" name={name} value={rawValue} /> </div> );
    }

    function SearchBar({ value, onChange, placeholder, showDates = false, startDate, setStartDate, endDate, setEndDate }) {
        return (
            <div className="bg-slate-50 dark:bg-nDarkCard p-2.5 rounded-xl border border-slate-200 dark:border-nDarkBorder mb-4 flex flex-col gap-2 transition-colors">
                <div className="relative">
                    <i className="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 dark:text-slate-500"></i>
                    <input type="text" value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} className="w-full pl-9 p-2 rounded-lg text-sm font-medium bg-white dark:bg-[#151419] border border-slate-200 dark:border-nDarkBorder focus:border-purple-500 dark:focus:border-purple-500 text-slate-800 dark:text-white transition-all outline-none" />
                </div>
                {showDates && (
                    <div className="flex gap-2">
                        <div className="flex-1 flex items-center bg-white dark:bg-[#151419] border border-slate-200 dark:border-nDarkBorder rounded-lg px-2 transition-colors"><span className="text-[9px] text-slate-400 dark:text-slate-500 font-bold uppercase mr-1">De</span><input type="date" value={startDate} onChange={e=>setStartDate(e.target.value)} className="w-full p-1.5 text-xs outline-none bg-transparent text-slate-700 dark:text-slate-300 font-semibold custom-date-input" /></div>
                        <div className="flex-1 flex items-center bg-white dark:bg-[#151419] border border-slate-200 dark:border-nDarkBorder rounded-lg px-2 transition-colors"><span className="text-[9px] text-slate-400 dark:text-slate-500 font-bold uppercase mr-1">Até</span><input type="date" value={endDate} onChange={e=>setEndDate(e.target.value)} className="w-full p-1.5 text-xs outline-none bg-transparent text-slate-700 dark:text-slate-300 font-semibold custom-date-input" /></div>
                    </div>
                )}
            </div>
        );
    }

    function CustomDialog({ config, onClose }) {
        if (!config.isOpen) return null;
        return ReactDOM.createPortal(
            <div className="fixed inset-0 z-[10000] flex items-center justify-center p-5 animate-scalein" style={{background:'rgba(15,23,42,0.85)', backdropFilter:'blur(8px)'}}>
                <div className="bg-[#1c1b22] border border-[#2a2931] w-full max-w-sm rounded-[2rem] shadow-2xl p-6 text-center relative">
                    <div className={`mx-auto w-16 h-16 rounded-full flex items-center justify-center mb-4 border ${config.type === 'confirm' ? 'bg-amber-500/10 border-amber-500/30 text-amber-500' : (config.title==='Sucesso'||config.title.includes('Recebemos') ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : (config.title==='Erro'||config.title.includes('Negado')||config.title.includes('Atenção') ? 'bg-red-500/10 border-red-500/30 text-red-500' : 'bg-purple-500/10 border-purple-500/30 text-purple-400'))}`}>
                        <i className={`fa-solid ${config.type === 'confirm' ? 'fa-triangle-exclamation' : (config.title==='Sucesso' ? 'fa-check' : 'fa-bell')} text-2xl`}></i>
                    </div>
                    <h3 className="text-xl font-black text-white mb-2">{config.title}</h3>
                    <p className="text-sm text-gray-400 mb-8">{config.message}</p>
                    <div className="flex gap-3">
                        {config.type === 'confirm' && ( <button onClick={onClose} className="flex-1 py-3.5 rounded-xl font-bold text-slate-300 bg-[#2a2931] hover:bg-[#3f3e46] active:scale-95 transition-all">Cancelar</button> )}
                        <button onClick={() => { if(config.onConfirm) config.onConfirm(); onClose(); }} className={`flex-1 py-3.5 rounded-xl font-bold text-white active:scale-95 transition-transform ${config.type === 'confirm' ? 'bg-red-600 shadow-[0_0_15px_rgba(220,38,38,0.4)]' : 'bg-purple-600 shadow-[0_0_15px_rgba(147,51,234,0.4)]'}`}>
                            {config.type === 'confirm' ? 'Confirmar' : 'Entendi'}
                        </button>
                    </div>
                </div>
            </div>, document.body
        );
    }

    function Modal({ onClose, children, title }) { 
      return ReactDOM.createPortal( <div className="fixed inset-0 z-[9900] flex items-end sm:items-center justify-center p-0 sm:p-4 no-print transition-colors" style={{background:'rgba(15,23,42,0.6)', backdropFilter:'blur(4px)'}}> <div className="bg-white dark:bg-[#151419] border dark:border-[#2a2931] w-full sm:max-w-sm rounded-t-[2rem] sm:rounded-[2rem] shadow-2xl relative animate-slideup flex flex-col max-h-[90vh]"> <div className="flex justify-between items-center px-6 py-5 border-b border-slate-100 dark:border-[#2a2931] shrink-0"> <h3 className="font-black text-lg text-slate-800 dark:text-white">{title || "Detalhes"}</h3> <button onClick={onClose} className="w-8 h-8 rounded-full bg-slate-100 dark:bg-nDarkBorder text-slate-500 dark:text-slate-300 flex items-center justify-center font-bold active:scale-95 transition-colors"><i className="fa-solid fa-xmark"></i></button> </div> <div className="p-6 overflow-y-auto no-scrollbar pb-safe flex-1 relative"> {children} </div> </div> </div>, document.body ); 
    }

    function CustomSelect({ name, label, value, defaultValue, onChange, options, placeholder = "Selecione..." }) {
        const isControlled = value !== undefined; const[isOpen, setIsOpen] = useState(false); const[internalVal, setInternalVal] = useState(defaultValue || ''); const currentVal = isControlled ? value : internalVal; const selectedOption = options.find(o => o.value === currentVal);
        const handleSelect = (val) => { if (!isControlled) setInternalVal(val); if(onChange) onChange(val); setIsOpen(false); };
        return ( <div className="relative w-full"> {label && <label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 ml-1">{label}</label>} <div onClick={() => setIsOpen(true)} className="w-full p-3.5 rounded-xl text-sm font-semibold bg-slate-50 dark:bg-nDarkCard border border-slate-200 dark:border-nDarkBorder text-slate-700 dark:text-slate-200 flex justify-between items-center cursor-pointer active:bg-slate-100 dark:active:bg-nDarkHover transition-colors"> <span className={selectedOption ? 'text-slate-800 dark:text-white' : 'text-slate-400 dark:text-slate-500'}>{selectedOption ? selectedOption.label : placeholder}</span> <i className="fa-solid fa-chevron-down text-slate-400 dark:text-slate-500"></i> </div> <input type="hidden" name={name} value={currentVal} /> {isOpen && ( <Modal onClose={() => setIsOpen(false)} title={label || "Selecione uma opção"}> <div className="space-y-2"> {options.map(opt => ( <button key={opt.value} type="button" onClick={() => handleSelect(opt.value)} className={`w-full text-left p-4 rounded-xl font-bold transition-all flex justify-between items-center ${currentVal === opt.value ? 'bg-purple-100 dark:bg-purple-500/20 text-purple-700 dark:text-purple-400 border-2 border-purple-500 dark:border-purple-500/50' : 'bg-slate-50 dark:bg-nDarkCard text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-nDarkBorder active:bg-slate-100 dark:active:bg-nDarkHover'}`}> {opt.label} {currentVal === opt.value && <i className="fa-solid fa-circle-check text-purple-600 dark:text-purple-400 text-lg"></i>} </button> ))} {options.length === 0 && <p className="text-center text-sm text-slate-400 dark:text-slate-500 py-6">Nenhuma opção disponível.</p>} </div> </Modal> )} </div> );
    }

    function NotificacaoItem({ notif, onDelete, onRead }) {
        const[offsetX, setOffsetX] = useState(0); const [startX, setStartX] = useState(0);
        const handleTouchStart = (e) => setStartX(e.touches[0].clientX); const handleTouchMove = (e) => { const diff = e.touches[0].clientX - startX; if (diff < 0) setOffsetX(diff); }; const handleTouchEnd = () => { if (offsetX < -80) { setOffsetX(-1000); setTimeout(() => onDelete(notif.id), 200); } else { setOffsetX(0); } };
        return ( <div onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd} onClick={() => !notif.lida && onRead(notif.id)} style={{ transform: `translateX(${offsetX}px)`, transition: offsetX === 0 || offsetX === -1000 ? 'transform 0.2s' : 'none' }} className={`p-4 rounded-xl border relative overflow-hidden transition-colors ${notif.lida ? 'bg-slate-50 dark:bg-nDarkCard border-slate-200 dark:border-nDarkBorder opacity-70' : 'bg-purple-50 dark:bg-purple-500/10 border-purple-200 dark:border-purple-500/30 shadow-sm'}`}> {!notif.lida && <div className="absolute top-0 left-0 w-1 h-full bg-purple-500"></div>} <div className="flex justify-between items-start mb-1"> <h4 className={`font-black text-sm ${notif.lida ? 'text-slate-700 dark:text-slate-300' : 'text-purple-800 dark:text-purple-400'}`}>{notif.titulo}</h4> <span className="text-[9px] font-bold text-slate-400 dark:text-slate-500">{fmt(notif.data)}</span> </div> <p className="text-xs text-slate-600 dark:text-slate-400 leading-relaxed">{notif.mensagem}</p> <div className="text-[9px] text-slate-400 dark:text-slate-500 mt-2 text-right opacity-50"><i className="fa-solid fa-arrow-left"></i> Arraste para apagar</div> </div> );
    }

    function NavButton({ icon, label, isActive, onClick }) { return (<button onClick={onClick} className="flex flex-col items-center justify-center relative px-2 py-1 rounded-xl transition-all" style={{ color: isActive ? '#9333ea' : '#94a3b8', minWidth: 44 }}><div className="relative"><i className={`fa-solid ${icon} text-[20px] transition-all ${isActive ? 'scale-110 mb-0.5' : ''}`}></i></div><span className="text-[10px] font-bold mt-1">{label}</span></button>); }
    
    function SectionHeader({ title, action }) { return <div className="glass-card rounded-2xl px-4 py-3.5 flex justify-between items-center mb-2"><h3 className="text-base font-black text-slate-800 dark:text-white">{title}</h3>{action}</div>; }
    function AddBtn({ onClick, active }) { return <button onClick={onClick} className="w-9 h-9 rounded-full flex items-center justify-center text-white font-bold text-xl shadow-lg neon-button" style={{ background: active ? '#ef4444' : '' }}>{active ? <i className="fa-solid fa-xmark text-sm"></i> : '+'}</button>; }
    function Inp({ label, ...props }) { return <div className={props.className || ''}>{label && <label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 ml-1">{label}</label>}<input {...props} className={baseInpCls} /></div>; }
    function FormCard({ children, onSubmit }) { return <form onSubmit={onSubmit} className="glass-card rounded-2xl p-4 animate-fadeinup border-purple-200 dark:border-purple-500/30 mb-4"><div className="grid grid-cols-2 gap-4">{children}</div></form>; }
    function InfoRow({ icon, label, value, color='#9333ea' }) { return (<div className="flex items-start gap-3 py-2.5 border-b border-slate-100 dark:border-nDarkBorder last:border-0"><div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{background:`${color}15`}}><i className={`fa-solid ${icon} text-sm`} style={{color}}></i></div><div className="flex-1 min-w-0"><p className="text-[10px] font-bold uppercase text-slate-400 dark:text-slate-500">{label}</p><p className="font-semibold text-sm text-slate-800 dark:text-slate-200 truncate">{value}</p></div></div>); }
    function StatCard({ icon, label, value, bgClass }) { return ( <div className={`rounded-2xl p-4 text-center shadow-lg relative overflow-hidden ${bgClass}`}> <i className={`fa-solid ${icon} text-white/20 text-5xl absolute -right-2 -bottom-2 transform rotate-[-15deg]`}></i> <div className="relative z-10"> <i className={`fa-solid ${icon} text-white mb-2 text-xl`}></i> <p className="text-2xl font-black text-white">{value}</p> <p className="text-[9px] font-bold text-white/90 uppercase tracking-widest mt-0.5">{label}</p> </div> </div> ); }

    /* ─── TELA DE LOGIN ─── */
    function Login({ showDialog }) {
      const[email, setEmail] = useState(''); const[senha, setSenha] = useState(''); const[loading, setLoading] = useState(false);
      const handleLogin = async (e) => { e.preventDefault(); setLoading(true); try { await window.NexoFB.signInWithEmailAndPassword(window.NexoFB.auth, email, senha); SoundManager.login(); } catch(error) { showDialog('alert', 'Acesso Negado', 'Verifique o e-mail corporativo e a senha fornecida pelo administrador.'); setLoading(false); } };
      return (
        <div className="flex flex-col items-center justify-center h-full w-full bg-[#0f0e13] px-5 relative overflow-hidden z-50">
          <div className="absolute top-0 right-0 w-80 h-80 rounded-full opacity-20 bg-purple-600 blur-[80px] transform translate-x-1/3 -translate-y-1/3"></div>
          <div className="absolute bottom-0 left-0 w-80 h-80 rounded-full opacity-20 bg-purple-900 blur-[80px] transform -translate-x-1/3 translate-y-1/3"></div>

          <div className="w-full max-w-sm z-10 animate-fadeinup">
            <div className="mb-10 flex flex-col items-center sm:items-start sm:flex-row gap-4 relative animate-pulse-glow justify-center">
                <div className="absolute inset-0 bg-purple-600 blur-[30px] opacity-30 rounded-full"></div>
                <div className="w-16 h-16 flex items-center justify-center relative z-10">
                    <svg viewBox="0 0 100 100" className="w-full h-full" style={{filter: 'drop-shadow(0 4px 10px rgba(0,0,0,0.8))'}} xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="nGradLog" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stopColor="#c084fc" /><stop offset="50%" stopColor="#a855f7" /><stop offset="100%" stopColor="#6b21a8" /></linearGradient></defs><path d="M 25 15 C 32 15 35 20 35 25 L 35 50 L 62 18 C 68 12 75 15 75 25 L 75 85 C 68 85 65 80 65 75 L 65 50 L 38 82 C 32 88 25 85 25 75 Z" fill="url(#nGradLog)"/></svg>
                </div>
                <div className="flex flex-col relative z-10 items-center sm:items-start text-center sm:text-left">
                    <h2 className="text-3xl font-black text-white tracking-wide leading-none flex items-baseline gap-1">NEXO <span className="text-purple-400 font-light text-2xl">ERP</span></h2>
                    <span className="text-purple-400/80 font-bold text-[10px] mt-1 uppercase tracking-widest">Simplificando sua Agência</span>
                </div>
            </div>

            <div className="bg-[#1c1b22] rounded-[2rem] p-6 shadow-2xl border border-[#2a2931]">
              <form onSubmit={handleLogin} className="space-y-4">
                <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">E-mail Corporativo</label><input type="email" required value={email} onChange={e=>setEmail(e.target.value)} className="w-full p-3.5 rounded-xl text-sm font-medium bg-[#2a2931] border border-[#3f3e46] text-white focus:border-purple-500 transition-all outline-none" placeholder="empresa@email.com" /></div>
                <div><label className="block text-[10px] font-bold text-gray-400 uppercase mb-1 ml-1">Senha</label><input type="password" required value={senha} onChange={e=>setSenha(e.target.value)} className="w-full p-3.5 rounded-xl text-sm font-medium bg-[#2a2931] border border-[#3f3e46] text-white focus:border-purple-500 transition-all outline-none" placeholder="••••••••" /></div>
                <button type="submit" disabled={loading} className="w-full text-white font-bold py-3.5 rounded-xl mt-4 transition-all flex items-center justify-center gap-2 disabled:opacity-75 disabled:scale-100 active:scale-95 bg-purple-600 shadow-[0_0_15px_rgba(147,51,234,0.4)]">{loading ? <i className="fa-solid fa-circle-notch fa-spin text-lg"></i> : 'Entrar no Sistema'}</button>
              </form>
            </div>
            <p className="text-center text-[10px] text-white/40 mt-6 font-semibold uppercase tracking-wider">&copy; 2026 NEXO BRASIL TECNOLOGIA</p>
          </div>
        </div>
      );
    }

    /* ─── CONFIGURAÇÕES DE CONTA & SUPORTE COM TEMA DARK ─── */
    function Configuracoes({ userProfile, chamados, onClose, onLogout, showDialog, theme, toggleTheme }) {
      const [view, setView] = useState('menu'); 
      const[senhaAtual, setSenhaAtual] = useState(''); const[novoDado, setNovoDado] = useState(''); const[loading, setLoading] = useState(false);
      
      const[supAssunto, setSupAssunto] = useState(''); const[supMsg, setSupMsg] = useState('');
      const[ticketAberto, setTicketAberto] = useState(null);
      const chatEndRef = useRef(null);

      const scrollToBottom = () => { chatEndRef.current?.scrollIntoView({ behavior: "smooth" }); };
      useEffect(() => { if(ticketAberto && view === 'chat_chamado') scrollToBottom(); }, [ticketAberto, chamados, view]);
      
      useEffect(() => {
          if (ticketAberto) {
              const atualizado = chamados.find(c => c.id === ticketAberto.id);
              if (atualizado) setTicketAberto(atualizado);
          }
      }, [chamados]);

      const reautenticar = async () => { const { auth, EmailAuthProvider, reauthenticateWithCredential } = window.NexoFB; const cred = EmailAuthProvider.credential(auth.currentUser.email, senhaAtual); await reauthenticateWithCredential(auth.currentUser, cred); };
      const salvarAlteracao = async (e) => { e.preventDefault(); setLoading(true); try { await reautenticar(); if(view === 'email') { await window.NexoFB.updateEmail(window.NexoFB.auth.currentUser, novoDado); showDialog('alert', 'Sucesso', "E-mail atualizado com sucesso!"); } else if (view === 'senha') { await window.NexoFB.updatePassword(window.NexoFB.auth.currentUser, novoDado); showDialog('alert', 'Sucesso', "Senha atualizada com sucesso!"); } setView('menu'); } catch(err) { showDialog('alert', 'Erro de Autenticação', "A senha atual informada está incorreta."); } setLoading(false); };

      const enviarNovoChamado = async (e) => {
          e.preventDefault(); setLoading(true);
          try {
              const { db, collection, addDoc } = window.NexoFB;
              const novaMensagem = { autor: 'Cliente', msg: supMsg, data: new Date().toISOString() };
              await addDoc(collection(db, "chamados_suporte"), {
                  empresaId: userProfile.empresaId, nomeEmpresa: userProfile.nome,
                  assunto: supAssunto, mensagem: supMsg, 
                  data: new Date().toISOString(), status: 'aberto',
                  historico: [novaMensagem]
              });
              showDialog('alert', 'Sucesso', 'Chamado aberto! Acompanhe as respostas por aqui mesmo.');
              setView('lista_chamados'); setSupAssunto(''); setSupMsg('');
          } catch(err) { showDialog('alert', 'Erro', 'Não foi possível enviar a mensagem no momento.'); }
          setLoading(false);
      }

      const enviarReplica = async (e) => {
          e.preventDefault(); if(!supMsg.trim()) return; setLoading(true);
          try {
              const { db, doc, updateDoc } = window.NexoFB;
              const ticketDoc = doc(db, "chamados_suporte", ticketAberto.id);
              const novoHist = [...(ticketAberto.historico||[]), { autor: 'Cliente', msg: supMsg, data: new Date().toISOString() }];
              await updateDoc(ticketDoc, { historico: novoHist, status: 'aberto' }); 
              setSupMsg(''); setTimeout(scrollToBottom, 100);
          } catch(err) { showDialog('alert', 'Erro', 'Erro ao enviar resposta.'); }
          setLoading(false);
      }

      const isTicketEncerrado = ticketAberto && (ticketAberto.status === 'resolvido' || ticketAberto.status === 'encerrado');
      const btnItemCls = "w-full flex justify-between items-center p-4 rounded-xl font-semibold text-sm text-slate-700 bg-slate-50 border border-slate-200 active:bg-slate-100 transition-colors dark:bg-nDarkCard dark:border-nDarkBorder dark:text-slate-200 dark:active:bg-nDarkHover";

      return (
        <Modal onClose={onClose} title={view === 'menu' ? "Configurações" : view === 'assinatura' ? "Sua Assinatura" : view === 'lista_chamados' ? "Meus Chamados" : view === 'novo_chamado' ? "Novo Chamado" : view === 'chat_chamado' ? "Atendimento suporte" : `Alterar ${view==='email'?'E-mail':'Senha'}`}>
          {view === 'menu' ? (
            <>
              <div className="rounded-2xl p-5 mb-5 text-center transition-colors" style={{background:'linear-gradient(135deg,#f3e8ff,#e9d5ff)', border:'1px solid #d8b4fe'}}>
                <div className="w-16 h-16 rounded-full mx-auto flex items-center justify-center text-white text-2xl font-black mb-3" style={{background:'linear-gradient(135deg,#9333ea,#6b21a8)'}}>{userProfile.nome.charAt(0)}</div>
                <p className="font-bold text-slate-800">{userProfile.nome}</p>
                <p className="text-xs text-slate-600 mt-1">{userProfile.email}</p>
              </div>
              <div className="space-y-2 mb-6">
                <button onClick={toggleTheme} className={btnItemCls}><span className="flex items-center gap-3"><i className={`fa-solid ${theme==='dark'?'fa-sun text-amber-400':'fa-moon text-indigo-500'}`}></i> Tema: {theme==='dark'?'Escuro':'Claro'}</span><i className="fa-solid fa-rotate text-slate-300 dark:text-slate-500 text-xs"></i></button>
                <button onClick={()=>setView('assinatura')} className={btnItemCls}><span className="flex items-center gap-3"><i className="fa-solid fa-file-contract text-purple-500"></i> Minha Assinatura</span><i className="fa-solid fa-chevron-right text-slate-300 dark:text-slate-500 text-xs"></i></button>
                <button onClick={()=>setView('email')} className={btnItemCls}><span className="flex items-center gap-3"><i className="fa-solid fa-envelope text-purple-500"></i> Trocar E-mail</span><i className="fa-solid fa-chevron-right text-slate-300 dark:text-slate-500 text-xs"></i></button>
                <button onClick={()=>setView('senha')} className={btnItemCls}><span className="flex items-center gap-3"><i className="fa-solid fa-lock text-purple-500"></i> Alterar Senha</span><i className="fa-solid fa-chevron-right text-slate-300 dark:text-slate-500 text-xs"></i></button>
                <button onClick={()=>setView('lista_chamados')} className={`w-full flex justify-between items-center p-4 rounded-xl font-semibold text-sm text-blue-700 bg-blue-50 border border-blue-200 active:bg-blue-100 transition-colors dark:bg-blue-900/20 dark:border-blue-800/50 dark:text-blue-400 dark:active:bg-blue-900/40`}><span className="flex items-center gap-3"><i className="fa-solid fa-headset text-blue-500"></i> Fale com o Suporte</span><i className="fa-solid fa-chevron-right text-blue-300 dark:text-blue-500 text-xs"></i></button>
              </div>
              <button onClick={()=>{ onClose(); onLogout(); }} className="w-full py-3.5 rounded-xl font-bold text-red-600 bg-red-50 border border-red-200 active:scale-95 transition-transform dark:bg-red-500/10 dark:border-red-500/30 dark:text-red-500"><i className="fa-solid fa-arrow-right-from-bracket mr-2"></i> Sair do Sistema</button>
            </>
          ) : view === 'assinatura' ? (
             <div className="animate-scalein space-y-4">
                <div className="bg-purple-50 dark:bg-purple-500/10 border border-purple-200 dark:border-purple-500/30 p-5 rounded-2xl text-center"><i className="fa-solid fa-crown text-3xl text-purple-500 mb-2"></i><h3 className="font-black text-xl text-purple-800 dark:text-purple-400">{userProfile.assinatura?.plano || 'Não informado'}</h3><p className="text-xs text-purple-600 dark:text-purple-500 font-bold uppercase mt-1">Plano Atual</p></div>
                <div className="bg-slate-50 dark:bg-nDarkCard border border-slate-100 dark:border-nDarkBorder p-4 rounded-2xl"><InfoRow icon="fa-calendar-check" label="Vencimento" value={fmt(userProfile.assinatura?.vencimento) || '—'} /><InfoRow icon="fa-money-bill" label="Valor Contratado" value={userProfile.assinatura?.valor ? fmtMoeda(userProfile.assinatura.valor) : '—'} color="#10b981" /></div>
                <button onClick={()=>setView('menu')} className="w-full py-3.5 mt-2 rounded-xl font-bold text-slate-600 bg-slate-100 active:scale-95 transition-transform dark:bg-nDarkCard dark:text-slate-300 dark:border dark:border-nDarkBorder">Voltar</button>
            </div>
          ) : view === 'lista_chamados' ? (
             <div className="animate-scalein flex flex-col h-full">
                 <button onClick={()=>setView('novo_chamado')} className="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-[0_0_15px_rgba(37,99,235,0.4)] active:scale-95 transition-transform mb-4 flex justify-center items-center gap-2"><i className="fa-solid fa-plus"></i> Abrir Novo Chamado</button>
                 <div className="space-y-3">
                     {chamados.length === 0 ? <div className="text-center py-6 text-slate-400 dark:text-slate-500 font-semibold text-sm">Nenhum chamado aberto.</div> : chamados.map(c => (
                         <div key={c.id} onClick={()=>{setTicketAberto(c); setView('chat_chamado');}} className="bg-slate-50 dark:bg-nDarkCard border border-slate-200 dark:border-nDarkBorder p-4 rounded-xl cursor-pointer active:bg-slate-100 dark:active:bg-nDarkHover transition-colors">
                             <div className="flex justify-between items-start mb-1"><h4 className="font-bold text-sm text-slate-800 dark:text-slate-200 truncate pr-2">{c.assunto}</h4><span className={`text-[9px] font-bold px-2 py-0.5 rounded uppercase tracking-widest shrink-0 ${(c.status==='resolvido'||c.status==='encerrado')?'bg-slate-200 text-slate-600 border border-slate-300 dark:bg-[#2a2931] dark:text-slate-400 dark:border-[#3f3e46]':c.status==='respondido'?'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-400':'bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-400'}`}>{c.status}</span></div>
                             <p className="text-xs text-slate-500 dark:text-slate-400 mb-2 truncate">{c.historico?.[c.historico.length-1]?.msg || c.mensagem}</p>
                             <p className="text-[9px] text-slate-400 dark:text-slate-500 font-mono"><i className="fa-regular fa-clock"></i> Atualizado {fmt(c.data)} às {fmtHora(c.data)}</p>
                         </div>
                     ))}
                 </div>
                 <button onClick={()=>setView('menu')} className="w-full py-3 mt-4 rounded-xl font-bold text-slate-600 bg-slate-100 active:scale-95 transition-transform dark:bg-nDarkCard dark:text-slate-300 border dark:border-nDarkBorder">Voltar</button>
             </div>
          ) : view === 'novo_chamado' ? (
             <div className="animate-scalein space-y-4">
                 <p className="text-xs text-slate-500 dark:text-slate-400 font-medium">Relate o seu problema ou dúvida para nossa equipe técnica.</p>
                 <form onSubmit={enviarNovoChamado} className="space-y-4">
                     <Inp required value={supAssunto} onChange={e=>setSupAssunto(e.target.value)} label="Assunto Principal" placeholder="Ex: Erro ao gerar recibo" />
                     <div><label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase mb-1 ml-1">Detalhes (Mensagem)</label><textarea required value={supMsg} onChange={e=>setSupMsg(e.target.value)} rows="4" className={`${baseInpCls} no-scrollbar`} placeholder="Explique detalhadamente o que você precisa..."></textarea></div>
                     <div className="flex gap-2 mt-4">
                        <button type="button" onClick={()=>setView('lista_chamados')} className="w-14 py-3.5 rounded-xl font-bold text-slate-600 bg-slate-100 active:scale-95 transition-transform dark:bg-nDarkCard dark:text-slate-300 border dark:border-nDarkBorder"><i className="fa-solid fa-arrow-left"></i></button>
                        <button type="submit" disabled={loading} className="flex-1 py-3.5 rounded-xl font-bold text-white bg-blue-600 shadow-[0_0_15px_rgba(37,99,235,0.4)]">{loading?'Enviando...':'Enviar Chamado'}</button>
                    </div>
                 </form>
             </div>
          ) : view === 'chat_chamado' && ticketAberto ? (
              <div className="animate-scalein flex flex-col h-[65vh]">
                  <div className="bg-slate-100 dark:bg-[#1c1b22] p-3 rounded-xl mb-4 shrink-0 flex justify-between items-start border border-slate-200 dark:border-[#2a2931]">
                      <div><p className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase">Assunto</p><p className="font-bold text-sm text-slate-800 dark:text-white leading-tight pr-2">{ticketAberto.assunto}</p></div>
                      <span className={`text-[9px] font-bold px-2 py-1 rounded uppercase tracking-widest shrink-0 ${isTicketEncerrado?'bg-slate-200 text-slate-600 dark:bg-[#2a2931] dark:text-slate-400':ticketAberto.status==='respondido'?'bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-400':'bg-amber-100 text-amber-700 dark:bg-amber-500/20 dark:text-amber-400'}`}>{ticketAberto.status}</span>
                  </div>
                  
                  <div className="flex-1 overflow-y-auto no-scrollbar space-y-4 pb-4 flex flex-col px-1">
                      {(ticketAberto.historico || [{autor:'Cliente', msg: ticketAberto.mensagem, data: ticketAberto.data}]).map((h, i) => {
                          const isMe = h.autor === 'Cliente';
                          return (
                              <div key={i} className={`flex flex-col max-w-[85%] ${isMe ? 'self-end items-end' : 'self-start items-start'}`}>
                                  <span className="text-[9px] font-bold text-slate-400 dark:text-slate-500 mb-1 px-1">{isMe ? 'Você' : 'Suporte Nexo'} • {fmt(h.data)} {fmtHora(h.data)}</span>
                                  <div className={`p-3.5 rounded-2xl text-[13px] leading-relaxed ${isMe ? 'bg-purple-600 text-white rounded-tr-sm shadow-md' : 'bg-white dark:bg-nDarkCard border border-slate-200 dark:border-nDarkBorder text-slate-800 dark:text-slate-200 rounded-tl-sm shadow-sm'}`}>{h.msg}</div>
                              </div>
                          )
                      })}
                      <div ref={chatEndRef} className="h-2" />
                  </div>

                  {isTicketEncerrado ? (
                      <div className="mt-3 p-4 bg-slate-50 dark:bg-nDarkCard border border-slate-200 dark:border-nDarkBorder rounded-xl text-center shrink-0">
                          <p className="text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest"><i className="fa-solid fa-lock mr-2"></i>Chamado Encerrado</p>
                          <p className="text-xs text-slate-400 dark:text-slate-500 mt-1 mb-3">Este atendimento foi finalizado. Se precisar de mais ajuda, abra um novo chamado.</p>
                          <button onClick={()=>setView('lista_chamados')} className="px-4 py-2 rounded-lg font-bold text-sm text-slate-600 bg-slate-200 active:scale-95 transition-transform dark:bg-[#3f3e46] dark:text-slate-300">Voltar para a Lista</button>
                      </div>
                  ) : (
                      <form onSubmit={enviarReplica} className="mt-3 shrink-0 flex gap-2 pt-3 border-t border-slate-100 dark:border-nDarkBorder">
                          <button type="button" onClick={()=>setView('lista_chamados')} className="w-12 h-12 rounded-xl font-bold text-slate-600 bg-slate-100 shrink-0 dark:bg-nDarkCard dark:text-slate-300 border dark:border-nDarkBorder"><i className="fa-solid fa-arrow-left"></i></button>
                          <input type="text" required value={supMsg} onChange={e=>setSupMsg(e.target.value)} placeholder="Escreva sua resposta..." className="flex-1 px-4 rounded-xl text-sm bg-slate-50 border border-slate-200 outline-none focus:border-purple-500 focus:bg-white transition-all shadow-inner dark:bg-[#1c1b22] dark:border-[#3f3e46] dark:text-white dark:focus:bg-[#2a2931]" />
                          <button type="submit" disabled={loading} className="w-12 h-12 rounded-xl text-white bg-blue-600 shadow-md shrink-0 flex justify-center items-center active:scale-95">{loading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-paper-plane"></i>}</button>
                      </form>
                  )}
              </div>
          ) : (
            <div className="animate-scalein">
              <form onSubmit={salvarAlteracao} className="space-y-4">
                <Inp type="password" required value={senhaAtual} onChange={e=>setSenhaAtual(e.target.value)} label="Senha Atual (Confirmação)" placeholder="••••••••" />

    /* ─── TELAS DE MÓDULOS ─── */
    function Dashboard({ viagens, caixa, passageiros, reservas, setActiveTab }) {
      const saldo = caixa.filter(c=>c.tipo==='entrada').reduce((a,b)=>a+b.valor,0) - caixa.filter(c=>c.tipo==='saida').reduce((a,b)=>a+b.valor,0);
      const entradas = caixa.filter(c=>c.tipo==='entrada').reduce((a,b)=>a+b.valor,0);
      const saidas = caixa.filter(c=>c.tipo==='saida').reduce((a,b)=>a+b.valor,0);
      const proximas = viagens.map(v => ({ ...v, diasAte: diasAte(v.dataSaida) })).filter(v => v.diasAte !== null && v.diasAte >= 0).sort((a,b) => a.diasAte - b.diasAte);
      const totalPoltronas = Object.values(reservas).reduce((acc, r) => acc + Object.keys(r).length, 0);

      return (
        <div className="space-y-4">
          <div className="rounded-2xl p-5 relative overflow-hidden" style={{background:'linear-gradient(135deg,#9333ea 0%,#6b21a8 100%)', boxShadow:'0 8px 32px rgba(147,51,234,0.35)'}}>
            <div className="absolute top-0 right-0 opacity-10 text-[120px] leading-none translate-x-5 -translate-y-4"><i className="fa-solid fa-sack-dollar"></i></div>
            <p className="text-[11px] font-bold uppercase tracking-widest text-white/80 mb-1">Caixa Geral</p>
            <h3 className="text-3xl font-black text-white">{fmtMoeda(saldo)}</h3>
            <div className="flex gap-4 mt-3">
              <span className="text-[11px] text-white/90 font-semibold flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-emerald-400 shadow-[0_0_8px_#34d399]"></div>Entradas: {fmtMoeda(entradas)}</span>
              <span className="text-[11px] text-white/90 font-semibold flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-rose-400 shadow-[0_0_8px_#fb7185]"></div>Saídas: {fmtMoeda(saidas)}</span>
            </div>
          </div>
          <div className="grid grid-cols-3 gap-3">
            <StatCard icon="fa-map-location-dot" label="Viagens" value={viagens.length} bgClass="bg-gradient-to-br from-blue-600 to-cyan-500" />
            <StatCard icon="fa-users" label="Pessoas" value={passageiros.length} bgClass="bg-gradient-to-br from-emerald-500 to-teal-400" />
            <StatCard icon="fa-bus" label="Poltronas" value={`${totalPoltronas}`} bgClass="bg-gradient-to-br from-amber-500 to-orange-400" />
          </div>
          <div className="glass-card rounded-2xl overflow-hidden">
            <div className="flex justify-between items-center px-4 pt-4 pb-2"><h4 className="font-black text-sm text-slate-800 dark:text-white"><i className="fa-solid fa-calendar-check mr-2 text-purple-600"></i>Próximas Viagens</h4><button onClick={()=>setActiveTab('viagens')} className="text-[10px] font-bold px-2 py-1 rounded-lg bg-purple-50 text-purple-600 dark:bg-purple-500/10 dark:text-purple-400">Ver todas</button></div>
            <div className="divider mx-4 border-b border-slate-100 dark:border-nDarkBorder"></div>
            {proximas.length === 0 ? <div className="px-4 py-6 text-center text-sm text-slate-400 dark:text-slate-500 font-semibold"><i className="fa-solid fa-calendar-xmark text-2xl mb-2 block text-slate-300 dark:text-slate-600"></i>Nenhuma viagem agendada</div> : proximas.map(v => {
              const ocupados = Object.keys(reservas[v.id]||{}).length; const pct = Math.round((ocupados/46)*100); const pax = passageiros.filter(p=>p.viagemId===v.id).length;
              return (
                <div key={v.id} className="px-4 pb-4 mt-2">
                  <div className="rounded-xl p-3.5 bg-slate-50 border border-slate-200 dark:bg-nDarkCard dark:border-nDarkBorder transition-colors">
                    <div className="flex items-start justify-between mb-2"><div className="flex-1 pr-2"><p className="font-black text-slate-800 dark:text-slate-100 text-sm truncate">{v.destino}</p><p className="text-[10px] text-slate-500 dark:text-slate-400 mt-0.5"><i className="fa-solid fa-location-dot mr-1"></i>{v.localEmbarque}</p></div><div className="text-[10px] font-black px-2.5 py-1 rounded-full bg-emerald-100 text-emerald-700 dark:bg-emerald-500/20 dark:text-emerald-400 shrink-0">{v.diasAte === 0 ? 'Hoje!' : v.diasAte === 1 ? 'Amanhã' : `${v.diasAte} dias`}</div></div>
                    <div className="flex gap-3 text-[10px] text-slate-600 dark:text-slate-400 font-semibold mb-3"><span><i className="fa-solid fa-calendar-day mr-1 text-purple-500"></i>{fmt(v.dataSaida)} · {v.horaSaida}</span><span><i className="fa-solid fa-users mr-1 text-green-500"></i>{pax} pax</span></div>
                    <div className="flex items-center gap-2"><div className="flex-1 h-2 rounded-full bg-slate-200 dark:bg-[#3f3e46]"><div className="h-full rounded-full bg-purple-600" style={{width:`${pct}%`}}></div></div><span className="text-[10px] font-bold text-slate-500 dark:text-slate-400">{ocupados}/46</span></div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    function Viagens({ viagensFiltered, userProfile, showDialog, searchParams }) {
      const[showForm, setShowForm] = useState(false);
      const[vSelecionada, setVSel] = useState(null);
      const[isEditing, setIsEditing] = useState(false);

        e.preventDefault(); const t = e.target;
        const d = { destino: t.destino.value, dataSaida: t.dataSaida.value, horaSaida: t.horaSaida.value, dataRetorno: t.dataRetorno.value, horaRetorno: t.horaRetorno.value, localEmbarque: t.localEmbarque.value, valor: parseFloat(t.valor.value || 0) };
        const { db, collection, addDoc, doc, updateDoc } = window.NexoFB;
        const colRef = collection(db, "empresas", userProfile.empresaId, "viagens");
        if (isEditing && vSelecionada) { await updateDoc(doc(colRef, vSelecionada.id), d); setVSel(null); setIsEditing(false); } else { await addDoc(colRef, d); setShowForm(false); }
      };

      const excluir = () => { showDialog('confirm', 'Excluir Viagem', 'Tem certeza que deseja excluir esta viagem definitivamente?', async () => { const { db, doc, deleteDoc } = window.NexoFB; await deleteDoc(doc(db, "empresas", userProfile.empresaId, "viagens", vSelecionada.id)); setVSel(null); }); };

          <SearchBar value={searchParams.searchViagens} onChange={searchParams.setSearchViagens} placeholder="Pesquisar viagem ou embarque..." showDates={true} startDate={searchParams.dateViagensStart} setStartDate={searchParams.setDateViagensStart} endDate={searchParams.dateViagensEnd} setEndDate={searchParams.setDateViagensEnd} />
          
          {showForm && (
            <FormCard onSubmit={salvar}>
              <div className="col-span-2"><Inp name="destino" required placeholder="Destino" label="Destino" /></div>
              <Inp type="date" name="dataSaida" required label="Data Saída" /><Inp type="time" name="horaSaida" required label="Hora Saída" />
              <Inp type="date" name="dataRetorno" required label="Data Retorno" /><Inp type="time" name="horaRetorno" required label="Hora Retorno" />
              <div className="col-span-2"><Inp name="localEmbarque" required placeholder="Local de Embarque" label="Local Embarque" /></div>

                <div className="text-right shrink-0"><span className="bg-purple-100 text-purple-800 dark:bg-purple-500/20 dark:text-purple-300 px-2.5 py-1 rounded-md text-xs font-bold border border-purple-200 dark:border-purple-500/30">{fmtMoeda(v.valor||0)}</span></div>
              </div>

          {vSelecionada && (

              {isEditing ? (
                <form onSubmit={salvar} className="grid grid-cols-2 gap-4 pb-2">
                    <div className="col-span-2"><Inp name="destino" defaultValue={vSelecionada.destino} required label="Destino" /></div>
                    <Inp type="date" name="dataSaida" defaultValue={vSelecionada.dataSaida} required label="Data Saída" /><Inp type="time" name="horaSaida" defaultValue={vSelecionada.horaSaida} required label="Hora Saída" />
                    <Inp type="date" name="dataRetorno" defaultValue={vSelecionada.dataRetorno} required label="Data Retorno" /><Inp type="time" name="horaRetorno" defaultValue={vSelecionada.horaRetorno} required label="Hora Retorno" />
                    <div className="col-span-2"><Inp name="localEmbarque" defaultValue={vSelecionada.localEmbarque} required label="Local de Embarque" /></div>
                    <div className="col-span-2"><CurrencyInp name="valor" defaultValue={vSelecionada.valor} required label="Valor da Viagem por Pessoa" /></div>
                    <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-2">Salvar Alterações</button>
                    <button type="button" onClick={()=>setIsEditing(false)} className="col-span-2 py-3.5 rounded-xl font-bold text-slate-600 bg-slate-100 dark:bg-nDarkCard dark:text-slate-300 border dark:border-nDarkBorder">Cancelar</button>

                    <InfoRow icon="fa-plane-departure" label="Saída"    value={`${fmt(vSelecionada.dataSaida)} às ${vSelecionada.horaSaida}`} color="#10b981" />

                  </div>
                  <div className="flex gap-2">
                    <button onClick={excluir} className="w-14 h-12 rounded-xl flex items-center justify-center font-bold bg-red-50 text-red-600 active:scale-95 dark:bg-red-500/10 dark:text-red-500"><i className="fa-solid fa-trash"></i></button>
                    <button onClick={()=>setIsEditing(true)} className="flex-1 h-12 rounded-xl font-bold text-white neon-button flex items-center justify-center"><i className="fa-solid fa-pen mr-2"></i> Editar Informações</button>
                  </div>
                </>
              )}
            </Modal>
          )}
        </div>
      );

    function Passageiros({ paxFiltered, viagens, viagemSelecionadaId, setViagemSelecionadaId, exportarPDF, caixa, reservas, userProfile, showDialog, searchParams }) {
      const[showForm, setShowForm] = useState(false);
      const[passSel, setPassSel] = useState(null);
      const[isEditing, setIsEditing] = useState(false);
      const[formViagemId, setFormViagemId] = useState(viagemSelecionadaId);

      const salvar = async (e) => {
        e.preventDefault(); const t = e.target;
        const cpfRaw = t.cpf.value.replace(/\D/g, ''); if(!isValidCPF(cpfRaw)) return showDialog('alert', 'Atenção', 'O CPF informado é inválido ou não existe.');
        if(t.rg.value.trim().length < 4) return showDialog('alert', 'Atenção', 'O RG informado é muito curto para ser válido.');
        const phoneRaw = t.tel.value.replace(/\D/g, ''); if(phoneRaw.length < 10) return showDialog('alert', 'Atenção', 'O número de telefone deve conter o DDD.');
        if(t.emerg.value.trim().length < 5) return showDialog('alert', 'Atenção', 'Preencha o contato de emergência corretamente (Ex: Mãe 1199999).');

        const vSelecionadaNoForm = t.viagemIdInput ? t.viagemIdInput.value : formViagemId;
        const d = { nome:t.nome.value, cpf:t.cpf.value, rg:t.rg.value, nascimento:t.nasc.value, telefone:t.tel.value, emergencial:t.emerg.value, viagemId: vSelecionadaNoForm };
        const { db, collection, addDoc, doc, updateDoc } = window.NexoFB;
        const colRef = collection(db, "empresas", userProfile.empresaId, "passageiros");
        
        if (isEditing && passSel) { await updateDoc(doc(colRef, passSel.id), d); setPassSel(null); setIsEditing(false); } else { if(!d.viagemId) return showDialog('alert', 'Atenção', 'Selecione ou crie uma viagem primeiro.'); await addDoc(colRef, d); setShowForm(false); }
      };

      const excluir = () => { showDialog('confirm', 'Excluir Cliente', 'Deseja excluir este cliente? Seus pagamentos e poltrona serão desvinculados.', async () => { const { db, doc, deleteDoc, setDoc } = window.NexoFB; await deleteDoc(doc(db, "empresas", userProfile.empresaId, "passageiros", passSel.id)); let r = {...reservas}; let mudou = false; for(let v in r) { for(let p in r[v]) { if(r[v][p] === passSel.id) { delete r[v][p]; mudou = true; } } } if(mudou) await setDoc(doc(db, "empresas", userProfile.empresaId, "config", "reservas"), { mapa: r }); setPassSel(null); }); };

      const vAtiva = viagens.find(v=>v.id===viagemSelecionadaId); const vValor = vAtiva ? (vAtiva.valor || 0) : 0;

      return (
        <div className="space-y-4">
          <div className="glass-card p-4 rounded-2xl">
             <CustomSelect name="filtroV" label="Filtrar por Viagem" value={viagemSelecionadaId} onChange={val=>setViagemSelecionadaId(val)} options={viagens.map(v=>({label: v.destino, value: v.id}))} placeholder="Selecione uma viagem..." />
          </div>
          <SectionHeader title={`Passageiros (${paxFiltered.length})`} action={<div className="flex gap-2"><button onClick={()=>exportarPDF('roomingList')} className="w-9 h-9 rounded-full bg-slate-100 text-slate-600 border border-slate-200 dark:bg-nDarkCard dark:text-slate-300 dark:border-nDarkBorder shadow-sm active:scale-95 transition-transform"><i className="fa-solid fa-file-pdf"></i></button><AddBtn onClick={()=>{setShowForm(!showForm); setFormViagemId(viagemSelecionadaId);}} active={showForm} /></div>} />
          
          <SearchBar value={searchParams.searchPax} onChange={searchParams.setSearchPax} placeholder="Pesquisar por nome ou CPF..." />

          {showForm && (
            <FormCard onSubmit={salvar}>
              <div className="col-span-2"><Inp name="nome" required placeholder="Nome Completo" label="Nome" /></div>
              <MaskedInp name="cpf" maskType="cpf" required placeholder="000.000.000-00" label="CPF" />
              <Inp name="rg" required placeholder="Ex: MG-12.345" label="RG" />
              <Inp type="date" name="nasc" required label="Nascimento" />
              <MaskedInp name="tel" maskType="phone" required placeholder="(00) 00000-0000" label="Telefone" />
              <div className="col-span-2"><Inp name="emerg" required placeholder="Contato (Nome/Tel)" label="Emergência" /></div>
              <div className="col-span-2"><CustomSelect name="viagemIdInput" label="Vincular a Viagem" value={formViagemId} onChange={setFormViagemId} options={viagens.map(v=>({label:v.destino, value:v.id}))} required /></div>
              <button type="submit" className="col-span-2 text-white font-bold py-3.5 rounded-xl neon-button mt-2">Salvar Passageiro</button>
            </FormCard>
          )}

          <div className="space-y-2">
            {paxFiltered.map(p => {
              const pago = caixa.filter(c=>c.tipo==='entrada'&&c.passageiroId===p.id).reduce((a,b)=>a+b.valor,0);
              let badgeCls = "bg-red-50 text-red-600 border-red-200 dark:bg-red-500/10 dark:text-red-400 dark:border-red-500/20"; let badgeTxt = "Pendente";
              if(vValor > 0 && pago >= vValor) { badgeCls = "bg-emerald-50 text-emerald-600 border-emerald-200 dark:bg-emerald-500/10 dark:text-emerald-400 dark:border-emerald-500/20"; badgeTxt = "Pago"; } else if (pago > 0) { badgeCls = "bg-amber-50 text-amber-600 border-amber-200 dark:bg-amber-500/10 dark:text-amber-400 dark:border-amber-500/20"; badgeTxt = "Parcial"; }
              return (
                <div key={p.id} onClick={()=>{setPassSel(p);setIsEditing(false);}} className="glass-card glass-card-hover rounded-xl p-3.5 flex items-center gap-3 cursor-pointer border-l-4 border-l-purple-400">
                  <div className="w-11 h-11 rounded-xl flex items-center justify-center text-purple-600 font-black bg-purple-100 dark:bg-purple-500/20 dark:text-purple-400 shrink-0">{p.nome.charAt(0)}</div>
